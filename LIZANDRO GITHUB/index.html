<style>

:root{
 --azul1:#00416A;
 --azul2:#0c6cbd;
 --gris:#f4f6f9;
 --card:#ffffff;
 --radius:14px;
 --shadow:0 8px 24px rgba(0,0,0,.18);
}

*{
 box-sizing:border-box;
 font-family:'Segoe UI',sans-serif;
}

body{
 margin:0;
 background:linear-gradient(135deg,var(--azul1),var(--azul2));
 padding:30px;
}

h1{
 color:#fff;
 text-align:center;
 margin-bottom:30px;
}

.container{
 background:var(--gris);
 padding:25px;
 border-radius:var(--radius);
}

select{
 padding:10px;
 font-size:16px;
 border-radius:8px;
 border:none;
 margin-bottom:20px;
}

.card-total{
 background:var(--card);
 padding:20px;
 border-radius:var(--radius);
 box-shadow:var(--shadow);
 margin-bottom:20px;
 font-size:18px;
 font-weight:bold;
}

table{
 width:100%;
 border-collapse:collapse;
 background:var(--card);
 border-radius:var(--radius);
 overflow:hidden;
 box-shadow:var(--shadow);
}

th{
 background:var(--azul1);
 color:#fff;
 padding:12px;
 text-align:left;
}

td{
 padding:10px;
 border-bottom:1px solid #eee;
}

tr:hover{
 background:#f1f1f1;
}

.loading{
 color:#fff;
 text-align:center;
 margin-top:15px;
}

.lista-item{
 display:flex;
 align-items:center;
 justify-content:space-between;
 background:#fff;
 padding:10px 15px;
 border-radius:10px;
 margin-bottom:8px;
 box-shadow:0 2px 6px rgba(0,0,0,.08);
 font-size:14px;
}

.color-box{
 width:14px;
 height:14px;
 border-radius:4px;
 margin-right:10px;
}

.item-left{
 display:flex;
 align-items:center;
 gap:10px;
}

.item-right{
 font-weight:bold;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.55);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:999;
}

.modal-content{
 background:#fff;
 width:420px;
 max-width:90%;
 border-radius:16px;
 padding:20px;
 box-shadow:0 20px 50px rgba(0,0,0,.3);
 animation:fadeIn .25s ease;
}

@keyframes fadeIn{
 from{
  transform:scale(.95);
  opacity:0
 }
 to{
  transform:scale(1);
  opacity:1
 }
}

.modal-header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:15px;
}

.modal-header h3{
 margin:0;
}

.modal-header button{
 background:none;
 border:none;
 font-size:18px;
 cursor:pointer;
}

.cliente-item{
 display:flex;
 justify-content:space-between;
 padding:8px 0;
 border-bottom:1px solid #eee;
}

</style>

</head>

<script type="module">

const SUPA_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";

const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";

const supabase = createClient(SUPA_URL, SUPA_KEY);

const firebaseConfig = {
 apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
 authDomain: "inventariopv-643f1.firebaseapp.com",
 projectId: "inventariopv-643f1",
 storageBucket: "inventariopv-643f1.firebasestorage.app",
 messagingSenderId: "96242533231",
 appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let impuestosDepartamentos = {};

const sucursalSelect = document.getElementById("sucursalSelect");
const mesSelect = document.getElementById("mesSelect");

const tablaBody = document.getElementById("tablaBody");
const tablaTop = document.getElementById("tablaTop");

const ctx = document.getElementById("graficaPastel").getContext("2d");

let grafica = null;

const totalGeneral = document.getElementById("totalGeneral");
const loading = document.getElementById("loading");
async function cargarImpuestos(){

 const snapshot = await getDocs(collection(db,"departamentos_venta"));

 snapshot.forEach((doc)=>{

  const data = doc.data();

  impuestosDepartamentos[data.nombre] = {
   iva: Number(data.iva || 0),
   ieps: Number(data.ieps || 0)
  };

 });

 console.log("Impuestos cargados:", impuestosDepartamentos);

}

async function cargarSucursales(){

 const { data, error } = await supabase.rpc("obtener_sucursales");
 console.log(data);

 if(error){
  console.error("Error sucursales:", error);
  return;
 }

 sucursalSelect.innerHTML = `
<option value="GLOBAL">TODAS LAS SUCURSALES</option>
`;

 if(!data || data.length === 0){
  console.warn("No hay sucursales");
  return;
 }

 data.forEach(row=>{

  const sucursal = row.sucursal || row.nombre || row.nombre_sucursal;

  if(!sucursal) return;

  const option = document.createElement("option");

  option.value = sucursal;
  option.textContent = sucursal;

  sucursalSelect.appendChild(option);

 });

}
async function cargarMeses(){

 const { data, error } = await supabase.rpc("obtener_meses_disponibles");

 if(error){
  console.error(error);
  return;
 }

 mesSelect.innerHTML = `<option value="TODOS">TODO EL AÑO</option>`;

 data.forEach(row=>{

  const option = document.createElement("option");

  option.value = row.mes;

  const [anio, mes] = row.mes.split("-");

  const nombreMes = new Date(anio, mes - 1)
  .toLocaleString("es-MX",{ month:"long" });

  option.textContent = `${nombreMes.toUpperCase()} ${anio}`;

  mesSelect.appendChild(option);

 });

}
async function cargarDatos(sucursal){

 loading.textContent = "Cargando datos...";

 const { data, error } = await supabase.rpc("ventas_por_departamento",{
  sucursal_param: sucursal,
  mes_param: mesSelect.value
 });

 if(error){
  console.error(error);
  loading.textContent = "Error cargando datos";
  return;
 }

 tablaBody.innerHTML = "";

 let total = 0;

data.forEach((row)=>{

const venta = Number(row.venta_total);
const costo = Number(row.costo_compra_total);
const impuesto = impuestosDepartamentos[row.departamento] || {iva:0,ieps:0};


let iva = 0;
let ieps = 0;

if(impuesto.iva === 16){
 iva = venta - (venta / 1.16);
}

if(impuesto.ieps === 8){
 ieps = venta - (venta / 1.08);
}

const subtotal = venta - iva - ieps;
const utilidad = subtotal - costo;

 const tr = document.createElement("tr");

 tr.innerHTML = `
<td class="departamento-click" data-depto="${row.departamento}">
<span style="cursor:pointer; color:#00416A; font-weight:600;">
${row.departamento}
</span>
</td>

<td>$${costo.toLocaleString()}</td>
<td>$${subtotal.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${iva.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${ieps.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
<td>$${venta.toLocaleString()}</td>
<td>$${utilidad.toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
`;

 tablaBody.appendChild(tr);

 total += venta;

});

 totalGeneral.textContent = "Total Venta: $" + total.toLocaleString();

 loading.textContent = "";

}
async function cargarTopArticulos(sucursal){

 const { data, error } = await supabase.rpc("top_articulos_sucursal",{
  sucursal_param: sucursal,
  mes_param: mesSelect.value
 });

 if(error){
  console.error(error);
  return;
 }

 tablaTop.innerHTML = "";

 let labels = [];
 let valores = [];

 data.forEach((row,index)=>{

  const tr = document.createElement("tr");

tr.innerHTML = `
<td><strong>#${index + 1}</strong></td>
<td>${row.codigo}</td>
<td>${row.descripcion || ""}</td>
<td>$${Number(row.total_venta).toLocaleString()}</td>
`;

  tablaTop.appendChild(tr);

  labels.push((index + 1) + ". " + (row.descripcion || row.codigo));
  valores.push(Number(row.total_venta));

});
if(grafica){
 grafica.destroy();
}

grafica = new Chart(ctx,{
 type:"pie",
 data:{
  labels:labels,
  datasets:[{
   data:valores,
   backgroundColor:[
    "#00416A",
    "#0c6cbd",
    "#1f77b4",
    "#2ca02c",
    "#ff7f0e",
    "#d62728",
    "#9467bd",
    "#17becf",
    "#bcbd22",
    "#8c564b",
    "#e377c2",
    "#7f7f7f",
    "#aec7e8",
    "#98df8a",
    "#ffbb78"
   ]
  }]
 },

 options:{
  responsive:true,
  plugins:{
   legend:{ display:false },
   tooltip:{
    callbacks:{
     label:function(context){

      const total = context.dataset.data.reduce((a,b)=>a+b,0);
      const valor = context.raw;
      const porcentaje = ((valor/total)*100).toFixed(2);

      return `${context.label}: $${valor.toLocaleString()} (${porcentaje}%)`;

     }
    }
   }
  }
 }

});
const listaDiv = document.getElementById("listaParticipacion");

listaDiv.innerHTML = "";

const totalGrafica = valores.reduce((a,b)=>a+b,0);

labels.forEach((label,i)=>{

 const porcentaje = ((valores[i] / totalGrafica) * 100).toFixed(2);

 const item = document.createElement("div");

 item.className = "lista-item";

 item.innerHTML = `
<div class="item-left">
<div class="color-box" style="background:${grafica.data.datasets[0].backgroundColor[i]};"></div>
${label}
</div>

<div class="item-right">
${porcentaje}% &nbsp; ($${valores[i].toLocaleString()})
</div>
`;

 listaDiv.appendChild(item);

});

}
async function cargarTopClientesGeneral(sucursal){

const { data, error } = await supabase.rpc(
 "top_clientes_general",
 {
  sucursal_param: sucursal,
  mes_param: mesSelect.value
 }
);

if(error){

}

const tabla = document.getElementById("tablaTopClientes");

tabla.innerHTML = "";

const totalClientes = data.reduce(

);

data.forEach((row,index)=>{

 const tr = document.createElement("tr");
;

const porcentaje = totalClientes > 0

 tr.innerHTML = `

<td>${row.nombre_cliente || "SIN NOMBRE"}</td>
<td>$${Number(row.total_comprado).toLocaleString()}</td>
<td>${porcentaje}%</td>
`;

 tabla.appendChild(tr);

});

}

cargarSucursales().then(async ()=>{

 await cargarImpuestos();

 cargarMeses();

 cargarTopArticulos("GLOBAL");

function limpiarTexto(texto){
 return texto
 .normalize("NFD")
 .replace(/[\u0300-\u036f]/g,"")
 .replace(/\s+/g," ")
 .trim();
}

   doc.text(desc.substring(0,55),25,y);

   doc.text(
    "$"+total.toLocaleString('es-MX',{minimumFractionDigits:2}),
    150,
    y
   );

   doc.text(
    porcentaje+"%",
    195,
    y,
    {align:"right"}
   );

   y+=5;

 });
// -------- TOP GENERAL CLIENTES --------

// espacio extra entre tablas
y += 20;

// verificar espacio en página
if (y > 240){
 doc.addPage();
 y = 15;
}

doc.setFontSize(14);
doc.text("TOP GENERAL CLIENTES",14,y);

y += 10;

const { data: clientesGeneral, error: errorClientes } =
await supabase.rpc(
 "top_clientes_general",
 {
   sucursal_param: sucursal,
   mes_param: mesSelect.value
 }
);

if(errorClientes){

 doc.text("Error obteniendo clientes",14,y);
 y += 6;

}else if(clientesGeneral && clientesGeneral.length){

 doc.setFontSize(11);
 doc.setFont(undefined,"bold");

 doc.text("#",14,y);
 doc.text("No. Cliente",22,y);
 doc.text("Cliente",45,y);
 doc.text("Total Comprado",165,y,{align:"right"});
 doc.text("% Venta",195,y,{align:"right"});

 y += 4;

 doc.line(14,y,196,y);

 y += 4;

 doc.setFont(undefined,"normal");

 clientesGeneral.forEach((c,index)=>{

  const nombreCliente = limpiarTexto(
    String(c.nombre_cliente ?? "SIN NOMBRE")
  );

  const totalCliente = Number(c.total_comprado ?? 0);

  const porcentaje =
  totalGeneral > 0
  ? ((totalCliente / totalGeneral) * 100).toFixed(2)
  : "0.00";

  const textoCorto =
  nombreCliente.length > 40
  ? nombreCliente.substring(0,40) + "..."
  : nombreCliente;

  const numeroCliente = c.numero_cliente || "-";

  doc.text(String(index + 1),14,y);
  doc.text(String(numeroCliente),22,y);
  doc.text(textoCorto,45,y);

  doc.text(
   "$" + totalCliente.toLocaleString('es-MX',{
    minimumFractionDigits:2
   }),
   165,
   y,
   {align:"right"}
  );

  doc.text(
   porcentaje + "%",
   195,
   y,
   {align:"right"}
  );

  y += 5;

  if(y > 270){
   doc.addPage();
   y = 15;
  }

 });

 doc.line(14,y,196,y);

 y += 8;

}else{

 doc.text("Sin clientes disponibles",14,y);
 y += 6;

}
 doc.save(`Reporte_${sucursal}.pdf`);

}
</script>

<div class="modal-header">

<h3 id="modalTitulo">Top 5 Clientes</h3>

<button id="cerrarModal">✕</button>

</div>

<div id="modalBody"></div>

</div>

</div>

</body>
