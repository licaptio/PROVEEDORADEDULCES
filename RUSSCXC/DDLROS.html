<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISTRIBUIDORA DE DULCES DE LA ROSA </title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f4f6f8;
--card:#ffffff;
--primary:#0c6cbd;
--border:#e2e6ea;
--text:#1f2933;
--success:#0a6c21;
}

body{
font-family: system-ui,-apple-system,Segoe UI,Roboto;
background:var(--bg);
margin:0;
padding:16px;
color:var(--text);
}

.container{
max-width:1400px;
margin:auto;
display:grid;
gap:14px;
}

h2{
margin:0;
font-weight:700;
}

.card{
background:var(--card);
border-radius:10px;
padding:14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.total span{
font-size:1.6rem;
font-weight:700;
color:var(--success);
}

.table-wrap{
overflow-x:auto;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
background:white;
}

th,td{
padding:9px;
border-bottom:1px solid var(--border);
font-size:.85rem;
}

th{
background:var(--primary);
color:white;
text-align:left;
position:sticky;
top:0;
}

td.numero{
text-align:right;
}

.uuid{
font-family:ui-monospace,Menlo,monospace;
cursor:pointer;
position:relative;
}

.uuid:hover::after{
content:attr(data-full);
position:absolute;
left:0;
top:26px;
background:#111;
color:#fff;
padding:6px 8px;
font-size:.75rem;
border-radius:4px;
white-space:nowrap;
z-index:10;
}

.uuid:hover::before{
content:"";
position:absolute;
top:20px;
left:10px;
border:6px solid transparent;
border-bottom-color:#111;
}

.small{
opacity:.75;
font-size:.8rem;
}

.loader{
padding:12px;
}

</style>
</head>

<body>

<div class="container">

<h2>📦 DISTRIBUIDORA DE DULCES DE LA ROSA</h2>

<div id="emisor" class="card"></div>

<div id="total" class="card total"></div>

<div id="tabla" class="card table-wrap"></div>

</div>

<script type="module">

import { supabaseUrl, supabaseAnonKey } from "./config.js";

const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

function uuidCorto(uuid){
if(!uuid) return "";
return uuid.substring(0,8)+"…"+uuid.substring(uuid.length-6);
}

function setLoading(){
document.getElementById("tabla").innerHTML = `
<div class="loader">Cargando datos...</div>
`;
}

async function cargar(){

setLoading();

const {data,error} = await supabase
.from("v_deuda_proveedores")
.select("*")
.eq("rfc_emisor","DRO020122GZ9")
.eq("factura_pagada","NO")
.order("fecha",{ascending:true});

if(error){
console.error(error);
alert("Error cargando datos");
return;
}

if(!data || data.length===0){
document.getElementById("tabla").innerHTML="Sin resultados";
return;
}

const emisor=data[0];

document.getElementById("emisor").innerHTML=`
<b>RFC:</b> ${emisor.rfc_emisor}<br>
<b>Razón Social:</b> ${emisor.razon_social_emisor}<br>
<b>Régimen Fiscal:</b> ${emisor.regimen_fiscal_emisor}
`;

const totalGlobal=data.reduce((acc,f)=>acc+(parseFloat(f.total)||0),0);

document.getElementById("total").innerHTML=`
Deuda Total Pendiente<br>
<span>$${totalGlobal.toLocaleString("es-MX",{minimumFractionDigits:2})}</span>
<div class="small">Facturas: ${data.length}</div>
`;

let html=`
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Días</th>
<th>UUID</th>
<th>Serie/Folio</th>
<th>Total</th>
<th>Forma</th>
<th>Método</th>
<th>Condiciones</th>
<th>Físico</th>
<th>Pagada</th>
</tr>
</thead>
<tbody>
`;

for(const f of data){

const fecha=f.fecha?String(f.fecha).split("T")[0]:"";
const dias=f.dias ?? "";
const folio=f.serie_folio || `${f.serie||""}-${f.folio||""}`;
const total=Number(f.total||0).toLocaleString("es-MX",{minimumFractionDigits:2});
const uuid=f.uuid_cfdi||"";

html+=`
<tr>

<td>${fecha}</td>

<td>${dias}</td>

<td class="uuid" data-full="${uuid}">
${uuidCorto(uuid)}
</td>

<td>${folio}</td>

<td class="numero">$${total}</td>

<td>${f.forma_pago ?? ""}</td>

<td>${f.metodo_pago ?? ""}</td>

<td>${f.condiciones_pago ?? ""}</td>

<td>${f.factura_fisicamente ?? ""}</td>

<td>${f.factura_pagada ?? ""}</td>

</tr>
`;
}

html+="</tbody></table>";

document.getElementById("tabla").innerHTML=html;

}

document.addEventListener("DOMContentLoaded",cargar);

</script>

</body>
</html>
