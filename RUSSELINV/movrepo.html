<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KARDEX GLOBAL POR SKU</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef1f5;
  margin:0;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  padding:16px;
  margin-bottom:20px;
}

input, button{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  width:100%;
}

button{
  background:#0c4a6e;
  color:white;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td{
  padding:8px;
  border-bottom:1px solid #e5e7eb;
}

th{
  background:#f6f7fb;
  text-align:left;
}

.suggestion{
  padding:6px;
  cursor:pointer;
}

.suggestion:hover{
  background:#eef1f5;
}
</style>
</head>

<body>

<h2>KARDEX GLOBAL POR PRODUCTO</h2>

<div class="card">

  <div style="display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));">

    <div>
      <label>Buscar Producto</label><br>
      <input type="text" id="productoInput" placeholder="Ej: CHILE JAPONES">
      <div id="sugerencias"></div>
    </div>

    <div>
      <label>Fecha Inicial</label><br>
      <input type="date" id="fechaInicio">
    </div>

    <div>
      <label>Fecha Final</label><br>
      <input type="date" id="fechaFin">
    </div>

  </div>

  <br>
  <button id="buscarBtn">Buscar Kardex</button>

</div>

<div class="card">
  <div id="resultado">Sin resultados.</div>
</div>

<script type="module">

import { firebaseConfig } from './config.js'
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const inputProducto = document.getElementById("productoInput");
const sugerenciasDiv = document.getElementById("sugerencias");
const btn = document.getElementById("buscarBtn");
const resultado = document.getElementById("resultado");

let productosCache = [];
let productoSeleccionado = null;

/* =========================
   CARGAR CATALOGO PRODUCTOS
========================= */
async function cargarProductos(){
  const snap = await getDocs(collection(db,"productos"));
  productosCache = snap.docs.map(d=>({
    id: d.id,
    ...d.data()
  }));
}

await cargarProductos();

/* =========================
   AUTOCOMPLETE POR NOMBRE
========================= */
inputProducto.addEventListener("input", ()=>{

  const texto = inputProducto.value.toLowerCase();
  sugerenciasDiv.innerHTML = "";
  productoSeleccionado = null;

  if(texto.length < 2) return;

  const coincidencias = productosCache.filter(p =>
    (p.concepto || "").toLowerCase().includes(texto)
  ).slice(0,8);

  coincidencias.forEach(p=>{
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerText = `${p.concepto}  (${p.codigoBarra})`;
    div.onclick = ()=>{
      inputProducto.value = p.concepto;
      productoSeleccionado = p;
      sugerenciasDiv.innerHTML = "";
    };
    sugerenciasDiv.appendChild(div);
  });

});

/* =========================
   BUSCAR KARDEX
========================= */
btn.addEventListener("click", async ()=>{

  if(!productoSeleccionado){
    alert("Selecciona un producto de la lista.");
    return;
  }

  const sku = productoSeleccionado.codigoBarra || productoSeleccionado.id;
  const nombre = productoSeleccionado.concepto;
  const fechaInicio = document.getElementById("fechaInicio").value;
  const fechaFin = document.getElementById("fechaFin").value;

  resultado.innerHTML = "Buscando...";

  const movimientos = [];

  const almacenesSnap = await getDocs(collection(db,"almacenes"));

  for(const almacenDoc of almacenesSnap.docs){

    const nombreAlmacen = almacenDoc.id;

    const salidasSnap = await getDocs(
      collection(db,"almacenes",nombreAlmacen,"salidas")
    );

    salidasSnap.forEach(doc=>{
      const data = doc.data();
      const lista = data.productos || [];
      const timestamp = data.timestamp?.toDate();
      if(!timestamp) return;

      if(fechaInicio){
        const fi = new Date(fechaInicio);
        if(timestamp < fi) return;
      }

      if(fechaFin){
        const ff = new Date(fechaFin);
        ff.setHours(23,59,59);
        if(timestamp > ff) return;
      }

      lista.forEach(p=>{
        if(String(p.codigo).trim() === sku){

          movimientos.push({
            almacen: nombreAlmacen,
            fecha: timestamp,
            cantidad: Number(p.cantidad||0)
          });

        }
      });

    });
  }

  movimientos.sort((a,b)=>a.fecha-b.fecha);

  if(!movimientos.length){
    resultado.innerHTML = "No se encontraron movimientos.";
    return;
  }

  let total = 0;

  let rows = movimientos.map(m=>{
    total += m.cantidad;
    return `
      <tr>
        <td>${m.fecha.toLocaleString()}</td>
        <td>${m.almacen}</td>
        <td style="text-align:right">${m.cantidad}</td>
      </tr>
    `;
  }).join("");

  resultado.innerHTML = `
    <h3>${nombre}</h3>
    <p><strong>SKU:</strong> ${sku}</p>
    <p><strong>Total Salidas:</strong> ${total}</p>

    <table>
      <thead>
        <tr>
          <th>Fecha / Hora</th>
          <th>Almacén</th>
          <th style="text-align:right">Cantidad</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  `;

});

</script>

</body>
</html>
