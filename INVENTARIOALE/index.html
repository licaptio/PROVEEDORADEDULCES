<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PROVSOFT - Inventario Cíclico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --azul: #00416A;
      --azul2: #0c6cbd;
      --gris: #f1f5f9;
      --card: #ffffff;
      --shadow: 0 12px 30px rgba(0,0,0,.12);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--gris);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      margin: 0;
      color: var(--azul);
    }

    .menu {
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card);
      padding: 25px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .2s;
      border-left: 6px solid var(--azul);
    }

    .card:hover {
      transform: translateY(-4px);
      background: #f8fafc;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .card p {
      margin: 0;
      font-size: 14px;
      color: #555;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>PROVSOFT</h1>
      <p>Inventario Cíclico - ALLENDE 1</p>
    </div>

    <div class="menu">

      <div class="card" onclick="ir('solicitudinventarioalle1.html')">
        <h2>📋 Generar Solicitud</h2>
        <p>Crear nueva solicitud de inventario (fijos + alta + baja)</p>
      </div>

      <div class="card" onclick="ir('responderasolicitudalle1.html')">
        <h2>✏️ Contestar Inventario</h2>
        <p>Capturar conteo físico de una solicitud pendiente</p>
      </div>

      <div class="card" onclick="alert('Aquí luego metemos dashboard')">
        <h2>📊 Panel (próximamente)</h2>
        <p>Consulta de resultados y diferencias</p>
      </div>

    </div>

    <div class="footer">
      PROVSOFT © 2026
    </div>

  </div>

  <script>
    function ir(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
