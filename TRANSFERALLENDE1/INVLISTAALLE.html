<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario vs Ventas por Fecha - PROVSOFT</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --azul: #00416A;
      --azul2: #0c6cbd;
      --gris: #e5e7eb;
      --gris2: #f8fafc;
      --texto: #1f2937;
      --verde: #166534;
      --rojo: #991b1b;
      --shadow: 0 10px 28px rgba(0,0,0,.10);

      --inv-head: #dbeafe;
      --inv-cell: #f8fbff;

      --vta-head: #fee2e2;
      --vta-cell: #fff5f5;

      --neto-head: #ecfccb;
      --neto-cell: #f7fee7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: var(--texto);
    }

    .wrap {
      max-width: 100%;
      padding: 18px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      background: linear-gradient(135deg, var(--azul), var(--azul2));
      color: white;
      padding: 18px 20px;
    }

    .topbar h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .topbar p {
      margin: 0;
      opacity: .95;
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: bold;
      color: #475569;
    }

    .field input, .field button {
      height: 40px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0 12px;
      font-size: 14px;
    }

    .field button {
      cursor: pointer;
      border: none;
      background: var(--azul);
      color: white;
      font-weight: bold;
    }

    .field button:hover {
      filter: brightness(1.05);
    }

    .field button.sec {
      background: #0f766e;
    }

    .status {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--gris);
      background: var(--gris2);
    }

    .status.ok { color: var(--verde); }
    .status.error { color: var(--rojo); }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--gris);
      background: #fff;
    }

    .pill {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 240px);
      background: white;
    }

    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      color: #0f172a;
    }

    th, td {
      border: 1px solid #dbe4f0;
      padding: 8px 10px;
      white-space: nowrap;
      text-align: right;
    }

    th.left, td.left {
      text-align: left;
    }

    .sticky1 {
      position: sticky;
      left: 0;
      z-index: 4;
      background: #fff;
      min-width: 130px;
      max-width: 130px;
    }

    .sticky2 {
      position: sticky;
      left: 130px;
      z-index: 4;
      background: #fff;
      min-width: 340px;
      max-width: 340px;
    }

    thead .sticky1,
    thead .sticky2,
    tfoot .sticky1,
    tfoot .sticky2 {
      background: #dbeafe;
    }

    th.inv-col { background: var(--inv-head); }
    td.inv-col { background: var(--inv-cell); }

    th.vta-col { background: var(--vta-head); }
    td.vta-col { background: var(--vta-cell); }

    th.total-col, td.total-col {
      background: #f8fafc;
      font-weight: bold;
    }

    th.neto-col { background: var(--neto-head); }
    td.neto-col {
      background: var(--neto-cell);
      font-weight: bold;
    }

    td.num-zero {
      color: #94a3b8;
    }

    td.negativo {
      color: #b91c1c;
      font-weight: bold;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      background: #ecfdf5;
      font-weight: bold;
      z-index: 3;
    }

    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <h1>Inventario vs Ventas por Fecha - ALLENDE 1</h1>
        <p>Las ventas van separadas del inventario, aunque caigan en la misma fecha.</p>
      </div>

      <div class="controls">
        <div class="field">
          <label>Filtro código</label>
          <input type="text" id="filtroCodigo" placeholder="Ej. 010921" />
        </div>
        <div class="field">
          <label>Filtro descripción</label>
          <input type="text" id="filtroDescripcion" placeholder="Buscar descripción" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div style="display:flex; gap:10px;">
            <button id="btnCargar" style="flex:1;">Cargar</button>
            <button id="btnExportar" class="sec" style="flex:1;">Exportar CSV</button>
          </div>
        </div>
      </div>

      <div id="status" class="status">Esperando consulta...</div>
      <div id="summary" class="summary"></div>

      <div class="table-wrap">
        <table id="tablaPivot">
          <thead></thead>
          <tbody></tbody>
          <tfoot></tfoot>
        </table>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSy...",
      authDomain: "inventariopv-643f1.firebaseapp.com",
      projectId: "inventariopv-643f1",
      storageBucket: "inventariopv-643f1.firebasestorage.app",
      messagingSenderId: "96242533231",
      appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();

    const INVENTARIOS_REF = db
      .collection("TIENDAS")
      .doc("ALLENDE 1")
      .collection("inventario1");

    const VENTAS_REF = db
      .collection("TIENDAS")
      .doc("ALLENDE 1")
      .collection("ventas");

    const $ = (id) => document.getElementById(id);
    const tabla = $("tablaPivot");
    const thead = tabla.querySelector("thead");
    const tbody = tabla.querySelector("tbody");
    const tfoot = tabla.querySelector("tfoot");

    let ultimaPivot = null;

    function setStatus(msg, type = "") {
      const el = $("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    function fmtNum(n) {
      return Number(n || 0).toLocaleString("es-MX", {
        maximumFractionDigits: 2
      });
    }

    function limpiarTabla() {
      thead.innerHTML = "";
      tbody.innerHTML = "";
      tfoot.innerHTML = "";
      $("summary").innerHTML = "";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizarFecha(valor) {
      if (!valor) return "";

      if (typeof valor === "string") {
        const v = valor.trim();

        const m1 = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (m1) {
          const [, dd, mm, yyyy] = m1;
          return `${yyyy}-${mm}-${dd}`;
        }

        const m2 = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m2) {
          return `${m2[1]}-${m2[2]}-${m2[3]}`;
        }

        return v;
      }

      if (valor && typeof valor.toDate === "function") {
        const d = valor.toDate();
        return d.toISOString().slice(0, 10);
      }

      if (valor && typeof valor.seconds === "number") {
        const d = new Date(valor.seconds * 1000);
        return d.toISOString().slice(0, 10);
      }

      return String(valor).trim();
    }

    function normalizarCodigo(valor) {
      const s = String(valor ?? "").trim();
      if (!s) return "";

      const soloDigitos = s.replace(/\D/g, "");

      if (!soloDigitos) {
        return s.toLowerCase();
      }

      return soloDigitos.replace(/^0+/, "") || "0";
    }

    function obtenerCampo(data, nombres = []) {
      for (const nombre of nombres) {
        if (data[nombre] !== undefined && data[nombre] !== null) {
          return data[nombre];
        }
      }
      return "";
    }

    function obtenerCantidadVenta(data) {
      const valor = obtenerCampo(data, [
        "Cantidad vendida",
        "cantidad vendida",
        "Cantidad",
        "cantidad",
        "cant",
        "unidades",
        "totalCantidad",
        "total"
      ]);
      return Number(valor || 0);
    }

    function obtenerCodigoVenta(data) {
      const valor = obtenerCampo(data, [
        "Codigo",
        "codigo",
        "Código",
        "CODIGO"
      ]);
      return String(valor || "").trim();
    }

    function obtenerDescripcionVenta(data) {
      const valor = obtenerCampo(data, [
        "descripcion",
        "Descripción",
        "Descripcion",
        "producto",
        "Producto"
      ]);
      return String(valor || "").trim();
    }

    function obtenerFechaVenta(data) {
      const valor = obtenerCampo(data, [
        "Fecha",
        "fecha",
        "FECHA"
      ]);
      return normalizarFecha(valor);
    }

    async function cargarInventarios() {
      const foliosSnap = await INVENTARIOS_REF
        .orderBy(firebase.firestore.FieldPath.documentId(), "asc")
        .get();

      const docs = [];

      for (const folioDoc of foliosSnap.docs) {
        const itemsSnap = await folioDoc.ref.collection("items").get();

        itemsSnap.forEach(itemDoc => {
          const data = itemDoc.data() || {};

          const codigoOriginal = String(
            data.codigo ??
            data.Codigo ??
            ""
          ).trim();

          const descripcion = String(
            data.descripcion ??
            data.Descripcion ??
            ""
          ).trim();

          const fecha = normalizarFecha(
            data.fecha ??
            data.Fecha ??
            ""
          );

          const cantidad = Number(
            data.cantidad ??
            data.Cantidad ??
            0
          );

          docs.push({
            origen: "INV",
            id: itemDoc.id,
            codigo: codigoOriginal,
            codigoKey: normalizarCodigo(codigoOriginal),
            descripcion,
            fecha,
            cantidad
          });
        });
      }

      return {
        docs,
        totalFolios: foliosSnap.size
      };
    }

    async function cargarVentas() {
      const ventasSnap = await VENTAS_REF.get();
      const docs = [];

      console.log("Docs ventas encontrados:", ventasSnap.size);

      ventasSnap.forEach(doc => {
        const data = doc.data() || {};

        const codigoOriginal = obtenerCodigoVenta(data);

        const venta = {
          origen: "VTA",
          id: doc.id,
          codigo: codigoOriginal,
          codigoKey: normalizarCodigo(codigoOriginal),
          descripcion: obtenerDescripcionVenta(data),
          fecha: obtenerFechaVenta(data),
          cantidad: obtenerCantidadVenta(data)
        };

        console.log("VENTA LEIDA:", venta, data);

        if (venta.codigoKey && venta.fecha) {
          docs.push(venta);
        }
      });

      console.log("Ventas válidas procesadas:", docs.length);

      return {
        docs,
        totalVentasDocs: ventasSnap.size
      };
    }

    async function cargarTodo() {
      try {
        limpiarTabla();
        setStatus("Consultando inventarios y ventas...");

        const filtroCodigo = $("filtroCodigo").value.trim().toLowerCase();
        const filtroDescripcion = $("filtroDescripcion").value.trim().toLowerCase();

        const [inventariosData, ventasData] = await Promise.all([
          cargarInventarios(),
          cargarVentas()
        ]);

        let registros = [
          ...inventariosData.docs,
          ...ventasData.docs
        ];

        registros = registros.filter(item => {
          const codigoVisible = String(item.codigo || "").toLowerCase();
          const codigoKey = String(item.codigoKey || "").toLowerCase();
          const descripcion = String(item.descripcion || "").toLowerCase();

          const okCodigo = !filtroCodigo ||
            codigoVisible.includes(filtroCodigo) ||
            codigoKey.includes(filtroCodigo.replace(/\D/g, "").replace(/^0+/, "") || filtroCodigo);

          const okDescripcion = !filtroDescripcion || descripcion.includes(filtroDescripcion);

          return okCodigo && okDescripcion;
        });

        registros.sort((a, b) => {
          const fa = String(a.fecha || "");
          const fb = String(b.fecha || "");
          if (fa !== fb) return fa.localeCompare(fb, "es");

          if (a.origen !== b.origen) return a.origen.localeCompare(b.origen, "es");

          return String(a.codigo || "").localeCompare(String(b.codigo || ""), "es");
        });

        if (!registros.length) {
          setStatus("No se encontraron registros.", "error");
          return;
        }

        const pivot = construirPivotSeparado(registros);
        ultimaPivot = pivot;

        pintarResumen(registros, pivot);
        pintarTabla(pivot);

        setStatus(
          `Listo. Inventarios: ${inventariosData.docs.length} | Ventas leídas: ${ventasData.docs.length} | Filtrados: ${registros.length}`,
          "ok"
        );
      } catch (err) {
        console.error(err);
        setStatus("Error al consultar Firestore: " + err.message, "error");
      }
    }

    function construirPivotSeparado(registros) {
      const fechasSet = new Set();
      const mapa = new Map();

      const totalInvPorFecha = {};
      const totalVtaPorFecha = {};

      let totalInvGeneral = 0;
      let totalVtaGeneral = 0;

      for (const item of registros) {
        const codigo = String(item.codigo || "").trim();
        const codigoKey = String(item.codigoKey || "").trim();
        const descripcion = String(item.descripcion || "").trim();
        const fecha = String(item.fecha || "").trim();
        const cantidad = Number(item.cantidad || 0);
        const origen = item.origen === "VTA" ? "VTA" : "INV";

        if (!codigoKey || !fecha) continue;

        fechasSet.add(fecha);

        if (!mapa.has(codigoKey)) {
          mapa.set(codigoKey, {
            codigo,
            codigoKey,
            descripcion,
            invPorFecha: {},
            vtaPorFecha: {},
            totalInv: 0,
            totalVta: 0,
            neto: 0
          });
        }

        const row = mapa.get(codigoKey);

        if (origen === "INV" && codigo) {
          row.codigo = codigo;
        } else if (!row.codigo && codigo) {
          row.codigo = codigo;
        }

        if (!row.descripcion && descripcion) {
          row.descripcion = descripcion;
        }

        if (origen === "INV") {
          row.invPorFecha[fecha] = (row.invPorFecha[fecha] || 0) + cantidad;
          row.totalInv += cantidad;
          totalInvPorFecha[fecha] = (totalInvPorFecha[fecha] || 0) + cantidad;
          totalInvGeneral += cantidad;
        } else {
          row.vtaPorFecha[fecha] = (row.vtaPorFecha[fecha] || 0) + cantidad;
          row.totalVta += cantidad;
          totalVtaPorFecha[fecha] = (totalVtaPorFecha[fecha] || 0) + cantidad;
          totalVtaGeneral += cantidad;
        }

        row.neto = row.totalInv - row.totalVta;
      }

      const fechas = Array.from(fechasSet).sort();

      const columnas = [];
      for (const fecha of fechas) {
        columnas.push({ fecha, tipo: "INV" });
        columnas.push({ fecha, tipo: "VTA" });
      }

      const rows = Array.from(mapa.values()).sort((a, b) =>
        String(a.codigo || "").localeCompare(String(b.codigo || ""), "es")
      );

      return {
        fechas,
        columnas,
        rows,
        totalInvPorFecha,
        totalVtaPorFecha,
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral: totalInvGeneral - totalVtaGeneral,
        totalCodigos: rows.length
      };
    }

    function pintarResumen(registros, pivot) {
      const totalInvRegs = registros.filter(x => x.origen === "INV").length;
      const totalVtaRegs = registros.filter(x => x.origen === "VTA").length;

      $("summary").innerHTML = `
        <div class="pill">Registros inventario: ${fmtNum(totalInvRegs)}</div>
        <div class="pill">Registros ventas: ${fmtNum(totalVtaRegs)}</div>
        <div class="pill">Códigos únicos: ${fmtNum(pivot.totalCodigos)}</div>
        <div class="pill">Fechas: ${fmtNum(pivot.fechas.length)}</div>
        <div class="pill">Total inventario: ${fmtNum(pivot.totalInvGeneral)}</div>
        <div class="pill">Total ventas: ${fmtNum(pivot.totalVtaGeneral)}</div>
        <div class="pill">Neto: ${fmtNum(pivot.totalNetoGeneral)}</div>
      `;
    }

    function pintarTabla(pivot) {
      const {
        columnas,
        rows,
        totalInvPorFecha,
        totalVtaPorFecha,
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral
      } = pivot;

      const trHead = document.createElement("tr");
      trHead.innerHTML = `
        <th class="left sticky1">Código</th>
        <th class="left sticky2">Descripción</th>
        ${columnas.map(col => `
          <th class="${col.tipo === "INV" ? "inv-col" : "vta-col"}">
            ${escapeHtml(col.fecha)} ${col.tipo}
          </th>
        `).join("")}
        <th class="total-col">TOTAL INV</th>
        <th class="total-col">TOTAL VTA</th>
        <th class="neto-col">NETO</th>
      `;
      thead.appendChild(trHead);

      const frag = document.createDocumentFragment();

      for (const row of rows) {
        const tr = document.createElement("tr");

        let html = `
          <td class="left sticky1">${escapeHtml(row.codigo)}</td>
          <td class="left sticky2">${escapeHtml(row.descripcion || "")}</td>
        `;

        for (const col of columnas) {
          const val = col.tipo === "INV"
            ? (row.invPorFecha[col.fecha] || 0)
            : (row.vtaPorFecha[col.fecha] || 0);

          html += `
            <td class="${col.tipo === "INV" ? "inv-col" : "vta-col"} ${val === 0 ? "num-zero" : ""}">
              ${val === 0 ? "" : fmtNum(val)}
            </td>
          `;
        }

        html += `
          <td class="total-col">${fmtNum(row.totalInv)}</td>
          <td class="total-col">${fmtNum(row.totalVta)}</td>
          <td class="neto-col ${row.neto < 0 ? "negativo" : ""}">${fmtNum(row.neto)}</td>
        `;

        tr.innerHTML = html;
        frag.appendChild(tr);
      }

      tbody.appendChild(frag);

      const trFoot = document.createElement("tr");
      trFoot.innerHTML = `
        <td class="left sticky1"><b>TOTAL</b></td>
        <td class="left sticky2"><b>Suma por fecha</b></td>
        ${columnas.map(col => {
          const val = col.tipo === "INV"
            ? (totalInvPorFecha[col.fecha] || 0)
            : (totalVtaPorFecha[col.fecha] || 0);

          return `<td class="${col.tipo === "INV" ? "inv-col" : "vta-col"}"><b>${fmtNum(val)}</b></td>`;
        }).join("")}
        <td class="total-col"><b>${fmtNum(totalInvGeneral)}</b></td>
        <td class="total-col"><b>${fmtNum(totalVtaGeneral)}</b></td>
        <td class="neto-col"><b>${fmtNum(totalNetoGeneral)}</b></td>
      `;
      tfoot.appendChild(trFoot);
    }

    function exportarCSV() {
      if (!ultimaPivot) {
        alert("Primero carga la información.");
        return;
      }

      const {
        columnas,
        rows,
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral
      } = ultimaPivot;

      const header = [
        "codigo",
        "descripcion",
        ...columnas.map(c => `${c.fecha}_${c.tipo}`),
        "total_inv",
        "total_vta",
        "neto"
      ];

      const lines = [header.map(csvSafe).join(",")];

      for (const row of rows) {
        const vals = [
          row.codigo,
          row.descripcion || "",
          ...columnas.map(col =>
            col.tipo === "INV"
              ? (row.invPorFecha[col.fecha] || 0)
              : (row.vtaPorFecha[col.fecha] || 0)
          ),
          row.totalInv || 0,
          row.totalVta || 0,
          row.neto || 0
        ];

        lines.push(vals.map(csvSafe).join(","));
      }

      const totalLine = [
        "TOTAL",
        "Suma por fecha",
        ...columnas.map(col =>
          col.tipo === "INV"
            ? (ultimaPivot.totalInvPorFecha[col.fecha] || 0)
            : (ultimaPivot.totalVtaPorFecha[col.fecha] || 0)
        ),
        totalInvGeneral,
        totalVtaGeneral,
        totalNetoGeneral
      ];

      lines.push(totalLine.map(csvSafe).join(","));

      const blob = new Blob(["\uFEFF" + lines.join("\n")], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `inventario_vs_ventas_allende1_${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function csvSafe(value) {
      const s = String(value ?? "").replace(/"/g, '""');
      return `"${s}"`;
    }

    $("btnCargar").addEventListener("click", cargarTodo);
    $("btnExportar").addEventListener("click", exportarCSV);
    window.addEventListener("load", cargarTodo);
  </script>
</body>
</html>
