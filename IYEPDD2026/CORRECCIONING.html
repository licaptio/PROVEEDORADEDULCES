<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Corrección TURBO CFDI – PROVSOFT</title>

<style>
body{font-family:Arial;padding:20px;background:#f4f6f9}
button{padding:10px 16px;border-radius:8px;border:0;background:#0c6cbd;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#09599e}
pre{background:#0b1220;color:#dbeafe;padding:15px;border-radius:10px}
</style>
</head>

<body>

<h2>Corrección TURBO CFDI – PROVSOFT</h2>

<input type="file" id="xmlInput" multiple accept=".xml">
<button onclick="precargarXMLs()">Precargar</button>
<button onclick="procesarTurbo()">Procesar</button>

<pre id="bitacora"></pre>

<script>

const SUPABASE_URL="https://cvpbtjlupswbyxenugpz.supabase.co"
const API_KEY="TU_API_KEY"
const TABLA="ingresos_pdd"
const RFC_EMISOR_VALIDO="PDD031204KL5"

let archivosDatos=[]

function log(m){
document.getElementById("bitacora").textContent+=m+"\n"
}

function normalizaTexto(s){
return(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim()
}

function obtenerAtributoFlexible(node,nombres){
if(!node)return null

for(const n of nombres){
const v=node.getAttribute(n)
if(v!==null&&String(v).trim()!=="")return String(v).trim()
}

const buscados=nombres.map(normalizaTexto)

for(const a of Array.from(node.attributes||[])){
const name=normalizaTexto(a.name)
if(buscados.includes(name)){
const v=String(a.value||"").trim()
if(v!=="")return v
}
}

return null
}

function buscarNodo(xml,nombre){
for(const n of xml.getElementsByTagName("*")){
if((n.localName||"").toLowerCase()===nombre.toLowerCase())return n
}
return null
}

function detectarGlobal(xml,receptorRFC){

const infoGlobal=buscarNodo(xml,"InformacionGlobal")

if(infoGlobal)return true

if(receptorRFC==="XAXX010101000")return true

return false
}

function obtenerPeriodo(infoGlobal,comprobante){

let mes=null
let anio=null

if(infoGlobal){

mes=obtenerAtributoFlexible(infoGlobal,[
"Meses","Mes","mes","meses"
])

anio=obtenerAtributoFlexible(infoGlobal,[
"Año","Anio","Ano","anio","año","ano","year","Year"
])

}

if(!anio){
const fecha=obtenerAtributoFlexible(comprobante,["Fecha","fecha"])
if(fecha)anio=fecha.substring(0,4)
}

if(!mes){
const fecha=obtenerAtributoFlexible(comprobante,["Fecha","fecha"])
if(fecha)mes=fecha.substring(5,7)
}

return{mes,anio}

}

async function precargarXMLs(){

const files=Array.from(document.getElementById("xmlInput").files||[])

archivosDatos=[]

log("Leyendo XML...")

for(const file of files){

try{

const text=await file.text()

const parser=new DOMParser()
const xml=parser.parseFromString(text,"application/xml")

const comprobante=buscarNodo(xml,"Comprobante")
const emisor=buscarNodo(xml,"Emisor")
const receptor=buscarNodo(xml,"Receptor")
const timbre=buscarNodo(xml,"TimbreFiscalDigital")
const infoGlobal=buscarNodo(xml,"InformacionGlobal")

const uuid=(obtenerAtributoFlexible(timbre,["UUID","Uuid","uuid"])||"").toUpperCase()
const tipo=(obtenerAtributoFlexible(comprobante,["TipoDeComprobante","tipodecomprobante"])||"").toUpperCase()
const rfcEmisor=(obtenerAtributoFlexible(emisor,["Rfc","RFC"])||"").toUpperCase()
const rfcReceptor=(obtenerAtributoFlexible(receptor,["Rfc","RFC"])||"").toUpperCase()

if(tipo!=="I")continue
if(rfcEmisor!==RFC_EMISOR_VALIDO)continue

const esGlobal=detectarGlobal(xml,rfcReceptor)

const periodo=obtenerPeriodo(infoGlobal,comprobante)

archivosDatos.push({
uuid,
tipoFactura:esGlobal?"GLOBAL":"INDIVIDUAL",
periodoMes:periodo.mes,
periodoAnio:periodo.anio
})

log("OK "+uuid+" "+(esGlobal?"GLOBAL":"INDIVIDUAL"))

}catch(e){

log("Error leyendo "+file.name)

}

}

log("Precarga terminada "+archivosDatos.length)

}

async function consultarUUIDsExistentes(uuids){

const existentes=new Set()

const lista=uuids.map(u=>`"${u}"`).join(",")

const url=`${SUPABASE_URL}/rest/v1/${TABLA}?select=uuid_cfdi&uuid_cfdi=in.(${encodeURIComponent(lista)})`

const resp=await fetch(url,{
headers:{
apikey:API_KEY,
Authorization:`Bearer ${API_KEY}`
}
})

const data=await resp.json()

for(const r of data){
existentes.add(r.uuid_cfdi)
}

return existentes
}

async function procesarTurbo(){

if(!archivosDatos.length){
log("No hay datos")
return
}

const uuids=archivosDatos.map(x=>x.uuid)

const existentes=await consultarUUIDsExistentes(uuids)

const registros=[]

for(const a of archivosDatos){

if(!existentes.has(a.uuid))continue

registros.push({
uuid_cfdi:a.uuid,
periodo_mes:a.periodoMes,
periodo_anio:a.periodoAnio,
tipo_factura:a.tipoFactura
})

}

const url=`${SUPABASE_URL}/rest/v1/${TABLA}?on_conflict=uuid_cfdi`

const resp=await fetch(url,{
method:"POST",
headers:{
apikey:API_KEY,
Authorization:`Bearer ${API_KEY}`,
"Content-Type":"application/json",
"Prefer":"resolution=merge-duplicates"
},
body:JSON.stringify(registros)
})

if(resp.ok){
log("Actualizados "+registros.length)
}else{
log("Error actualizando")
}

}

</script>
</body>
</html>
