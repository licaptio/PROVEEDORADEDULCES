<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVSOFT – Buscar Factura por UUID</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

h2{
margin-bottom:15px;
}

.buscador{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:420px;
font-size:14px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#0c6cbd;
color:white;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#0c6cbd;
color:white;
padding:8px;
font-size:13px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:13px;
}

.total{
font-weight:bold;
font-size:15px;
text-align:right;
}

.btn{
padding:4px 10px;
border-radius:5px;
cursor:pointer;
border:none;
font-weight:bold;
}

.verde{
background:#2ecc71;
color:white;
}

.rojo{
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<h2>Buscar Factura por UUID</h2>

<div class="buscador">

<input
id="uuid"
placeholder="Pegue aquí el UUID"
/>

<button id="buscar">
Buscar
</button>

</div>

<table>

<thead>
<tr>

<th>Fecha</th>
<th>UUID</th>
<th>RFC</th>
<th>Proveedor</th>
<th>Factura</th>
<th>Total</th>
<th>Física</th>
<th>Pagada</th>
<th>Foto</th>

</tr>
</thead>

<tbody id="tabla">

<tr>
<td colspan="9">
Ingrese un UUID y presione buscar
</td>
</tr>

</tbody>

</table>

<script type="module">

import { supabaseUrl, supabaseAnonKey } from "./config.js";

const db = supabase.createClient(
supabaseUrl,
supabaseAnonKey
);

const tabla = document.getElementById("tabla");
const input = document.getElementById("uuid");

document.getElementById("buscar").onclick = buscar;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") buscar();
});

async function buscar(){

const uuid = input.value.trim();

if(!uuid){
alert("Ingrese un UUID");
return;
}

tabla.innerHTML = `
<tr>
<td colspan="9">Buscando...</td>
</tr>
`;

const {data,error} = await db
.from("deuda_limpia_pdd")
.select("*")
.ilike("uuid_cfdi", `%${uuid}%`);

if(error){
console.error(error);
tabla.innerHTML = `
<tr>
<td colspan="9">Error en consulta</td>
</tr>`;
return;
}

render(data);

}

function render(rows){

if(!rows.length){

tabla.innerHTML = `
<tr>
<td colspan="9">No se encontraron resultados</td>
</tr>
`;

return;

}

tabla.innerHTML = "";

rows.forEach(r=>{

const tr = document.createElement("tr");

tr.innerHTML = `

<td>${fmtFecha(r.fecha)}</td>

<td>
<a href="./detalle.html?uuid=${r.uuid_cfdi}" target="_blank">
${r.uuid_cfdi.slice(0,20)}
</a>
</td>

<td>${r.rfc_emisor || ""}</td>

<td>${r.razon_social_emisor || ""}</td>

<td>${(r.serie || "")}-${(r.folio || "")}</td>

<td class="total">
${fmtMXN(r.total)}
</td>

<td>
<button class="btn ${r.factura_fisicamente==="SI"?"verde":"rojo"}"
onclick="toggle('${r.id}','factura_fisicamente',this)">
${r.factura_fisicamente || "NO"}
</button>
</td>

<td>
<button class="btn ${r.factura_pagada==="SI"?"verde":"rojo"}"
onclick="toggle('${r.id}','factura_pagada',this)">
${r.factura_pagada || "NO"}
</button>
</td>

<td>
${
Array.isArray(r.fotos)
? r.fotos.map(u=>`<a href="${u}" target="_blank">📷</a>`).join("")
: ""
}
</td>

`;

tabla.appendChild(tr);

});

}

window.toggle = async function(id,col,btn){

const actual = btn.textContent.trim();
const nuevo = actual === "SI" ? "NO" : "SI";

btn.textContent = nuevo;
btn.classList.toggle("verde");
btn.classList.toggle("rojo");

const {error} = await db
.from("deuda_limpia_pdd")
.update({[col]:nuevo})
.eq("id",id);

if(error){

alert("Error al actualizar");

btn.textContent = actual;
btn.classList.toggle("verde");
btn.classList.toggle("rojo");

}

};

function fmtFecha(f){
return new Date(f).toLocaleDateString("es-MX");
}

function fmtMXN(v){
return Number(v||0).toLocaleString("es-MX",{
style:"currency",
currency:"MXN"
});
}

</script>

</body>
</html>
