<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingresos por Sucursal | PROVSOFT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --azul:#00416A;
  --azul2:#0c6cbd;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,var(--azul),#e4e5e6);
  padding:20px;
}

.app{max-width:1200px;margin:auto}

.header{
  background:rgba(0,0,0,.6);
  color:white;
  padding:15px;
  border-radius:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.loading{
  display:none;
  background:#fff7ed;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

#barra{
  height:12px;
  width:0%;
  background:linear-gradient(90deg,#0c6cbd,#00c6ff);
  transition:width .4s;
}

.chartBox{height:350px}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h2>Ingresos por Sucursal</h2>
  </div>

  <div class="loading" id="loading">
    <div id="loadingText">Iniciando...</div>
    <div style="background:#eee;border-radius:8px;margin-top:8px;">
      <div id="barra"></div>
    </div>
  </div>

  <div class="card">
    <select id="sucursalSelect"></select>
    <button onclick="iniciarApp()">Actualizar</button>
  </div>

  <div id="graficas"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
import { supabaseUrl, supabaseAnonKey } from "./config.js";

const supabase = createClient(supabaseUrl, supabaseAnonKey);
const VISTA = "mv_ingresos_mensual_sucursal";
const EJERCICIOS = [2026,2025,2024,2023];

const MESES = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function money(n){
  return Number(n||0).toLocaleString("es-MX",{style:"currency",currency:"MXN"});
}

function showLoading(v){
  document.getElementById("loading").style.display = v?"block":"none";
}

function setProgress(p,text){
  document.getElementById("barra").style.width = p+"%";
  document.getElementById("loadingText").textContent = text;
}

async function refrescar(){
  showLoading(true);
  setProgress(10,"Preparando...");

  await new Promise(r=>setTimeout(r,300));

  setProgress(30,"Calculando ingresos...");

const { error } = await supabase.rpc("refrescar_mv_ingresos_mensual_sucursal");

if(error){
  console.warn("No se pudo refrescar, continúo con datos existentes:", error.message);
}


  setProgress(60,"Resumen listo");
}

async function cargarSucursales(){
  setProgress(75,"Cargando sucursales...");

  const { data } = await supabase
    .from(VISTA)
    .select("sucursal")
    .order("sucursal");

  const lista = [...new Set(data.map(x=>x.sucursal))];

  const sel = document.getElementById("sucursalSelect");
  sel.innerHTML="";

  lista.forEach(s=>{
    const o=document.createElement("option");
    o.value=s;
    o.textContent=s;
    sel.appendChild(o);
  });
}

async function cargarDatos(){
  const suc = document.getElementById("sucursalSelect").value;

  setProgress(90,"Generando gráficas...");

  const { data } = await supabase
    .from(VISTA)
    .select("*")
    .eq("sucursal",suc)
    .in("ejercicio",EJERCICIOS)
    .order("ejercicio",{ascending:false})
    .order("mes");

  render(data,suc);

  setProgress(100,"Listo");
  setTimeout(()=>showLoading(false),400);
}

function normalizar(data,a){
  const m={};
  for(let i=1;i<=12;i++){
    m[i]={mes:i,val:0};
  }

  data.filter(x=>x.ejercicio==a).forEach(r=>{
    m[r.mes]={mes:r.mes,val:r.venta_antes_impuestos};
  });

  return Object.values(m);
}

const pluginEtiquetas = {
  id: 'pluginEtiquetas',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;

    chart.data.datasets.forEach((dataset, i) => {
      const meta = chart.getDatasetMeta(i);

      meta.data.forEach((bar, index) => {
        const value = dataset.data[index];

        if (!value) return;

        ctx.save();
ctx.fillStyle = "#1f2937";
ctx.font = "bold 10px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
          "$" + value.toLocaleString("es-MX"),
          bar.x,
          bar.y - 5
        );

        ctx.restore();
      });
    });
  }
};

function render(data,suc){
  const cont=document.getElementById("graficas");
  cont.innerHTML="";

  EJERCICIOS.forEach(a=>{
    const rows=normalizar(data,a);
    const total=rows.reduce((s,x)=>s+x.val,0);

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${suc} - ${a} (${money(total)})</h3>
      <div class="chartBox">
        <canvas id="c${a}"></canvas>
      </div>
    `;

    cont.appendChild(div);

new Chart(document.getElementById("c"+a),{
  type:"bar",
  data:{
    labels:rows.map(r=>MESES[r.mes]),
datasets:[{
  label:"Subtotal",
  data:rows.map(r=>r.val),
  backgroundColor:"#0c6cbd",
  borderRadius:6
}]
  },
  plugins:[pluginEtiquetas],
  options:{
    responsive:true,
    maintainAspectRatio:false,
    scales:{
      y:{
        ticks:{
          callback:(v)=>"$"+v.toLocaleString("es-MX")
        }
      }
    }
  }
});

  });
}

async function iniciarApp(){
  try{
    await refrescar();
    await cargarSucursales();
    await cargarDatos();
  }catch(e){
    console.error(e);
  }
}

iniciarApp();
</script>

</body>
</html>
