<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingresos SAT por Mes – PROVSOFT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #e5e7eb;
font-size:13px;
}

th{
background:#f3f6fb;
}

.num{text-align:right}

.global{
background:#fff3cd;
color:#92400e;
font-weight:bold;
padding:3px 8px;
border-radius:20px;
}

.individual{
background:#dbeafe;
color:#1e3a8a;
font-weight:bold;
padding:3px 8px;
border-radius:20px;
}
</style>
</head>

<body>

<h2>Ingresos SAT por Mes – PROVSOFT</h2>

Año
<select id="anio"></select>

Mes
<select id="mes">
<option value="01">Enero</option>
<option value="02">Febrero</option>
<option value="03">Marzo</option>
<option value="04">Abril</option>
<option value="05">Mayo</option>
<option value="06">Junio</option>
<option value="07">Julio</option>
<option value="08">Agosto</option>
<option value="09">Septiembre</option>
<option value="10">Octubre</option>
<option value="11">Noviembre</option>
<option value="12">Diciembre</option>
</select>

<button onclick="buscar()">Construir tabla</button>

<br><br>

<table>

<thead>
<tr>
<th>#</th>
<th>Fecha</th>
<th>UUID</th>
<th>Serie</th>
<th>Folio</th>
<th class="num">Subtotal</th>
<th class="num">IVA</th>
<th class="num">IEPS</th>
<th class="num">Total</th>
<th>Periodo Mes</th>
<th>Periodo Año</th>
<th>Clasificación</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const { createClient } = supabase

const db = createClient(
'https://cvpbtjlupswbyxenugpz.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY'
)

const TABLA = 'v_ingresos_sat_mes'

function llenarAnios(){

let actual=new Date().getFullYear()

for(let y=actual+1;y>=2020;y--){

let op=document.createElement("option")
op.value=y
op.text=y

document.getElementById("anio").appendChild(op)

}

document.getElementById("anio").value=actual

}

llenarAnios()

function money(n){

return Number(n||0).toLocaleString(
'es-MX',
{style:'currency',currency:'MXN'}
)

}

async function buscar(){

let anio=document.getElementById("anio").value
let mes=document.getElementById("mes").value

let inicio=`${anio}-${mes}-01`
let fin=new Date(anio,mes,1).toISOString().slice(0,10)

let globales=await db
.from(TABLA)
.select('*')
.eq('tipo_factura','GLOBAL')
.eq('periodo_anio',anio)
.eq('periodo_mes',mes)

let individuales=await db
.from(TABLA)
.select('*')
.neq('tipo_factura','GLOBAL')
.is('periodo_mes',null)
.is('periodo_anio',null)
.gte('fecha',inicio)
.lt('fecha',fin)

let rows=[...(globales.data||[]),...(individuales.data||[])]

rows.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha))

render(rows)

}

function render(rows){

let tb=document.getElementById("tabla")

if(!rows.length){

tb.innerHTML="<tr><td colspan='12'>Sin resultados</td></tr>"
return

}

tb.innerHTML=rows.map((r,i)=>{

let tipo=r.tipo_factura==='GLOBAL'
?`<span class="global">GLOBAL</span>`
:`<span class="individual">INDIVIDUAL</span>`

let periodoMes=r.tipo_factura==='GLOBAL'
?r.periodo_mes
:'-'

let periodoAnio=r.tipo_factura==='GLOBAL'
?r.periodo_anio
:'-'

return`

<tr>

<td>${i+1}</td>
<td>${r.fecha||''}</td>
<td>${r.uuid_cfdi||''}</td>
<td>${r.serie||''}</td>
<td>${r.folio||''}</td>

<td class="num">${money(r.subtotal)}</td>
<td class="num">${money(r.total_iva)}</td>
<td class="num">${money(r.total_ieps)}</td>
<td class="num"><b>${money(r.total)}</b></td>

<td>${periodoMes}</td>
<td>${periodoAnio}</td>

<td>${tipo}</td>

</tr>

`

}).join("")

}

</script>

</body>
</html>
