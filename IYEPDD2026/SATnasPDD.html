<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ingresos SAT por Mes – PROVSOFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --line:#dfe5ee;
      --text:#1f2937;
      --muted:#6b7280;
      --blue:#0c6cbd;
      --blue2:#0a58a0;
      --green:#0f9d58;
      --danger:#d93025;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:24px;
    }

    h1{
      margin:0 0 14px 0;
      font-size:26px;
    }

    .wrap{
      max-width:1600px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      padding:18px;
      margin-bottom:18px;
    }

    .controls{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:180px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    select, button, input{
      border:1px solid #cfd7e3;
      border-radius:10px;
      padding:11px 12px;
      font-size:14px;
      background:#fff;
    }

    button{
      background:var(--blue);
      color:#fff;
      border:none;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{background:var(--blue2)}
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .btn-secondary{
      background:#4b5563;
    }

    .btn-secondary:hover{
      background:#374151;
    }

    .status{
      font-size:14px;
      font-weight:700;
      color:var(--muted);
      margin-top:10px;
      min-height:20px;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
      gap:12px;
      margin-top:10px;
    }

    .kpi{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
    }

    .kpi .lbl{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.3px;
    }

    .kpi .val{
      font-size:22px;
      font-weight:800;
    }

    .table-wrap{
      overflow:auto;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1300px;
    }

    thead th{
      position:sticky;
      top:0;
      background:#f3f6fb;
      z-index:1;
      font-size:13px;
      text-align:left;
      border-bottom:1px solid var(--line);
      padding:12px 10px;
      white-space:nowrap;
    }

    tbody td{
      border-bottom:1px solid #edf1f5;
      padding:10px;
      font-size:13px;
      vertical-align:top;
    }

    tbody tr:hover{
      background:#fafcff;
    }

    .num{
      text-align:right;
      font-variant-numeric:tabular-nums;
    }

    .mono{
      font-family:Consolas, Monaco, monospace;
    }

    .chip{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#e8f1fb;
      color:#0c6cbd;
      white-space:nowrap;
    }

    .muted{
      color:var(--muted);
    }

    .danger{
      color:var(--danger);
      font-weight:700;
    }

    .ok{
      color:var(--green);
      font-weight:700;
    }

    .footer-note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    a.uuid-link{
      color:#0c6cbd;
      text-decoration:none;
      font-weight:700;
    }

    a.uuid-link:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ingresos SAT por Mes – PROVSOFT</h1>

    <div class="card">
      <div class="controls">
        <div class="field">
          <label for="anio">Año</label>
          <select id="anio"></select>
        </div>

        <div class="field">
          <label for="mes">Mes</label>
          <select id="mes">
            <option value="01">01 - Enero</option>
            <option value="02">02 - Febrero</option>
            <option value="03">03 - Marzo</option>
            <option value="04">04 - Abril</option>
            <option value="05">05 - Mayo</option>
            <option value="06">06 - Junio</option>
            <option value="07">07 - Julio</option>
            <option value="08">08 - Agosto</option>
            <option value="09">09 - Septiembre</option>
            <option value="10">10 - Octubre</option>
            <option value="11">11 - Noviembre</option>
            <option value="12">12 - Diciembre</option>
          </select>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="btnBuscar">Construir tabla</button>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="btnCsv" class="btn-secondary" disabled>Exportar CSV</button>
        </div>
      </div>

      <div id="status" class="status">Listo.</div>

      <div class="kpis">
        <div class="kpi">
          <div class="lbl">Registros</div>
          <div class="val" id="kpiRegistros">0</div>
        </div>
        <div class="kpi">
          <div class="lbl">Subtotal</div>
          <div class="val" id="kpiSubtotal">$0.00</div>
        </div>
        <div class="kpi">
          <div class="lbl">IVA</div>
          <div class="val" id="kpiIva">$0.00</div>
        </div>
        <div class="kpi">
          <div class="lbl">IEPS</div>
          <div class="val" id="kpiIeps">$0.00</div>
        </div>
        <div class="kpi">
          <div class="lbl">Total</div>
          <div class="val" id="kpiTotal">$0.00</div>
        </div>
      </div>

      <div class="footer-note">
        Lógica: GLOBAL por <b>periodo_mes / periodo_anio</b> + NO GLOBAL por <b>fecha</b> dentro del mes. Solo vigentes.
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>UUID</th>
              <th>Serie</th>
              <th>Folio</th>
              <th class="num">Subtotal</th>
              <th class="num">IVA</th>
              <th class="num">IEPS</th>
              <th class="num">Total</th>
              <th>Periodo Mes</th>
              <th>Periodo Año</th>
              <th>Tipo Factura</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
/* =========================
   CONFIG
========================= */
const SUPABASE_URL = 'https://cvpbtjlupswbyxenugpz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY';
const TABLA = 'ingresos_pdd';
const TIPO_GLOBAL = 'GLOBAL'; // cámbialo si en tu base el valor real es otro

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   ESTADO
========================= */
let rowsActuales = [];

/* =========================
   HELPERS UI
========================= */
const $ = (id) => document.getElementById(id);

function setStatus(msg, isError=false){
  const el = $('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' danger' : '');
}

function fmtMoney(n){
  return Number(n || 0).toLocaleString('es-MX', {
    style:'currency',
    currency:'MXN'
  });
}

function fmtFecha(v){
  if(!v) return '';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return String(v);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  const ss = String(d.getSeconds()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function toNumber(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function primerDiaMesUTC(anio, mes){
  return `${anio}-${mes}-01T00:00:00.000Z`;
}

function primerDiaMesSiguienteUTC(anio, mes){
  const y = Number(anio);
  const m = Number(mes);
  const next = new Date(Date.UTC(y, m, 1, 0, 0, 0)); // mes ya viene 1-12
  return next.toISOString();
}

function llenarAnios(){
  const sel = $('anio');
  const actual = new Date().getFullYear();
  let html = '';
  for(let y = actual + 1; y >= 2020; y--){
    html += `<option value="${y}">${y}</option>`;
  }
  sel.innerHTML = html;
  sel.value = String(actual);

  const mm = String(new Date().getMonth()+1).padStart(2,'0');
  $('mes').value = mm;
}

function actualizarKPIs(rows){
  const subtotal = rows.reduce((a,r)=>a + toNumber(r.subtotal),0);
  const iva      = rows.reduce((a,r)=>a + toNumber(r.total_iva),0);
  const ieps     = rows.reduce((a,r)=>a + toNumber(r.total_ieps),0);
  const total    = rows.reduce((a,r)=>a + toNumber(r.total),0);

  $('kpiRegistros').textContent = rows.length.toLocaleString('es-MX');
  $('kpiSubtotal').textContent = fmtMoney(subtotal);
  $('kpiIva').textContent      = fmtMoney(iva);
  $('kpiIeps').textContent     = fmtMoney(ieps);
  $('kpiTotal').textContent    = fmtMoney(total);
}

/* =========================
   FETCH PAGINADO
========================= */
async function fetchAll(builderFactory, pageSize = 1000){
  let all = [];
  let from = 0;

  while(true){
    const to = from + pageSize - 1;
    const query = builderFactory().range(from, to);
    const { data, error } = await query;

    if(error) throw error;
    if(!data || data.length === 0) break;

    all.push(...data);

    if(data.length < pageSize) break;
    from += pageSize;
  }

  return all;
}

/* =========================
   CONSULTA PRINCIPAL
========================= */
async function construirTabla(){
  const anio = $('anio').value;
  const mes  = $('mes').value;

  if(!anio || !mes){
    setStatus('Selecciona año y mes.', true);
    return;
  }

  const btnBuscar = $('btnBuscar');
  const btnCsv = $('btnCsv');

  btnBuscar.disabled = true;
  btnCsv.disabled = true;
  rowsActuales = [];
  $('tabla').innerHTML = '';
  actualizarKPIs([]);

  const inicio = primerDiaMesUTC(anio, mes);
  const fin = primerDiaMesSiguienteUTC(anio, mes);

  try{
    setStatus(`Consultando GLOBAL por periodo ${anio}-${mes}...`);

    const columnas = `
      fecha,
      uuid_cfdi,
      serie,
      folio,
      subtotal,
      total_iva,
      total_ieps,
      total,
      periodo_mes,
      periodo_anio,
      tipo_factura,
      cancelado
    `;

    // 1) GLOBAL por periodo
    const globales = await fetchAll(() =>
      db.from(TABLA)
        .select(columnas)
        .eq('cancelado', false)
        .eq('tipo_factura', TIPO_GLOBAL)
        .eq('periodo_anio', anio)
        .eq('periodo_mes', mes)
        .order('fecha', { ascending:true })
    );

    setStatus(`Consultando NO GLOBAL por fecha dentro de ${anio}-${mes}...`);

    // 2) NO GLOBAL por fecha
    const individuales = await fetchAll(() =>
      db.from(TABLA)
        .select(columnas)
        .eq('cancelado', false)
        .neq('tipo_factura', TIPO_GLOBAL)
        .gte('fecha', inicio)
        .lt('fecha', fin)
        .order('fecha', { ascending:true })
    );

    // 3) Unir y deduplicar por UUID
    const mapa = new Map();

    [...globales, ...individuales].forEach(r => {
      const key = r.uuid_cfdi || `${r.serie||''}-${r.folio||''}-${r.fecha||''}`;
      if(!mapa.has(key)){
        mapa.set(key, r);
      }
    });

    const unidos = Array.from(mapa.values()).sort((a,b)=>{
      const fa = new Date(a.fecha || 0).getTime();
      const fb = new Date(b.fecha || 0).getTime();
      if (fa !== fb) return fa - fb;
      return String(a.folio || '').localeCompare(String(b.folio || ''), 'es');
    });

    rowsActuales = unidos;
    renderTabla(unidos);
    actualizarKPIs(unidos);

    setStatus(`OK. Registros cargados: ${unidos.length}. Globales: ${globales.length}. No globales: ${individuales.length}.`);
    btnCsv.disabled = unidos.length === 0;

  }catch(err){
    console.error(err);
    setStatus(`Error: ${err.message || err}`, true);
  }finally{
    btnBuscar.disabled = false;
  }
}

/* =========================
   RENDER
========================= */
function renderTabla(rows){
  const tb = $('tabla');

  if(!rows.length){
    tb.innerHTML = `
      <tr>
        <td colspan="12" class="muted" style="padding:18px;">Sin resultados para ese mes.</td>
      </tr>
    `;
    return;
  }

  tb.innerHTML = rows.map((r, i) => {
    const uuid = escapeHtml(r.uuid_cfdi || '');
    const fecha = escapeHtml(fmtFecha(r.fecha));
    const serie = escapeHtml(r.serie || '');
    const folio = escapeHtml(r.folio || '');
    const periodoMes = escapeHtml(r.periodo_mes || '');
    const periodoAnio = escapeHtml(r.periodo_anio || '');
    const tipo = escapeHtml(r.tipo_factura || '');

    return `
      <tr>
        <td>${i + 1}</td>
        <td class="mono">${fecha}</td>
        <td class="mono">
          <a class="uuid-link" href="factura_detalle.html?uuid=${encodeURIComponent(r.uuid_cfdi || '')}" target="_blank">
            ${uuid}
          </a>
        </td>
        <td>${serie}</td>
        <td>${folio}</td>
        <td class="num">${fmtMoney(r.subtotal)}</td>
        <td class="num">${fmtMoney(r.total_iva)}</td>
        <td class="num">${fmtMoney(r.total_ieps)}</td>
        <td class="num"><b>${fmtMoney(r.total)}</b></td>
        <td>${periodoMes}</td>
        <td>${periodoAnio}</td>
        <td><span class="chip">${tipo}</span></td>
      </tr>
    `;
  }).join('');
}

/* =========================
   CSV
========================= */
function exportarCSV(){
  if(!rowsActuales.length) return;

  const headers = [
    'fecha',
    'uuid_cfdi',
    'serie',
    'folio',
    'subtotal',
    'iva',
    'ieps',
    'total',
    'periodo_mes',
    'periodo_anio',
    'tipo_factura'
  ];

  const lines = [headers.join(',')];

  for(const r of rowsActuales){
    const vals = [
      fmtFecha(r.fecha),
      r.uuid_cfdi || '',
      r.serie || '',
      r.folio || '',
      toNumber(r.subtotal).toFixed(2),
      toNumber(r.total_iva).toFixed(2),
      toNumber(r.total_ieps).toFixed(2),
      toNumber(r.total).toFixed(2),
      r.periodo_mes || '',
      r.periodo_anio || '',
      r.tipo_factura || ''
    ].map(v => `"${String(v).replaceAll('"','""')}"`);

    lines.push(vals.join(','));
  }

  const csv = "\uFEFF" + lines.join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  const anio = $('anio').value;
  const mes = $('mes').value;

  const a = document.createElement('a');
  a.href = url;
  a.download = `ingresos_sat_${anio}_${mes}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

/* =========================
   INIT
========================= */
llenarAnios();
$('btnBuscar').addEventListener('click', construirTabla);
$('btnCsv').addEventListener('click', exportarCSV);
</script>
</body>
</html>
