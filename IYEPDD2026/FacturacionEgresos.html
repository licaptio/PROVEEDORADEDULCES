<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVSOFT – Revisión Física de Facturas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef2f7;
  padding:15px;
}

h2{ margin:0 0 8px 0; }

#rangoActual{
  font-weight:bold;
  margin-bottom:10px;
  font-size:14px;
}

th, td{
  padding:8px;
  border-bottom:1px solid #ddd;
  font-size:13px;
  text-align:left;
  white-space:nowrap;
}

th{
  background:#0c6cbd;
  color:#fff;
  position:sticky;
  top:0;
  font-size:12px;
  letter-spacing:.5px;
}

.btn{
  padding:4px 10px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  font-size:12px;
}

.verde{ background:#2ecc71; color:#fff; }
.rojo{ background:#e74c3c; color:#fff; }

.paginacion{
  margin-top:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

button.nav{
  padding:6px 12px;
  border-radius:6px;
  border:none;
  background:#0c6cbd;
  color:#fff;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  table-layout:fixed;
}

th:nth-child(1), td:nth-child(1){ width:70px; }
th:nth-child(2), td:nth-child(2){ width:140px; }
th:nth-child(3), td:nth-child(3){ width:120px; }
th:nth-child(4), td:nth-child(4){ width:220px; }
th:nth-child(5), td:nth-child(5){ width:110px; }

th:nth-child(6),
td:nth-child(6){
  width:120px;
  text-align:right;
  padding-right:6px;
  padding-left:2px;
}

td.total-mx{
  font-size:135%;
  font-weight:600;
  line-height:1.05;
  font-variant-numeric:tabular-nums;
}

th:nth-child(7), td:nth-child(7){ width:80px; }
th:nth-child(8), td:nth-child(8){ width:80px; }
th:nth-child(9), td:nth-child(9){ width:50px; }

tbody tr:hover{
  background:#f3f6fb;
}
</style>
</head>

<body>

<h2>Revisión Física de Facturas</h2>

<div id="rangoActual"></div>
<div id="paginacionTop" class="paginacion"></div>

<table>
<thead>
<tr>
  <th>Fecha</th>
  <th>UUID</th>
  <th>RFC</th>
  <th>Proveedor</th>
  <th>Factura</th>
  <th>Total</th>
  <th>Física</th>
  <th>Pagada</th>
  <th>📷</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<div id="paginacionBottom" class="paginacion"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   CONFIGURACIÓN
   ========================= */

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
  storageBucket: "inventariopv-643f1.firebasestorage.app",
  messagingSenderId: "96242533231",
  appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
};

// 🟢 Supabase
const supabaseUrl =
  "https://cvpbtjlupswbyxenugpz.supabase.co";

const supabaseAnonKey =
  "sb_publishable_SQ7Q5LFJqlxVzwNTxcIyzQ_8F1bqyiX";

// ✅ Inicializar Firebase
const app = initializeApp(firebaseConfig);
const firestoreDb = getFirestore(app);

// ✅ Inicializar Supabase
const db = supabase.createClient(supabaseUrl, supabaseAnonKey);

// ✅ Exponer por compatibilidad
window.firebaseApp = app;
window.firestoreDb = firestoreDb;
window.db = db;

/* =========================
   APP
   ========================= */

const tabla = document.getElementById('tabla');
const pagTop = document.getElementById('paginacionTop');
const pagBottom = document.getElementById('paginacionBottom');
const rangoLbl = document.getElementById('rangoActual');

let page = 0;
const limit = 100;

const hoy = new Date();
const desde = new Date();
desde.setDate(hoy.getDate() - 60);

function renderPaginacion(){
  const html = `
    <button class="nav" onclick="prev()" ${page === 0 ? 'disabled style="opacity:.4"' : ''}>⬅️</button>
    <span>Página ${page + 1}</span>
    <button class="nav" onclick="next()">➡️</button>
  `;
  pagTop.innerHTML = html;
  pagBottom.innerHTML = html;
}

async function load(){
  tabla.innerHTML = '<tr><td colspan="9">Cargando…</td></tr>';
  renderPaginacion();

  const { data, error } = await db
    .from('deuda_limpia_pdd')
    .select(`
      id,
      fecha,
      uuid_cfdi,
      rfc_emisor,
      razon_social_emisor,
      serie,
      folio,
      total,
      factura_fisicamente,
      factura_pagada,
      fotos
    `)
    .gte('fecha', desde.toISOString())
    .lte('fecha', hoy.toISOString())
    .order('razon_social_emisor', { ascending: true })
    .order('fecha', { ascending: true })
    .order('id', { ascending: true })
    .range(page * limit, page * limit + limit - 1);

  if(error){
    tabla.innerHTML = '<tr><td colspan="9">Error al cargar</td></tr>';
    console.error(error);
    return;
  }

  render(data || []);
}

function render(rows){
  tabla.innerHTML = '';

  const letrasSet = new Set();

  rows.forEach(r=>{
    const prov = (r.razon_social_emisor || '').trim();

    if(prov){
      let l = prov.charAt(0).toUpperCase();
      if(!/[A-Z]/.test(l)) l = '#';
      letrasSet.add(l);
    }
  });

  const letras = Array.from(letrasSet).sort();

  rangoLbl.textContent = letras.length
    ? `ESTÁS EN: ${letras.join(' ')}`
    : '';

  if(!rows.length){
    tabla.innerHTML = '<tr><td colspan="9">Sin registros</td></tr>';
    return;
  }

  rows.forEach(r=>{
    const provCompleto =
      r.razon_social_emisor || 'SIN PROVEEDOR';

    const provCorto = cortarTexto(provCompleto, 25);

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${fmtFecha(r.fecha)}</td>

      <td>
        ${r.uuid_cfdi ? `
          <a
            href="./detalle_completo.html?uuid=${encodeURIComponent(r.uuid_cfdi)}"
            target="_blank"
            style="
              color:#0c6cbd;
              font-weight:bold;
              text-decoration:none;
            "
            title="Ver factura CFDI"
          >
            ${r.uuid_cfdi.slice(0,18)}
          </a>
        ` : ''}
      </td>

      <td>${r.rfc_emisor || ''}</td>
      <td title="${escapeHtml(provCompleto)}">${escapeHtml(provCorto)}</td>
      <td>${escapeHtml(`${r.serie || ''}-${r.folio || ''}`)}</td>
      <td class="total-mx">${fmtMXN(r.total)}</td>

      <td>
        <button class="btn ${r.factura_fisicamente === 'SI' ? 'verde' : 'rojo'}"
          onclick="toggle(this,'${r.id}','factura_fisicamente')">
          ${r.factura_fisicamente || 'NO'}
        </button>
      </td>

      <td>
        <button class="btn ${r.factura_pagada === 'SI' ? 'verde' : 'rojo'}"
          onclick="toggle(this,'${r.id}','factura_pagada')">
          ${r.factura_pagada || 'NO'}
        </button>
      </td>

      <td class="fotos">
        ${
          Array.isArray(r.fotos) && r.fotos.length
            ? r.fotos.map((url, i) => `
                <a
                  href="${escapeHtml(url)}"
                  target="_blank"
                  title="Foto ${i + 1}"
                  style="margin-right:4px;text-decoration:none;"
                >📷</a>
              `).join('')
            : ''
        }
      </td>
    `;

    tabla.appendChild(tr);
  });
}

async function toggle(btn, id, col){
  const actual = btn.textContent.trim();
  const nuevo = actual === 'SI' ? 'NO' : 'SI';

  btn.textContent = nuevo;
  btn.classList.toggle('verde', nuevo === 'SI');
  btn.classList.toggle('rojo', nuevo === 'NO');

  const { error } = await db
    .from('deuda_limpia_pdd')
    .update({ [col]: nuevo })
    .eq('id', id);

  if(error){
    console.error(error);

    btn.textContent = actual;
    btn.classList.toggle('verde', actual === 'SI');
    btn.classList.toggle('rojo', actual === 'NO');

    alert('Error al actualizar');
  }
}

function fmtFecha(f){
  if(!f) return '';

  const d = new Date(f);

  if(Number.isNaN(d.getTime())) return '';

  return d.toLocaleDateString('es-MX', {
    day:'2-digit',
    month:'2-digit',
    year:'2-digit'
  });
}

function fmtMXN(valor){
  return Number(valor || 0).toLocaleString('es-MX', {
    style: 'currency',
    currency: 'MXN',
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function cortarTexto(txt, max){
  if(!txt) return '';
  return txt.length > max ? txt.slice(0, max - 1) + '…' : txt;
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  })[m]);
}

function next(){
  page++;
  load();
}

function prev(){
  if(page > 0){
    page--;
    load();
  }
}

window.toggle = toggle;
window.next = next;
window.prev = prev;

load();
</script>

</body>
</html>
