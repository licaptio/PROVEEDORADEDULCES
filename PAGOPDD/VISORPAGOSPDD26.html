<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagos a Proveedores – Consulta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Poppins,Arial,sans-serif;
  background:#eef1f5;
  padding:25px;
}
h2{margin-bottom:15px}
.card{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.15);
  margin-bottom:18px;
}
.row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
input,button{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{cursor:pointer}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:left;
  font-size:14px;
}
th{background:#f3f4f6}
.total{
  font-weight:700;
  font-size:18px;
}
.id{
  font-family:monospace;
  font-size:12px;
  color:#555;
}
td:last-child, th:last-child{
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.buscador-box{
  position:relative;
  width:360px;
}
.sugerencias{
  position:absolute;
  top:62px;
  left:0;
  right:0;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  box-shadow:0 6px 14px rgba(0,0,0,.18);
  max-height:260px;
  overflow-y:auto;
  z-index:999;
  display:none;
}
.sugerencia-item{
  padding:9px 10px;
  cursor:pointer;
  font-size:14px;
}
.sugerencia-item:hover{
  background:#f3f4f6;
}
.mensaje{
  color:#777;
  font-size:14px;
  padding:8px 0;
}
</style>
</head>

<body>

<h2>🏦 Pagos a Proveedores</h2>

<div class="card">
  <div class="row">

    <div class="buscador-box">
      Proveedor<br>
      <input id="proveedor" placeholder="Escribe nombre del proveedor" autocomplete="off" style="width:100%">
      <div id="sugerencias" class="sugerencias"></div>
    </div>

    <div style="align-self:flex-end">
      <button onclick="buscar()">🔍 Buscar</button>
    </div>

  </div>
</div>

<div class="card">
  <div id="mensaje" class="mensaje">Escribe un proveedor para consultar sus últimos 30 pagos.</div>

  <table>
    <thead>
      <tr>
        <th>ID PAGO</th>
        <th>Fecha</th>
        <th>Banco</th>
        <th>Proveedor</th>
        <th>Importe</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <br>
  <div class="total">Total listado: <span id="total">$0.00</span></div>
</div>

<script>
const sb = supabase.createClient(
  "https://cvpbtjlupswbyxenugpz.supabase.co",
  "sb_publishable_SQ7Q5LFJqlxVzwNTxcIyzQ_8F1bqyiX"
);

const formatoMXN = new Intl.NumberFormat('es-MX', {
  style: 'currency',
  currency: 'MXN',
  minimumFractionDigits: 2
});

const inputProveedor = document.getElementById('proveedor');
const boxSugerencias = document.getElementById('sugerencias');
const tbody = document.getElementById('tbody');
const totalSpan = document.getElementById('total');
const mensaje = document.getElementById('mensaje');

let timerBusqueda = null;

inputProveedor.addEventListener('input', () => {
  clearTimeout(timerBusqueda);

  const texto = inputProveedor.value.trim();

  if(texto.length < 2){
    boxSugerencias.style.display = 'none';
    boxSugerencias.innerHTML = '';
    return;
  }

  timerBusqueda = setTimeout(() => {
    cargarSugerencias(texto);
  }, 250);
});

inputProveedor.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    buscar();
    boxSugerencias.style.display = 'none';
  }
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.buscador-box')){
    boxSugerencias.style.display = 'none';
  }
});

async function cargarSugerencias(texto){
  const { data, error } = await sb
    .from('pagos_proveedor')
    .select('proveedor_nombre')
    .ilike('proveedor_nombre', `%${texto}%`)
    .not('proveedor_nombre', 'is', null)
    .order('proveedor_nombre', { ascending:true })
    .limit(50);

  if(error){
    console.error(error.message);
    return;
  }

  const nombresUnicos = [...new Set(
    data.map(x => x.proveedor_nombre).filter(Boolean)
  )].slice(0, 20);

  boxSugerencias.innerHTML = '';

  if(nombresUnicos.length === 0){
    boxSugerencias.innerHTML = `<div class="sugerencia-item">Sin resultados</div>`;
    boxSugerencias.style.display = 'block';
    return;
  }

  nombresUnicos.forEach(nombre => {
    const div = document.createElement('div');
    div.className = 'sugerencia-item';
    div.textContent = nombre;

    div.onclick = () => {
      inputProveedor.value = nombre;
      boxSugerencias.style.display = 'none';
      buscar();
    };

    boxSugerencias.appendChild(div);
  });

  boxSugerencias.style.display = 'block';
}

async function buscar(){
  const proveedor = inputProveedor.value.trim();

  if(!proveedor){
    alert('Escribe el nombre del proveedor');
    return;
  }

  mensaje.textContent = 'Buscando últimos 30 pagos...';
  tbody.innerHTML = '';
  totalSpan.innerText = formatoMXN.format(0);

  const { data, error } = await sb
    .from('pagos_proveedor')
    .select('id,fecha_pago,banco,proveedor_nombre,importe_pagado')
    .ilike('proveedor_nombre', `%${proveedor}%`)
    .order('fecha_pago', { ascending:false })
    .limit(30);

  if(error){
    alert(error.message);
    mensaje.textContent = 'Error al consultar pagos.';
    return;
  }

  if(!data || data.length === 0){
    mensaje.textContent = 'No se encontraron pagos para ese proveedor.';
    return;
  }

  let total = 0;

  data.forEach(p => {
    total += Number(p.importe_pagado || 0);

    tbody.innerHTML += `
      <tr>
        <td class="id">
          <a href="CARDEX.html?id=${p.id}" target="_blank">
            ${p.id}
          </a>
        </td>
        <td>${p.fecha_pago || ''}</td>
        <td>${p.banco || ''}</td>
        <td>${p.proveedor_nombre || ''}</td>
        <td>${formatoMXN.format(p.importe_pagado || 0)}</td>
      </tr>
    `;
  });

  totalSpan.innerText = formatoMXN.format(total);
  mensaje.textContent = `Mostrando ${data.length} pagos más recientes de: ${proveedor}`;
}
</script>

</body>
</html>
