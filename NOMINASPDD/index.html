<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>PROVSOFT NOMINA LOADER TURBO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#eef2f7;
      margin:0;
      padding:20px;
      color:#111827;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      padding:20px;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 8px 0;
      font-size:26px;
      color:#0f172a;
    }
    .sub{
      color:#475569;
      margin-bottom:18px;
      font-size:14px;
    }
    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    input[type="file"]{
      padding:10px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#f8fafc;
      min-width:320px;
    }
    button{
      border:none;
      padding:11px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }
    .btn-primary{
      background:#2563eb;
      color:#fff;
    }
    .btn-primary:hover{ background:#1d4ed8; }
    .btn-secondary{
      background:#e2e8f0;
      color:#0f172a;
    }
    .btn-secondary:hover{ background:#cbd5e1; }
    .btn-danger{
      background:#dc2626;
      color:#fff;
    }
    .btn-danger:hover{ background:#b91c1c; }

    .progress{
      width:100%;
      height:24px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-top:16px;
      border:1px solid #cbd5e1;
    }
    .bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#22c55e,#16a34a);
      transition:width .2s ease;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-top:16px;
    }
    .kpi{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:14px;
    }
    .kpi .label{
      font-size:12px;
      color:#64748b;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }
    .kpi .value{
      font-size:24px;
      font-weight:bold;
      color:#0f172a;
    }

    .log{
      margin-top:18px;
      background:#0b1220;
      color:#d1fae5;
      border-radius:12px;
      padding:14px;
      font-family:Consolas,monospace;
      font-size:12px;
      height:320px;
      overflow:auto;
      white-space:pre-wrap;
      border:1px solid #1e293b;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      color:#334155;
    }

    .ok{ color:#16a34a; }
    .warn{ color:#d97706; }
    .err{ color:#dc2626; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PROVSOFT NOMINA LOADER TURBO</h1>
      <div class="sub">
        Carga CFDI de nómina XML a <b>nominas_pdd_cfdi</b> y <b>nominas_pdd_movimientos</b>.
      </div>

      <div class="row">
        <input type="file" id="files" multiple accept=".xml" />
        <button class="btn-primary" id="btnCargar">Cargar nóminas</button>
        <button class="btn-secondary" id="btnLimpiarLog">Limpiar log</button>
        <button class="btn-danger" id="btnCancelar">Cancelar</button>
      </div>

      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <div class="status" id="status">Esperando archivos...</div>

      <div class="grid">
        <div class="kpi"><div class="label">Archivos</div><div class="value" id="kpiArchivos">0</div></div>
        <div class="kpi"><div class="label">CFDI nuevos</div><div class="value" id="kpiCfdi">0</div></div>
        <div class="kpi"><div class="label">Movimientos</div><div class="value" id="kpiMovs">0</div></div>
        <div class="kpi"><div class="label">Duplicados</div><div class="value" id="kpiDup">0</div></div>
        <div class="kpi"><div class="label">Errores</div><div class="value" id="kpiErr">0</div></div>
      </div>

      <div class="log" id="log"></div>
    </div>
  </div>

  <script type="module" src="./loader.js"></script>
</body>
</html>
