<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visor Pedido – PDD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px}
.card{max-width:1100px;margin:auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
h2{margin-top:0}
.label{font-weight:bold;margin-top:8px}
.badge{display:inline-block;padding:6px 12px;border-radius:999px;background:#eee;font-size:13px}
.backBtn{margin-bottom:15px;padding:8px 14px;border-radius:10px;border:0;background:#111;color:#fff;cursor:pointer}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  margin-top:15px;
}

.thumb{
  background:#fafafa;
  border:1px solid #ddd;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  transition:.15s;
}
.thumb:hover{transform:scale(1.03)}
.thumb img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:6px;
}
.thumbName{
  font-size:12px;
  margin-top:5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.preview{
  margin-top:20px;
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px;
  background:#fafafa;
  display:none;
}
.preview img{
  max-width:100%;
  border-radius:8px;
}
.preview iframe{
  width:100%;
  height:600px;
  border:0;
}
</style>
</head>
<body>

<div class="card">

<button class="backBtn" onclick="history.back()">← Volver</button>

<h2>Visor de Pedido</h2>

<div id="info"></div>

<h3 style="margin-top:20px">Archivos</h3>
<div id="grid" class="grid"></div>

<div id="preview" class="preview"></div>

</div>

<script>
const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";
const BUCKET = "pedidospdd";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function qp(name){
  return new URLSearchParams(window.location.search).get(name);
}

function getPublicUrl(path){
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

async function cargarPedido(){

  const id = qp("id");
  if(!id){
    document.getElementById("info").innerHTML = "ID no proporcionado";
    return;
  }

  const { data, error } = await sb
    .from("pedidos_pdd")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    document.getElementById("info").innerHTML = "Error cargando pedido";
    return;
  }

  document.getElementById("info").innerHTML = `
    <div><span class="label">Proveedor:</span> ${data.proveedor_nombre}</div>
    <div><span class="label">Fecha:</span> ${data.pedido_fecha}</div>
    <div><span class="label">Estatus:</span> <span class="badge">${data.estatus}</span></div>
    <div><span class="label">Notas:</span> ${data.notas || ""}</div>
  `;

  const fotos = data.fotos || [];

  if(fotos.length === 0){
    document.getElementById("grid").innerHTML = "Sin archivos";
    return;
  }

  document.getElementById("grid").innerHTML = fotos.map(path=>{
    const url = getPublicUrl(path);
    const name = path.split("/").pop();
    const ext = name.split('.').pop().toLowerCase();

    if(["png","jpg","jpeg","webp"].includes(ext)){
      return `
        <div class="thumb" onclick="previewFile('${path}')">
          <img src="${url}">
          <div class="thumbName">${name}</div>
        </div>
      `;
    } else {
      return `
        <div class="thumb" onclick="previewFile('${path}')">
          <div style="height:120px;display:flex;align-items:center;justify-content:center;background:#eaeaea;border-radius:6px">
            📄
          </div>
          <div class="thumbName">${name}</div>
        </div>
      `;
    }

  }).join("");
}

function previewFile(path){

  const url = getPublicUrl(path);
  const name = path.split("/").pop();
  const ext = name.split('.').pop().toLowerCase();

  const preview = document.getElementById("preview");
  preview.style.display = "block";

  if(["png","jpg","jpeg","webp"].includes(ext)){
    preview.innerHTML = `<img src="${url}">`;
  }
  else if(ext === "pdf"){
    preview.innerHTML = `<iframe src="${url}"></iframe>`;
  }
  else{
    preview.innerHTML = `
      <div>Vista previa no disponible</div>
      <a href="${url}" target="_blank">Descargar archivo</a>
    `;
  }

  preview.scrollIntoView({behavior:"smooth"});
}

cargarPedido();
</script>

</body>
</html>
