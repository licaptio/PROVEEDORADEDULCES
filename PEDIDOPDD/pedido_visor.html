<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visor Pedido – PDD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px}
.card{max-width:1100px;margin:auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.label{font-weight:bold}
.badge{display:inline-block;padding:6px 12px;border-radius:999px;background:#eee;font-size:13px}
button{padding:6px 12px;border-radius:8px;border:0;background:#111;color:#fff;cursor:pointer}
.btnDanger{background:#b00020}
.btnGhost{background:#e9edf3;color:#111}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:15px}
.thumb{background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:8px}
.thumb img{width:100%;height:130px;object-fit:cover;border-radius:6px}
.thumbName{font-size:12px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;justify-content:space-between;margin-top:6px;gap:8px}
.actions button{flex:1}
input[type=file]{display:none}
.topActions{margin-top:15px;display:flex;gap:10px;flex-wrap:wrap}
.muted{color:#64748b;font-size:12px}

/* ===== Modal Pegado ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:999}
.hidden{display:none}
.modalCard{width:min(720px,100%);background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:14px}
.modalHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:6px 6px 10px 6px}
.modalTitle{font-weight:800;font-size:16px}
.modalSub{color:#64748b;font-size:12px;margin-top:2px}
.pasteZone{border:2px dashed #cbd5e1;border-radius:12px;padding:14px;min-height:210px;outline:none;display:flex;flex-direction:column;gap:10px;cursor:text}
.pasteZone:focus{border-color:#111}
.pasteHint{color:#64748b;font-size:13px;line-height:1.4}
.pastePreview img{max-width:100%;border-radius:10px;border:1px solid #e2e8f0}
.modalFoot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 6px 6px 6px}
</style>
</head>
<body>

<div class="card">

<button onclick="history.back()">← Volver</button>

<h2>Visor de Pedido</h2>

<div id="info"></div>

<div class="topActions">
  <button id="btnOpenPaste">📋 Pegar captura (Win+Shift+S → Ctrl+V)</button>
  <button onclick="document.getElementById('fileInput').click()">+ Agregar Fotos</button>
  <input type="file" id="fileInput" multiple accept="image/*">
</div>

<h3 style="margin-top:20px">Archivos</h3>
<div id="grid" class="grid"></div>

</div>

<!-- ===== Modal para pegar / drag&drop ===== -->
<div id="pasteModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Pegar captura">
  <div class="modalCard">
    <div class="modalHead">
      <div>
        <div class="modalTitle">Pegar captura</div>
        <div class="modalSub">Usa Win+Shift+S, luego Ctrl+V aquí. (También arrastra una imagen)</div>
      </div>
      <button id="btnCloseModal" class="btnGhost" title="Cerrar">✕</button>
    </div>

    <div id="pasteZone" class="pasteZone" tabindex="0">
      <div class="pasteHint">
        1) Toma captura con <b>Win+Shift+S</b><br>
        2) Haz click aquí<br>
        3) Pega con <b>Ctrl+V</b><br><br>
        Tip: Puedes abrir este modal y pegar directo sin seleccionar archivos.
      </div>
      <div id="pastePreview" class="pastePreview"></div>
    </div>

    <div class="modalFoot">
      <span id="pasteStatus" class="muted"></span>
      <div style="display:flex; gap:10px;">
        <button id="btnPasteUpload" disabled>Subir</button>
        <button id="btnPasteCancel" class="btnDanger">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";
const BUCKET = "pedidospdd";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let pedidoActual = null;

/* ===== Helpers ===== */
function qp(name){
  return new URLSearchParams(window.location.search).get(name);
}

function getPublicUrl(path){
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

function safeName(name){
  // Evita caracteres raros en rutas
  return (name || "image.png")
    .replace(/[^\w.\-]+/g, "_")
    .replace(/_+/g, "_")
    .slice(0, 120);
}

async function subirArchivoYRegistrar(file){
  if(!pedidoActual?.id) throw new Error("Pedido no cargado.");

  const ext = (file.name && file.name.includes(".")) ? file.name.split(".").pop() : "png";
  const base = safeName(file.name || `captura.${ext}`);
  const path = `${pedidoActual.id}/${Date.now()}_${base}`;

  const { error } = await sb.storage.from(BUCKET).upload(path, file, { upsert:false });
  if(error) throw error;

  pedidoActual.fotos = pedidoActual.fotos || [];
  pedidoActual.fotos.push(path);

  const { error: e2 } = await sb
    .from("pedidos_pdd")
    .update({ fotos: pedidoActual.fotos })
    .eq("id", pedidoActual.id);

  if(e2) throw e2;

  return path;
}

/* ===== Carga pedido ===== */
async function cargarPedido(){
  const id = qp("id");

  const { data, error } = await sb
    .from("pedidos_pdd")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    document.getElementById("info").innerHTML = "Error cargando pedido";
    return;
  }

  pedidoActual = data;

  document.getElementById("info").innerHTML = `
    <div><span class="label">Proveedor:</span> ${data.proveedor_nombre}</div>
    <div><span class="label">Fecha:</span> ${data.pedido_fecha}</div>
    <div><span class="label">Estatus:</span> <span class="badge">${data.estatus}</span></div>
    <div><span class="label">Notas:</span> ${data.notas || ""}</div>
  `;

  renderFotos();
}

function renderFotos(){
  const grid = document.getElementById("grid");
  const fotos = pedidoActual?.fotos || [];

  if(fotos.length === 0){
    grid.innerHTML = "Sin archivos";
    return;
  }

  grid.innerHTML = fotos.map(path=>{
    const url = getPublicUrl(path);
    const name = path.split("/").pop();

    return `
      <div class="thumb">
        <img src="${url}" onclick="window.open('${url}','_blank')" title="Abrir">
        <div class="thumbName" title="${name}">${name}</div>
        <div class="actions">
          <button onclick="window.open('${url}','_blank')">Abrir</button>
          <button class="btnDanger" onclick="eliminarFoto('${path}')">Eliminar</button>
        </div>
      </div>
    `;
  }).join("");
}

async function eliminarFoto(path){
  if(!confirm("¿Eliminar esta foto?")) return;

  const { error } = await sb.storage.from(BUCKET).remove([path]);
  if(error){
    alert("Error eliminando archivo");
    return;
  }

  pedidoActual.fotos = (pedidoActual.fotos || []).filter(f => f !== path);

  const { error: e2 } = await sb
    .from("pedidos_pdd")
    .update({ fotos: pedidoActual.fotos })
    .eq("id", pedidoActual.id);

  if(e2){
    alert("Error actualizando base");
    return;
  }

  renderFotos();
}

/* ===== Subida por input file (normal) ===== */
document.getElementById("fileInput").addEventListener("change", async (e)=>{
  const files = Array.from(e.target.files || []);
  if(files.length === 0) return;

  try{
    for(const file of files){
      await subirArchivoYRegistrar(file);
    }
    renderFotos();
  }catch(err){
    console.error(err);
    alert("Error subiendo archivo");
  }finally{
    e.target.value = "";
  }
});

/* ===== Pegado desde portapapeles (Win+Shift+S -> Ctrl+V) ===== */
const pasteModal = document.getElementById("pasteModal");
const pasteZone = document.getElementById("pasteZone");
const pastePreview = document.getElementById("pastePreview");
const pasteStatus = document.getElementById("pasteStatus");
const btnPasteUpload = document.getElementById("btnPasteUpload");

let pastedFile = null;

function openPasteModal(){
  if(!pedidoActual?.id){
    alert("Primero debe cargar el pedido.");
    return;
  }
  pastedFile = null;
  pastePreview.innerHTML = "";
  pasteStatus.textContent = "";
  btnPasteUpload.disabled = true;

  pasteModal.classList.remove("hidden");
  setTimeout(()=>pasteZone.focus(), 50);
}

function closePasteModal(){
  pasteModal.classList.add("hidden");
}

document.getElementById("btnOpenPaste").addEventListener("click", openPasteModal);
document.getElementById("btnCloseModal").addEventListener("click", closePasteModal);
document.getElementById("btnPasteCancel").addEventListener("click", closePasteModal);

// Cerrar con Escape + click fuera
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape" && !pasteModal.classList.contains("hidden")) closePasteModal();
});
pasteModal.addEventListener("click", (e)=>{
  if(e.target === pasteModal) closePasteModal();
});

// Capturar pegado cuando el modal está abierto (si el foco está en pasteZone o dentro)
pasteZone.addEventListener("paste", async (e)=>{
  try{
    const items = Array.from(e.clipboardData?.items || []);
    const imgItem = items.find(it => it.type && it.type.startsWith("image/"));
    if(!imgItem){
      pasteStatus.textContent = "No hay imagen en el portapapeles (copia una captura o imagen).";
      return;
    }

    const blob = imgItem.getAsFile(); // File/Blob
    if(!blob){
      pasteStatus.textContent = "No pude leer la imagen del portapapeles.";
      return;
    }

    const fileName = `captura_${new Date().toISOString().replace(/[:.]/g,"-")}.png`;
    pastedFile = new File([blob], fileName, { type: blob.type || "image/png" });

    const url = URL.createObjectURL(pastedFile);
    pastePreview.innerHTML = `<img src="${url}" alt="preview">`;
    pasteStatus.textContent = `Listo: ${Math.round(pastedFile.size/1024)} KB`;
    btnPasteUpload.disabled = false;

  }catch(err){
    console.error(err);
    pasteStatus.textContent = "Error leyendo el portapapeles.";
  }
});

// Drag & Drop al pasteZone (opcional)
pasteZone.addEventListener("dragover", (e)=>{
  e.preventDefault();
});
pasteZone.addEventListener("drop", (e)=>{
  e.preventDefault();
  const file = (e.dataTransfer?.files && e.dataTransfer.files[0]) ? e.dataTransfer.files[0] : null;
  if(!file || !file.type.startsWith("image/")){
    pasteStatus.textContent = "Suelta una imagen válida.";
    return;
  }
  const fileName = safeName(file.name || `drop_${Date.now()}.png`);
  pastedFile = new File([file], fileName, { type: file.type || "image/png" });

  const url = URL.createObjectURL(pastedFile);
  pastePreview.innerHTML = `<img src="${url}" alt="preview">`;
  pasteStatus.textContent = `Listo: ${Math.round(pastedFile.size/1024)} KB`;
  btnPasteUpload.disabled = false;
});

// Subir la imagen pegada
btnPasteUpload.addEventListener("click", async ()=>{
  if(!pastedFile) return;

  btnPasteUpload.disabled = true;
  pasteStatus.textContent = "Subiendo...";

  try{
    await subirArchivoYRegistrar(pastedFile);
    pasteStatus.textContent = "Subido ✅";
    renderFotos();
    setTimeout(closePasteModal, 400);
  }catch(err){
    console.error(err);
    pasteStatus.textContent = "Error subiendo. Revisa consola.";
    btnPasteUpload.disabled = false;
  }
});

/* ===== Init ===== */
cargarPedido();
</script>

</body>
</html>
