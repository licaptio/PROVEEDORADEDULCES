<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedidos PDD — PC</title>

<style>
:root{
  --bg1:#fff7cc;          /* amarillo suave */
  --bg2:#fffdf3;          /* casi blanco cálido */
  --card:#ffffff;
  --txt:#1f2937;
  --muted:#6b7280;
  --border:#fde68a;

  --yellow:#facc15;       /* predominante */
  --yellow2:#fde047;
  --red:#ef4444;
  --red2:#b91c1c;

  --shadow:0 14px 38px rgba(17,24,39,.12);
  --shadow2:0 8px 18px rgba(17,24,39,.10);
  --radius:18px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  background:
    radial-gradient(900px 500px at 20% 5%, rgba(250,204,21,.55), rgba(250,204,21,0) 65%),
    radial-gradient(800px 500px at 85% 15%, rgba(239,68,68,.18), rgba(239,68,68,0) 62%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  padding:22px;
}

.container{
  max-width:1200px;
  margin:0 auto;
}

/* TOPBAR */
.topbar{
  display:flex;
  gap:14px;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(90deg, rgba(250,204,21,.92), rgba(253,224,71,.92));
  border:1px solid rgba(185,28,28,.20);
  border-radius:22px;
  padding:14px 16px;
  box-shadow:var(--shadow2);
  position:sticky;
  top:14px;
  z-index:50;
  backdrop-filter: blur(8px);
}

.brand{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}

.brand h2{
  margin:0;
  font-size:20px;
  font-weight:900;
  letter-spacing:.2px;
}

.brand .sub{
  font-size:12px;
  color:rgba(17,24,39,.78);
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* BOTONES */
button{
  border:0;
  border-radius:14px;
  padding:10px 14px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease, opacity .12s ease;
  user-select:none;
}

button:active{transform:translateY(1px) scale(.99)}
button:disabled{opacity:.55; cursor:not-allowed}

.btnNuevo{
  background:linear-gradient(180deg, #111827, #0b1220);
  color:#fff;
  box-shadow:0 10px 18px rgba(17,24,39,.28);
}
.btnNuevo:hover{transform:translateY(-1px); filter:brightness(1.03)}

.tools{
  display:flex;
  gap:10px;
  align-items:center;
}

/* GRID */
.grid{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:16px;
}

@media (max-width:1100px){
  .grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
}
@media (max-width:720px){
  .grid{grid-template-columns:1fr}
  body{padding:14px}
  .topbar{top:10px}
}

/* CARD */
.card{
  background:linear-gradient(180deg, #ffffff, #fffdf6);
  border:1px solid rgba(250,204,21,.55);
  border-radius:var(--radius);
  padding:16px 16px 14px;
  box-shadow:var(--shadow2);
  position:relative;
  overflow:hidden;
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
}

.card::before{
  content:"";
  position:absolute;
  inset:-80px -120px auto auto;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(250,204,21,.55), rgba(250,204,21,0) 70%);
  transform:rotate(20deg);
  pointer-events:none;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow);
  border-color:rgba(239,68,68,.35);
}

.rowTop{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.fecha{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}

.idChip{
  font-size:11px;
  padding:5px 10px;
  border-radius:999px;
  background:rgba(17,24,39,.06);
  border:1px solid rgba(17,24,39,.08);
  color:rgba(17,24,39,.75);
  font-weight:800;
  letter-spacing:.2px;
  white-space:nowrap;
}

/* proveedor */
.proveedor{
  margin-top:10px;
  font-size:18px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:.2px;
}

/* badge status */
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  letter-spacing:.25px;
  border:1px solid rgba(250,204,21,.65);
  background:rgba(250,204,21,.25);
  color:#7a4a00;
}

.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--yellow);
  box-shadow:0 0 0 3px rgba(250,204,21,.20);
}

.badge.surtido{
  background:rgba(34,197,94,.12);
  border-color:rgba(34,197,94,.35);
  color:#166534;
}
.badge.surtido .dot{background:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.16)}

.badge.urgente{
  background:rgba(239,68,68,.12);
  border-color:rgba(239,68,68,.35);
  color:var(--red2);
}
.badge.urgente .dot{background:var(--red); box-shadow:0 0 0 3px rgba(239,68,68,.16)}

/* actions */
.actions{
  margin-top:14px;
  display:flex;
  gap:10px;
}

.btnAbrir{
  flex:1;
  background:linear-gradient(180deg, #ffffff, #fff7d6);
  border:1px solid rgba(250,204,21,.75);
  color:#111827;
  box-shadow:0 10px 16px rgba(250,204,21,.18);
}
.btnAbrir:hover{transform:translateY(-1px); filter:brightness(1.02)}

.btnSurtir{
  flex:1;
  background:linear-gradient(180deg, #ef4444, #b91c1c);
  color:#fff;
  box-shadow:0 10px 18px rgba(239,68,68,.20);
}
.btnSurtir:hover{transform:translateY(-1px); filter:brightness(1.02)}

/* empty */
.empty{
  margin-top:18px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.75);
  border:1px dashed rgba(239,68,68,.25);
  color:#374151;
  font-weight:800;
}

/* loading */
.loading{
  margin-top:18px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.70);
  border:1px solid rgba(250,204,21,.55);
  box-shadow:var(--shadow2);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.pulse{
  width:12px;height:12px;border-radius:50%;
  background:var(--yellow);
  box-shadow:0 0 0 4px rgba(250,204,21,.20);
  animation:pulse 1s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(.95); opacity:.7}
  50%{transform:scale(1.15); opacity:1}
  100%{transform:scale(.95); opacity:.7}
}

/* DESINTEGRACIÓN */
@keyframes disintegrate {
  0% { opacity:1; transform:translateY(0) scale(1) rotate(0deg); filter:blur(0); }
  45% { opacity:.8; transform:translateY(-2px) scale(.98) rotate(1.6deg); filter:blur(.2px);}
  100% { opacity:0; transform:translateY(6px) scale(.86) rotate(7deg); filter:blur(1.2px); }
}
.disintegrate{ animation:disintegrate .55s forwards; }

/* footer mini */
.footerNote{
  margin-top:14px;
  font-size:12px;
  color:rgba(17,24,39,.65);
  font-weight:700;
}
</style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="brand">
      <h2>Pedidos PDD</h2>
      <div class="sub">Vista PC • Amarillo dominante • Acción rápida</div>
    </div>

    <div class="tools">
      <button class="btnNuevo" onclick="location.href='pedido_nuevo.html'">+ Nuevo</button>
    </div>
  </div>

  <div id="loading" class="loading" style="display:none">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="pulse"></div>
      <div style="font-weight:900">Cargando pedidos…</div>
    </div>
    <div style="font-size:12px;color:rgba(17,24,39,.7);font-weight:800">Supabase</div>
  </div>

  <div id="grid" class="grid"></div>

  <div id="empty" class="empty" style="display:none">
    No hay pedidos pendientes.
  </div>

  <div class="footerNote">
    Tip: clic en <b>Abrir</b> para visor • clic en <b>Surtir</b> para marcar como SURTIDO.
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id)=>document.getElementById(id);

function badgeClass(estatus){
  const e = String(estatus||"").toUpperCase().trim();
  // si un día metes "URGENTE" lo pinta rojo
  if(e.includes("URG")) return "urgente";
  if(e === "SURTIDO") return "surtido";
  return "";
}

function fmtMx(ts){
  try{
    return new Date(ts).toLocaleString("es-MX", { timeZone:"America/Monterrey" });
  }catch(_){
    return String(ts||"");
  }
}

async function cargarPedidos(){
  $("empty").style.display = "none";
  $("loading").style.display = "flex";
  $("grid").innerHTML = "";

  const { data, error } = await sb
    .from("pedidos_pdd")
    .select("*")
    .order("created_at", { ascending:false });

  $("loading").style.display = "none";

  if(error){
    console.error(error);
    $("empty").style.display = "block";
    $("empty").textContent = "Error al cargar pedidos (ver consola).";
    return;
  }

  const pendientes = (data || []).filter(p => String(p.estatus||"").toUpperCase() !== "SURTIDO");

  if(pendientes.length === 0){
    $("empty").style.display = "block";
    return;
  }

  $("grid").innerHTML = pendientes.map(p => {
    const est = (p.estatus ?? "PENDIENTE");
    const bc = badgeClass(est);
    return `
      <div class="card" id="card-${p.id}">
        <div class="rowTop">
          <div class="fecha">${fmtMx(p.created_at)}</div>
          <div class="idChip">#${String(p.id).slice(0,8).toUpperCase()}</div>
        </div>

        <div class="proveedor">${p.proveedor_nombre ?? "(SIN PROVEEDOR)"}</div>

        <div class="badge ${bc}">
          <span class="dot"></span>
          <span>${String(est).toUpperCase()}</span>
        </div>

        <div class="actions">
          <button class="btnAbrir" onclick="abrir('${p.id}')">Abrir</button>
          <button class="btnSurtir" onclick="marcarSurtido('${p.id}')">Surtir</button>
        </div>
      </div>
    `;
  }).join("");
}

window.abrir = function(id){
  location.href = `pedido_visor.html?id=${encodeURIComponent(id)}`;
}

window.marcarSurtido = async function(id){
  const card = document.getElementById("card-"+id);
  if(!card) return;

  // deshabilita botones para evitar doble click
  card.querySelectorAll("button").forEach(b=>b.disabled=true);
  card.classList.add("disintegrate");

  setTimeout(async () => {
    const { error } = await sb
      .from("pedidos_pdd")
      .update({
        estatus:"SURTIDO",
        updated_at: new Date().toISOString()
      })
      .eq("id", id);

    if(error){
      console.error(error);
      card.classList.remove("disintegrate");
      card.querySelectorAll("button").forEach(b=>b.disabled=false);
      return;
    }

    card.remove();

    // si ya no queda nada, muestra empty
    if(document.querySelectorAll(".grid .card").length === 0){
      document.getElementById("empty").style.display = "block";
    }
  }, 550);
}

cargarPedidos();
</script>

</body>
</html>
