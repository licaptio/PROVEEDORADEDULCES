<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos – PROVSOFT</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right,#0f2027,#203a43,#2c5364);
      color:white;
      padding:20px;
    }

    h1{
      margin-bottom:10px;
    }

    .filtros{
      margin-bottom:15px;
    }

    button{
      padding:8px 14px;
      margin-right:10px;
      margin-bottom:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      color:white;
    }

    .btn-all{background:#3498db;}
    .btn-pendiente{background:#e67e22;}
    .btn-surtido{background:#2ecc71;}

    .card{
      background:rgba(255,255,255,0.08);
      padding:15px;
      border-radius:12px;
      margin-bottom:12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .estatus{
      padding:5px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:bold;
      color:white;
      display:inline-block;
    }

    .PENDIENTE{background:#e67e22;}
    .SURTIDO{background:#2ecc71;}
    .CANCELADO{background:#e74c3c;}

    .fecha{
      font-size:13px;
      opacity:0.85;
      margin-top:8px;
    }

    .notas{
      margin-top:8px;
      font-size:14px;
      opacity:0.95;
    }

    .msg{
      padding:14px;
      border-radius:10px;
      margin-top:10px;
      background: rgba(255,255,255,0.08);
    }

    .error{
      background: rgba(231, 76, 60, 0.18);
      border: 1px solid rgba(231, 76, 60, 0.45);
    }

    .vacio{
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

  <h1>📦 Pedidos PDD</h1>

  <div class="filtros">
    <button class="btn-all" onclick="cargarPedidos()">Todos</button>
    <button class="btn-pendiente" onclick="cargarPedidos('PENDIENTE')">Pendientes</button>
    <button class="btn-surtido" onclick="cargarPedidos('SURTIDO')">Surtidos</button>
  </div>

  <div id="lista"></div>

  <script>
    const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2cGJ0amx1cHN3Ynl4ZW51Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc3MDIxOTQsImV4cCI6MjA2MzI3ODE5NH0.iiJsYM3TtaGPdeCtPcEXwAz3LfFc1uJGECEvOErvrqY";

    // Tomamos createClient del objeto global cargado por el CDN
    const { createClient } = window.supabase;

    // Aquí usamos OTRO nombre, no 'supabase'
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function cargarPedidos(filtro = null) {
      const cont = document.getElementById("lista");
      cont.innerHTML = `<div class="msg">Cargando pedidos...</div>`;

      try {
        let query = db
          .from("pedidos_pdd")
          .select("*")
          .order("pedido_fecha", { ascending: false });

        if (filtro) {
          query = query.eq("estatus", filtro);
        }

        const { data, error } = await query;

        if (error) {
          console.error("Error Supabase:", error);
          cont.innerHTML = `
            <div class="msg error">
              Error cargando pedidos:<br>
              <strong>${error.message}</strong>
            </div>
          `;
          return;
        }

        render(data || []);
      } catch (err) {
        console.error("Error general:", err);
        cont.innerHTML = `
          <div class="msg error">
            Error inesperado:<br>
            <strong>${err.message}</strong>
          </div>
        `;
      }
    }

    function render(pedidos) {
      const cont = document.getElementById("lista");
      cont.innerHTML = "";

      if (!pedidos || pedidos.length === 0) {
        cont.innerHTML = `<div class="msg vacio">No hay pedidos</div>`;
        return;
      }

      pedidos.forEach(p => {
        const proveedor = p.proveedor_nombre || "Sin proveedor";
        const estatus = p.estatus || "PENDIENTE";
        const fecha = p.pedido_fecha || "Sin fecha";
        const notas = p.notas || "Sin notas";
        const id = p.id ?? "Sin ID";

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="top">
            <strong>${escapeHTML(proveedor)}</strong>
            <span class="estatus ${escapeClass(estatus)}">${escapeHTML(estatus)}</span>
          </div>

          <div class="fecha">
            📅 ${escapeHTML(String(fecha))}
          </div>

          <div class="notas">
            📝 ${escapeHTML(notas)}
          </div>

          <div style="margin-top:8px;font-size:12px;opacity:.7">
            ID: ${escapeHTML(String(id))}
          </div>
        `;

        cont.appendChild(card);
      });
    }

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeClass(text) {
      return String(text).replace(/[^a-zA-Z0-9_-]/g, "");
    }

    // Carga inicial
    document.addEventListener("DOMContentLoaded", () => {
      cargarPedidos();
    });
  </script>

</body>
</html>
