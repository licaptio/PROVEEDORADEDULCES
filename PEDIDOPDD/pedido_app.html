<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nuevo Pedido – PDD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px}
.card{max-width:900px;margin:auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
label{display:block;margin-top:14px;font-weight:bold}
select,input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;margin-top:6px}
textarea{min-height:80px}
button{margin-top:18px;padding:12px;border:0;border-radius:10px;background:#111;color:#fff;cursor:pointer}
button:disabled{opacity:.6}
.msg{margin-top:14px;font-weight:bold}
.muted{color:#666;font-size:13px;margin-top:6px}

.dropzone{
  margin-top:8px;
  padding:28px;
  border:2px dashed #bbb;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:.15s;
  background:#fafafa;
  user-select:none;
}
.dropzone.dragover{border-color:#111;background:#f0f0f0}

.fileList{margin-top:10px;font-size:14px}
.fileItem{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
.fileItem small{color:#777}
.fileItem button{padding:6px 10px;border-radius:10px;border:0;background:#e9e9e9;cursor:pointer}
.fileItem button:hover{background:#dedede}

.sectionTitle{margin-top:18px;font-weight:bold}
.badge{display:inline-block;margin-left:8px;font-size:12px;color:#333;background:#f2f2f2;border:1px solid #e6e6e6;border-radius:999px;padding:2px 8px}

.progress{margin-top:10px}
progress{width:100%}
.kbd{
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  background:#f2f2f2;border:1px solid #e2e2e2;border-radius:8px;padding:2px 6px
}

/* ===== AUTOCOMPLETE PROVEEDOR ===== */
.provWrap{position:relative}
.provList{
  position:absolute;top:100%;left:0;right:0;
  max-height:260px;overflow:auto;
  background:#fff;border:1px solid #ddd;border-top:none;
  border-radius:0 0 12px 12px;
  display:none;z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.provItem{padding:10px 12px;cursor:pointer}
.provItem:hover,.provItem.active{background:#f3f4f6}
.provEmpty{padding:10px 12px;color:#777}

.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1}
.btnLite{background:#e9e9e9;color:#111}
.btnDanger{background:#b00020;color:#fff}
.linkBtn{background:transparent;border:0;color:#0b57d0;cursor:pointer;padding:0}
hr{border:0;border-top:1px solid #eee;margin:18px 0}
</style>
</head>
<body>

<div class="card">
  <h2>Nuevo Pedido</h2>

  <label>Proveedor</label>
  <div class="provWrap">
    <input id="proveedor" placeholder="Escribe proveedor (ej. INIX, TAURO)..." autocomplete="off">
    <div id="proveedorList" class="provList"></div>
  </div>

  <div class="row">
    <div>
      <label>Fecha</label>
      <input type="date" id="fecha">
    </div>
    <div>
      <label>Estatus</label>
      <select id="estatus">
        <option value="PENDIENTE">PENDIENTE</option>
        <option value="SURTIDO">SURTIDO</option>
        <option value="CANCELADO">CANCELADO</option>
      </select>
    </div>
  </div>

  <label>Notas</label>
  <textarea id="notas" placeholder="Notas del pedido..."></textarea>

  <label>Archivos del Pedido</label>
  <div id="dropzone" class="dropzone">
    Arrastra archivos aquí, haz clic o pega imagen con <span class="kbd">Ctrl + V</span><br>
    <div class="muted">Tip: <span class="kbd">Win + Shift + S</span> (recorte), luego vuelve aquí y <span class="kbd">Ctrl + V</span></div>
    <input type="file" id="files" multiple hidden>
  </div>

  <div class="sectionTitle">Pendientes por subir <span class="badge" id="pendCount">0</span></div>
  <div id="fileList" class="fileList"></div>

  <div class="progress" id="progressBox" style="display:none">
    <progress id="pg" value="0" max="100"></progress>
    <div class="muted" id="pgText"></div>
  </div>

  <button id="guardar">Guardar Pedido</button>

  <hr>

  <div class="sectionTitle">
    Archivos ya subidos <span class="badge" id="upCount">0</span>
    <span class="muted" id="pedidoInfo" style="margin-left:10px"></span>
  </div>
  <div class="muted" style="margin-top:6px">Aquí sí elimina del bucket (Supabase Storage) y actualiza la tabla.</div>
  <div id="uploadedList" class="fileList"></div>

  <div class="msg" id="msg"></div>
</div>

<script>
// ================= CONFIG =================
const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
const SUPABASE_ANON_KEY = "TU_ANON_KEY_AQUI";
const BUCKET = "pedidospdd";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

function setMsg(text, ok=true){
  $("msg").textContent = text;
  $("msg").style.color = ok ? "#1b7f35" : "#b00020";
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
}
function humanSize(bytes){
  const u=["B","KB","MB","GB"]; let i=0, n=bytes;
  while(n>=1024 && i<u.length-1){ n/=1024; i++; }
  return `${n.toFixed(i===0?0:1)} ${u[i]}`;
}
function safeName(name){
  return String(name).replace(/[^\w.\-() ]/g, "_");
}

// ================= FECHA AUTO =================
$("fecha").value = new Date().toISOString().split("T")[0];

// ================= PROVEEDORES AUTOCOMPLETE =================
let proveedoresCache = [];
let provActiveIndex = -1;
let provResults = [];
const inputProv = $("proveedor");
const listProv  = $("proveedorList");

async function cargarProveedores(){
  const { data, error } = await sb.rpc("get_proveedores");
  if(error){
    console.error(error);
    inputProv.placeholder = "Error cargando proveedores";
    return;
  }
  proveedoresCache = (data||[]).map(x => (x.razon_social_emisor||"").trim()).filter(Boolean);
}
cargarProveedores();

function hideProvList(){
  listProv.style.display = "none";
  listProv.innerHTML = "";
  provActiveIndex = -1;
  provResults = [];
}
function showProvList(){ listProv.style.display = "block"; }

function renderProvList(items, term){
  provResults = items;
  provActiveIndex = -1;

  if(items.length === 0){
    listProv.innerHTML = `<div class="provEmpty">Sin coincidencias</div>`;
    showProvList();
    return;
  }

  listProv.innerHTML = items.map((p, idx)=>{
    const ep = escapeHtml(p);
    const lowP = p.toLowerCase();
    const lowT = (term||"").toLowerCase();
    const at = lowP.indexOf(lowT);
    let html = ep;
    if(at >= 0 && term){
      const before = escapeHtml(p.slice(0, at));
      const mid    = escapeHtml(p.slice(at, at + term.length));
      const after  = escapeHtml(p.slice(at + term.length));
      html = `${before}<b>${mid}</b>${after}`;
    }
    return `<div class="provItem" data-idx="${idx}">${html}</div>`;
  }).join("");

  showProvList();
}

inputProv.addEventListener("input", ()=>{
  const term = inputProv.value.trim();
  if(!term){ hideProvList(); return; }
  const low = term.toLowerCase();
  const filtrados = proveedoresCache
    .filter(p => p.toLowerCase().includes(low))
    .slice(0, 30);
  renderProvList(filtrados, term);
});

listProv.addEventListener("mousedown", (e)=>{
  const item = e.target.closest(".provItem");
  if(!item) return;
  const idx = Number(item.dataset.idx);
  const nombre = provResults[idx];
  if(nombre){
    inputProv.value = nombre;
    hideProvList();
  }
});

inputProv.addEventListener("keydown", (e)=>{
  if(listProv.style.display !== "block") return;
  const items = Array.from(listProv.querySelectorAll(".provItem"));
  if(items.length === 0) return;

  if(e.key === "ArrowDown"){
    e.preventDefault();
    provActiveIndex = Math.min(provActiveIndex + 1, items.length - 1);
  }else if(e.key === "ArrowUp"){
    e.preventDefault();
    provActiveIndex = Math.max(provActiveIndex - 1, 0);
  }else if(e.key === "Enter"){
    if(provActiveIndex >= 0 && provResults[provActiveIndex]){
      e.preventDefault();
      inputProv.value = provResults[provActiveIndex];
      hideProvList();
    }
    return;
  }else if(e.key === "Escape"){
    hideProvList();
    return;
  }else{
    return;
  }

  items.forEach(x => x.classList.remove("active"));
  const active = items[provActiveIndex];
  if(active){
    active.classList.add("active");
    active.scrollIntoView({ block:"nearest" });
  }
});

document.addEventListener("click", (e)=>{
  if(e.target === inputProv || e.target.closest(".provWrap")) return;
  hideProvList();
});

// ================= ARCHIVOS (ANTES DE SUBIR) =================
const dropzone = $("dropzone");
const fileInput = $("files");
const fileList = $("fileList");

let archivosSeleccionados = [];
let pedidoActualId = null;
let uploadedPaths = []; // paths reales en storage (ej: pedidoId/123_nombre.png)

dropzone.addEventListener("click", ()=> fileInput.click());

fileInput.addEventListener("change", (e)=>{
  archivosSeleccionados = [...archivosSeleccionados, ...Array.from(e.target.files || [])];
  renderFiles();
  fileInput.value = "";
});

dropzone.addEventListener("dragover", (e)=>{
  e.preventDefault();
  dropzone.classList.add("dragover");
});
dropzone.addEventListener("dragleave", ()=> dropzone.classList.remove("dragover"));
dropzone.addEventListener("drop", (e)=>{
  e.preventDefault();
  dropzone.classList.remove("dragover");
  const droppedFiles = Array.from(e.dataTransfer.files || []);
  archivosSeleccionados = [...archivosSeleccionados, ...droppedFiles];
  renderFiles();
});

document.addEventListener("paste", (event) => {
  const items = event.clipboardData?.items || [];
  let added = 0;

  for (let item of items) {
    if (item.type && item.type.indexOf("image") !== -1) {
      const blob = item.getAsFile();
      if(!blob) continue;
      const timestamp = Date.now();
      const file = new File([blob], `recorte_${timestamp}.png`, { type: blob.type || "image/png" });
      archivosSeleccionados.push(file);
      added++;
    }
  }

  if(added>0){
    renderFiles();
    setMsg(`📋 Imagen pegada: ${added} archivo(s) listo(s) para subir.`, true);
  }
});

function renderFiles(){
  $("pendCount").textContent = String(archivosSeleccionados.length);
  if(archivosSeleccionados.length===0){
    fileList.innerHTML = `<div class="muted">Sin archivos todavía.</div>`;
    return;
  }

  fileList.innerHTML = archivosSeleccionados.map((f, idx)=>`
    <div class="fileItem">
      <div>
        <div>${escapeHtml(f.name)}</div>
        <small>${humanSize(f.size || 0)}</small>
      </div>
      <button type="button" class="btnLite" onclick="removePending(${idx})">Quitar</button>
    </div>
  `).join("");
}
window.removePending = function(i){
  archivosSeleccionados.splice(i,1);
  renderFiles();
};
renderFiles();

// ================= LISTA DE SUBIDOS (DESPUÉS) =================
function filenameFromPath(path){
  const parts = String(path||"").split("/");
  return parts[parts.length-1] || path;
}

function renderUploaded(){
  $("upCount").textContent = String(uploadedPaths.length);
  if(!pedidoActualId){
    $("pedidoInfo").textContent = "";
  }else{
    $("pedidoInfo").textContent = `Pedido: ${pedidoActualId}`;
  }

  const box = $("uploadedList");
  if(uploadedPaths.length === 0){
    box.innerHTML = `<div class="muted">Aún no hay archivos subidos para este pedido.</div>`;
    return;
  }

  box.innerHTML = uploadedPaths.map((p, idx)=>`
    <div class="fileItem">
      <div>
        <div>${escapeHtml(filenameFromPath(p))}</div>
        <small>${escapeHtml(p)}</small>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="button" class="btnDanger" onclick="deleteUploaded(${idx})">Eliminar</button>
      </div>
    </div>
  `).join("");
}

async function cargarArchivosPedido(pedidoId){
  // lee fotos desde la tabla (si existe columna fotos)
  const { data, error } = await sb
    .from("pedidos_pdd")
    .select("fotos")
    .eq("id", pedidoId)
    .single();

  if(error){
    console.error(error);
    return;
  }

  uploadedPaths = (data?.fotos || []).filter(Boolean);
  renderUploaded();
}

// ================= SUBIDA =================
async function uploadAll(pedidoId, files){
  if(!files || files.length===0) return [];

  $("progressBox").style.display = "block";
  $("pg").value = 0;

  const paths = [];

  for(let i=0;i<files.length;i++){
    const file = files[i];
    const path = `${pedidoId}/${Date.now()}_${safeName(file.name)}`;

    $("pgText").textContent = `Subiendo ${i+1}/${files.length}: ${file.name}`;

    const { error } = await sb.storage.from(BUCKET).upload(path, file, {
      upsert: false,
      contentType: file.type || "application/octet-stream"
    });

    if(error) throw error;

    paths.push(path);
    $("pg").value = Math.round(((i+1)/files.length)*100);
  }

  $("pgText").textContent = `Subida completa (${files.length} archivo(s)).`;
  return paths;
}

// ================= ELIMINAR SUBIDO (STORAGE + DB) =================
let deleting = false;

window.deleteUploaded = async function(idx){
  if(deleting) return;
  if(!pedidoActualId) return;

  const path = uploadedPaths[idx];
  if(!path) return;

  const ok = confirm(`Eliminar archivo?\n\n${path}\n\nEsto borra del bucket y de la tabla.`);
  if(!ok) return;

  deleting = true;
  setMsg("Eliminando archivo...", true);

  try{
    // 1) borrar del bucket
    const { error: e1 } = await sb.storage.from(BUCKET).remove([path]);
    if(e1) throw e1;

    // 2) actualizar tabla (quitar path del array)
    const nuevo = uploadedPaths.filter((_, i)=> i !== idx);

    const { error: e2 } = await sb
      .from("pedidos_pdd")
      .update({ fotos: nuevo })
      .eq("id", pedidoActualId);

    if(e2) throw e2;

    uploadedPaths = nuevo;
    renderUploaded();
    setMsg("✅ Archivo eliminado.", true);

  }catch(err){
    console.error(err);
    setMsg("❌ No se pudo eliminar: " + (err.message || err), false);
  }finally{
    deleting = false;
  }
};

// ================= GUARDAR PEDIDO =================
let saving = false;

$("guardar").addEventListener("click", async ()=>{
  if(saving) return;
  saving = true;

  $("guardar").disabled = true;
  setMsg("Guardando...", true);

  try{
    const proveedor_nombre = $("proveedor").value?.trim();
    const pedido_fecha = $("fecha").value;
    const notas = $("notas").value || null;
    const estatus = $("estatus").value;

    if(!proveedor_nombre) throw new Error("Escribe o selecciona proveedor");
    if(!pedido_fecha) throw new Error("Selecciona fecha");

    // 1) Crear pedido
    const { data, error } = await sb
      .from("pedidos_pdd")
      .insert([{
        proveedor_nombre,
        pedido_fecha,
        notas,
        estatus,
        // fotos: []  // si tu columna existe, puedes dejarlo explícito
      }])
      .select("id")
      .single();

    if(error) throw error;

    pedidoActualId = data.id;

    // 2) Subir archivos
    const nuevosPaths = await uploadAll(pedidoActualId, archivosSeleccionados);

    // 3) Persistir paths en tabla + bucket_path
    uploadedPaths = [...uploadedPaths, ...nuevosPaths];

    const { error: e2 } = await sb
      .from("pedidos_pdd")
      .update({
        bucket_path: `${BUCKET}/${pedidoActualId}/`,
        fotos: uploadedPaths
      })
      .eq("id", pedidoActualId);

    if(e2) throw e2;

    setMsg(`✅ Pedido creado: ${pedidoActualId}`, true);

    // reset formulario (manteniendo el "pedidoActualId" para poder borrar)
    $("notas").value = "";
    $("estatus").value = "PENDIENTE";
    $("proveedor").value = "";
    archivosSeleccionados = [];
    renderFiles();
    $("progressBox").style.display = "none";

    // refrescar lista de subidos desde DB (por si hubo triggers)
    await cargarArchivosPedido(pedidoActualId);

  }catch(err){
    console.error(err);
    setMsg("❌ " + (err.message || err), false);
  }finally{
    $("guardar").disabled = false;
    saving = false;
  }
});
</script>

<!--
IMPORTANTES (DB + PERMISOS):

1) Asegura que pedidos_pdd tenga columna fotos (text[]):
   alter table pedidos_pdd add column if not exists fotos text[] default '{}'::text[];

2) Para poder BORRAR del bucket desde el navegador con ANON_KEY,
   tu Storage policy debe permitir DELETE en ese bucket.
   (Si no, el remove() fallará aunque el código esté bien.)
-->
</body>
</html>
