<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVSOFT Fotos Firebase</title>

<style>
body{ margin:0; font-family:Arial; background:#0c6cbd; }
.wrap{ max-width:520px; margin:auto; padding:10px; }
.card{ background:white; border-radius:12px; padding:12px; margin-bottom:10px; }
input,button{ width:100%; padding:14px; border-radius:10px; margin-top:8px; }
button{ border:none; font-weight:bold; }
.btn1{ background:#00416A;color:white;}
.btn2{ background:#16a34a;color:white;}
.btn3{ background:#dc2626;color:white;}
.btn4{ background:#ca8a04;color:white;}
.hidden{ display:none; }
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center;}
.modal-content{ background:white; border-radius:14px; width:100%; max-width:520px; padding:12px;}
video,img{ width:100%; border-radius:10px;}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h3>Buscar producto</h3>
<input id="busqueda" placeholder="Código o texto">
<button class="btn1" onclick="abrirEscaner()">Escanear</button>
</div>

<div class="card">
<h3 id="nombre">Sin producto</h3>
<div id="estado">SIN PRODUCTO</div>

<button id="btnFotos" class="btn2 hidden" onclick="abrirCamara()">Tomar fotos</button>
<button id="btnVer" class="btn1 hidden" onclick="verFotos()">Ver fotos</button>
<button id="btnLimpiar" class="btn3 hidden" onclick="limpiarFotos()">Limpiar</button>

<button class="btn4" onclick="subir()">Subir</button>
</div>

</div>

<!-- CAMARA -->
<div id="modalCamara" class="modal hidden">
<div class="modal-content">
<video id="video" autoplay playsinline></video>
<button class="btn2" onclick="capturar()">Capturar</button>
<button class="btn3" onclick="cerrarCamara()">Cerrar</button>
</div>
</div>

<!-- PREVIEW -->
<div id="modalPreview" class="modal hidden">
<div class="modal-content">
<img id="preview">
<button class="btn2" onclick="aceptar()">Aceptar</button>
<button class="btn3" onclick="repetir()">Repetir</button>
</div>
</div>

<!-- GALERIA -->
<div id="modalGaleria" class="modal hidden">
<div class="modal-content">
<div id="galeria"></div>
<button class="btn3" onclick="cerrarGaleria()">Cerrar</button>
</div>
</div>

<script type="module">

/* =========================
🔥 IMPORTS FIREBASE
========================= */
import { db } from "./config.js";
import {
  collection, getDocs, query, where, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* ========================= */
const storage = getStorage();

/* ========================= */
let productoActual = null;
let catalogo = [];
let fotos = [];
let stream = null;
let tempFoto = null;

/* ========================= BUSQUEDA */
async function cargarCatalogo(){
  const qy = query(
    collection(db,"productos"),
    where("activo","==",true),
    limit(1000)
  );
  const snap = await getDocs(qy);

  catalogo = snap.docs.map(d=>d.data());
}

function buscar(valor){
  valor = valor.toLowerCase();

  return catalogo.find(p =>
    (p.codigoBarra||"").toLowerCase().includes(valor) ||
    (p.concepto||"").toLowerCase().includes(valor)
  );
}

document.getElementById("busqueda").addEventListener("input", async e=>{
  const v = e.target.value.trim();

  if(!catalogo.length) await cargarCatalogo();

  if(!v){ reset(); return; }

  const p = buscar(v);

  if(p) seleccionar(p);
});

/* ========================= PRODUCTO */
function seleccionar(p){
  productoActual = p;
  fotos = [];
  document.getElementById("nombre").innerText = p.concepto;
  document.getElementById("estado").innerText = "SIN FOTOS";
  document.getElementById("btnFotos").classList.remove("hidden");
}

function reset(){
  productoActual = null;
  fotos = [];
  document.getElementById("nombre").innerText = "Sin producto";
  document.getElementById("estado").innerText = "SIN PRODUCTO";
}

/* ========================= ESCANER */
function abrirEscaner(){
  const c = prompt("Escanea código:");
  if(!c) return;

  const input = document.getElementById("busqueda");
  input.value = c;
  input.dispatchEvent(new Event("input"));
}

/* ========================= CAMARA */
async function abrirCamara(){
  if(!productoActual){ alert("Selecciona producto"); return; }

  document.getElementById("modalCamara").classList.remove("hidden");

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  video.srcObject = stream;
}

function cerrarCamara(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null;
  document.getElementById("modalCamara").classList.add("hidden");
}

/* ========================= FOTO */
function capturar(){
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  canvas.toBlob(b=>{
    tempFoto = b;
    preview.src = URL.createObjectURL(b);
    document.getElementById("modalPreview").classList.remove("hidden");
  },"image/jpeg",0.8);
}

function aceptar(){
  fotos.push(tempFoto);
  tempFoto=null;
  cerrarCamara();
  document.getElementById("modalPreview").classList.add("hidden");

  document.getElementById("estado").innerText = fotos.length+"/3 FOTOS";

  if(fotos.length>0){
    document.getElementById("btnVer").classList.remove("hidden");
    document.getElementById("btnLimpiar").classList.remove("hidden");
  }
}

function repetir(){
  tempFoto=null;
  document.getElementById("modalPreview").classList.add("hidden");
}

/* ========================= GALERIA */
function verFotos(){
  const g = document.getElementById("galeria");
  g.innerHTML="";

  fotos.forEach(f=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    g.appendChild(img);
  });

  document.getElementById("modalGaleria").classList.remove("hidden");
}

function cerrarGaleria(){
  document.getElementById("modalGaleria").classList.add("hidden");
}

/* ========================= LIMPIAR */
function limpiarFotos(){
  fotos=[];
  document.getElementById("estado").innerText="SIN FOTOS";
}

/* ========================= SUBIR FIREBASE */
async function subir(){
  try{

    if(!productoActual){
      alert("Selecciona producto");
      return;
    }

    if(fotos.length !== 3){
      alert("Debes tomar 3 fotos");
      return;
    }

    document.getElementById("estado").innerText="SUBIENDO...";

    const codigo = productoActual.codigoBarra;

    const folder = `${codigo}/${Date.now()}`;

    for(let i=0;i<fotos.length;i++){

      const ruta = `${folder}/foto_${i+1}.jpg`;

      const storageRef = ref(storage, ruta);

      await uploadBytes(storageRef, fotos[i]);

      const url = await getDownloadURL(storageRef);

      console.log("URL:", url);
    }

    document.getElementById("estado").innerText="SUBIDA OK";
    alert("Fotos subidas a Firebase");

  }catch(e){
    console.error(e);
    alert("Error al subir");
  }
}

</script>
</body>
</html>
