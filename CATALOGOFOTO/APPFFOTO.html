<body>

</div>

<!-- MODAL ESCANER -->

  <div class="modal-content">
    <h3>Escanear código</h3>

    <div class="mini">Apunta al código de barras. El escaneo es automático.</div>
    <div id="scanStatus"></div>
    <button class="btn3" onclick="cerrarEscaner()">Cerrar</button>

</div>

<!-- MODAL FOTOS -->

  <div class="modal-content">
    <h3 id="tituloCamara">Tomar foto</h3>
    <video id="video" autoplay playsinline muted></video>
    <div class="mini" id="textoCamara">Captura la foto del producto</div>
    <button id="btnCapturar" class="btn2" onclick="capturarFoto()">Capturar foto</button>
    <button class="btn3" onclick="cerrarCamaraFotos()">Cerrar</button>
  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script type="module">
import { firebaseConfig } from './config.js';

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

let productos = [];
let productoActual = null;
let fotos = [];
let streamFotos = null;
let scanner = null;
let scannerActivo = false;
let ultimaLectura = "";
let ultimaLecturaTs = 0;

const DB_NAME = "provsoft_fotos_db";
const DB_VERSION = 1;
const STORE_PRODUCTOS = "productos";
const STORE_META = "meta";
const TTL_MS = 1000 * 60 * 60 * 12;

let dbIDB = null;

/* DOM */
const video = document.getElementById("video");
const nombre = document.getElementById("nombre");
const estado = document.getElementById("estado");
const alerta = document.getElementById("alerta");
const btnFotos = document.getElementById("btnFotos");
const btnLimpiarFotos = document.getElementById("btnLimpiarFotos");
const badgeProducto = document.getElementById("badgeProducto");

const inputBusqueda = document.getElementById("busqueda");
const sugerencias = document.getElementById("sugerencias");

const modalScanner = document.getElementById("modalScanner");
const modalCamaraFotos = document.getElementById("modalCamaraFotos");
const scanStatus = document.getElementById("scanStatus");

const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const progressSub = document.getElementById("progressSub");
const loaderCard = document.getElementById("loaderCard");

/* =========================
   UTILIDADES UI
========================= */
function setProgress(percent, text, sub = ""){
  progressBar.style.width = percent + "%";
  progressText.textContent = text;
  progressSub.textContent = sub;
}

function finalizarCarga(){
  setProgress(100, "App lista", "Catálogo preparado correctamente");
  setTimeout(() => {
    loaderCard.classList.add("hidden");
  }, 700);
}

function errorCarga(msg){
  progressBar.style.width = "100%";
  progressBar.style.background = "#dc2626";
  progressText.textContent = "Error al preparar la app";
  progressSub.textContent = msg || "Revisa consola";
}

function pausa(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function mostrarOk(msg){
  alerta.textContent = msg;
  alerta.className = "ok";
}

function mostrarWarn(msg){
  alerta.textContent = msg;
  alerta.className = "warn";
}

function mostrarError(msg){
  alerta.textContent = msg;
  alerta.className = "error";
}

/* =========================
   INDEXEDDB
========================= */
function abrirDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = (e) => {
      const dbx = e.target.result;

      if(!dbx.objectStoreNames.contains(STORE_PRODUCTOS)){
        dbx.createObjectStore(STORE_PRODUCTOS, { keyPath: "codigoBarra" });
      }

      if(!dbx.objectStoreNames.contains(STORE_META)){
        dbx.createObjectStore(STORE_META, { keyPath: "key" });
      }
    };

    req.onsuccess = (e) => {
      dbIDB = e.target.result;
      resolve(dbIDB);
    };

    req.onerror = (e) => reject(e);
  });
}

function guardarMeta(key, value){
  return new Promise((resolve, reject) => {
    const tx = dbIDB.transaction(STORE_META, "readwrite");
    const store = tx.objectStore(STORE_META);
    store.put({ key, value });
    tx.oncomplete = () => resolve(true);
    tx.onerror = reject;
  });
}

function leerMeta(key){
  return new Promise((resolve, reject) => {
    const tx = dbIDB.transaction(STORE_META, "readonly");
    const store = tx.objectStore(STORE_META);
    const req = store.get(key);

    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = reject;
  });
}

function guardarProductosDB(lista){
  return new Promise((resolve, reject) => {
    const tx = dbIDB.transaction(STORE_PRODUCTOS, "readwrite");
    const store = tx.objectStore(STORE_PRODUCTOS);

    for(const p of lista){
      store.put(p);
    }

    tx.oncomplete = () => resolve(true);
    tx.onerror = reject;
  });
}

function leerProductosDB(){
  return new Promise((resolve, reject) => {
    const tx = dbIDB.transaction(STORE_PRODUCTOS, "readonly");
    const store = tx.objectStore(STORE_PRODUCTOS);
    const req = store.getAll();

    req.onsuccess = () => resolve(req.result || []);
    req.onerror = reject;
  });
}

async function cacheValido(){
  const ts = await leerMeta("catalogo_timestamp");
  if(!ts) return false;
  return (Date.now() - ts) < TTL_MS;
}

/* =========================
   CATALOGO
========================= */
async function cargarCatalogo(){
  setProgress(5, "Iniciando app...", "Preparando almacenamiento local");

  await abrirDB();

  setProgress(20, "Abriendo base local...", "Revisando catálogo del dispositivo");

  const esValido = await cacheValido();
  const local = await leerProductosDB();

  if(esValido && local.length > 0){
    productos = local;
    setProgress(80, "Catálogo local encontrado", `${productos.length} productos cargados`);
    return;
  }

  setProgress(35, "Descargando catálogo...", "Consultando Firebase Firestore");

  const q = query(
    collection(db, "productos"),
    where("activo", "==", true)
  );

  const snap = await getDocs(q);
  const total = snap.docs.length || 1;
  const lista = [];

  for(let i = 0; i < snap.docs.length; i++){
    const p = snap.docs[i].data();

    if(!p.activo) continue;

    const codigo = String(p.codigoBarra || "").trim();
    const concepto = String(p.concepto || "").trim();
    const equivalentes = Array.isArray(p.codigosEquivalentes)
      ? p.codigosEquivalentes.map(x => String(x || "").trim()).filter(Boolean)
      : [];

    lista.push({
      codigoBarra: codigo,
      concepto: concepto,
      codigosEquivalentes: equivalentes,
      search: `${codigo} ${concepto} ${equivalentes.join(" ")}`.toLowerCase()
    });

    if(i % 50 === 0 || i === snap.docs.length - 1){
      const avance = 35 + Math.round((i / total) * 35);
      setProgress(avance, "Descargando catálogo...", `Procesando ${i + 1} de ${total}`);
      await pausa(0);
    }
  }

  await guardarProductosDB(lista);
  await guardarMeta("catalogo_timestamp", Date.now());

  productos = lista;
  setProgress(95, "Catálogo listo", `${productos.length} productos preparados`);
}

/* =========================
   BUSQUEDA
========================= */
function normalizarTexto(t){
  return String(t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function coincideProducto(producto, texto){
  const q = normalizarTexto(texto);
  if(!q) return false;

  const tokens = q.split(/\s+/).filter(Boolean);
  const equivalentes = Array.isArray(producto.codigosEquivalentes)
    ? producto.codigosEquivalentes.join(" ")
    : "";

  const base = normalizarTexto(`${producto.codigoBarra} ${producto.concepto} ${equivalentes}`);
  return tokens.every(tok => base.includes(tok));
}

function mostrarSugerencias(lista){
  if(!lista.length){
    sugerencias.style.display = "none";
    sugerencias.innerHTML = "";
    return;
  }

  sugerencias.innerHTML = lista.map(p => `
    <div class="sugerencia-item" data-codigo="${escapeHtml(p.codigoBarra)}">
      <strong>${escapeHtml(p.codigoBarra)}</strong> - ${escapeHtml(p.concepto)}
    </div>
  `).join("");

  sugerencias.style.display = "block";

  document.querySelectorAll(".sugerencia-item").forEach(el => {
    el.addEventListener("click", () => {
      const codigo = el.dataset.codigo;
      const prod = buscarProductoPorCodigo(codigo);
      if(prod){
        inputBusqueda.value = `${prod.codigoBarra} ${prod.concepto}`;
        sugerencias.style.display = "none";
        sugerencias.innerHTML = "";
        seleccionar(prod);
      }
    });
  });
}

function buscarEnVivo(){
  const q = inputBusqueda.value.trim();

  if(!q){
    sugerencias.style.display = "none";
    sugerencias.innerHTML = "";
    return;
  }

  const resultados = productos
    .filter(p => coincideProducto(p, q))
    .slice(0, 15);

  mostrarSugerencias(resultados);
}

function buscarProductoPorCodigo(codigo){
  const limpio = String(codigo || "").trim();

  return productos.find(p => {
    if(String(p.codigoBarra || "").trim() === limpio) return true;
    if(Array.isArray(p.codigosEquivalentes) && p.codigosEquivalentes.includes(limpio)) return true;
    return false;
  }) || null;
}

function escapeHtml(text){
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

/* =========================
   PRODUCTO
========================= */
function limpiarPreviewFotos(){
  ["f1", "f2", "f3"].forEach(id => {
    const img = document.getElementById(id);
    if(img.src && img.src.startsWith("blob:")){
      URL.revokeObjectURL(img.src);
    }
    img.removeAttribute("src");
  });
}

function limpiarFotosActuales(){
  fotos = [];
  limpiarPreviewFotos();
  estado.textContent = "SIN FOTOS";
}

async function seleccionar(p){
  if(!p) return;

  if(productoActual && productoActual.codigoBarra !== p.codigoBarra){
    limpiarFotosActuales();
  }

  productoActual = p;

  nombre.innerText = p.concepto || "Sin nombre";
  badgeProducto.textContent = p.codigoBarra || "Sin código";
  badgeProducto.classList.remove("hidden");

  estado.innerText = fotos.length ? `${fotos.length}/3 FOTOS` : "SIN FOTOS";
  btnFotos.classList.remove("hidden");
  btnLimpiarFotos.classList.remove("hidden");

  alerta.innerText = "";
  alerta.className = "";

  try{
    const docRef = doc(db, "productos_fotos", p.codigoBarra);
    const snap = await getDoc(docRef);

    if(snap.exists()){
      const data = snap.data() || {};
      const totalFotos = Array.isArray(data.fotos) ? data.fotos.length : 0;

      if(totalFotos >= 3){
        mostrarWarn("⚠ YA FOTOGRAFIADO");
      }else if(totalFotos > 0){
        mostrarWarn(`⚠ Este producto ya tiene ${totalFotos} foto(s) guardada(s)`);
      }else{
        mostrarOk("Producto listo para fotografiar");
      }
    }else{
      mostrarOk("Producto listo para fotografiar");
    }
  }catch(err){
    console.error(err);
    mostrarError("No se pudo validar si ya tiene fotos");
  }
}

/* =========================
   ESCANER
========================= */
async function abrirEscaner(){
  try{
    if(scannerActivo) return;

    modalScanner.classList.remove("hidden");
    scanStatus.textContent = "Iniciando cámara...";
    scannerActivo = true;
    ultimaLectura = "";
    ultimaLecturaTs = 0;

    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();
    if(!cameras || !cameras.length){
      throw new Error("No se encontró cámara disponible");
    }

    let cameraConfig = { facingMode: "environment" };

    await scanner.start(
      cameraConfig,
      {
        fps: 10,
        qrbox: { width: 260, height: 140 },
        aspectRatio: 1.7778,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        },
        rememberLastUsedCamera: true
      },
      (decodedText) => {
        procesarCodigoEscaneado(decodedText);
      },
      () => {
        // ignorar errores de frame para no ensuciar UI
      }
    );

    scanStatus.textContent = "Escaneando automáticamente...";
  }catch(err){
    console.error(err);
    scanStatus.textContent = "";
    scannerActivo = false;
    try{
      if(scanner){
        await scanner.clear();
      }
    }catch(_e){}
    scanner = null;
    modalScanner.classList.add("hidden");
    alert("No se pudo iniciar el escáner: " + (err.message || err));
  }
}

async function cerrarEscaner(){
  try{
    scanStatus.textContent = "Cerrando cámara...";
    if(scanner){
      try{
        if(scanner.isScanning){
          await scanner.stop();
        }
      }catch(_e){}
      try{
        await scanner.clear();
      }catch(_e){}
    }
  }catch(err){
    console.error(err);
  }finally{
    scanner = null;
    scannerActivo = false;
    scanStatus.textContent = "";
    modalScanner.classList.add("hidden");
    const reader = document.getElementById("reader");
    if(reader) reader.innerHTML = "";
  }
}

function procesarCodigoEscaneado(decodedText){
  const codigo = String(decodedText || "").trim();
  if(!codigo) return;

  const ahora = Date.now();

  if(codigo === ultimaLectura && (ahora - ultimaLecturaTs) < 1500){
    return;
  }

  ultimaLectura = codigo;
  ultimaLecturaTs = ahora;

  scanStatus.textContent = `Leído: ${codigo}`;

  inputBusqueda.value = codigo;
  buscarEnVivo();

  const exacto = buscarProductoPorCodigo(codigo);
  if(exacto){
    seleccionar(exacto);
    cerrarEscaner();
  }else{
    mostrarWarn(`Código escaneado no encontrado: ${codigo}`);
  }
}

/* =========================
   CAMARA FOTOS
========================= */
async function abrirCamaraFotos(){
  try{
    if(!productoActual){
      alert("Primero selecciona un producto");
      return;
    }

    if(fotos.length >= 3){
      alert("Ya capturaste las 3 fotos");
      return;
    }

    modalCamaraFotos.classList.remove("hidden");

    streamFotos = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });

    video.srcObject = streamFotos;

    await new Promise((resolve) => {
      video.onloadedmetadata = () => resolve();
    });

    await video.play();
  }catch(err){
    console.error(err);
    alert("No se pudo abrir la cámara de fotos");
    cerrarCamaraFotos();
  }
}

function cerrarCamaraFotos(){
  try{
    if(streamFotos){
      streamFotos.getTracks().forEach(t => t.stop());
    }
  }catch(err){
    console.error(err);
  }finally{
    streamFotos = null;
    video.srcObject = null;
    modalCamaraFotos.classList.add("hidden");
  }
}

function capturarFoto(){
  try{
    if(!productoActual){
      alert("Primero selecciona un producto");
      return;
    }

    if(!video.srcObject){
      alert("La cámara no está activa");
      return;
    }

    if(fotos.length >= 3){
      alert("Ya son 3 fotos");
      return;
    }

    if(!video.videoWidth || !video.videoHeight){
      alert("La cámara aún no está lista");
      return;
    }

    const canvas = document.getElementById("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob((blob) => {
      if(!blob){
        alert("No se pudo capturar la imagen");
        return;
      }

      fotos.push(blob);

      const idx = fotos.length;
      const img = document.getElementById("f" + idx);

      if(img.src && img.src.startsWith("blob:")){
        URL.revokeObjectURL(img.src);
      }

      img.src = URL.createObjectURL(blob);
      estado.innerText = `${fotos.length}/3 FOTOS`;

      if(fotos.length >= 3){
        cerrarCamaraFotos();
      }
    }, "image/jpeg", 0.82);
  }catch(err){
    console.error(err);
    alert("Error al capturar la foto");
  }
}

/* =========================
   SUBIDA
========================= */
async function subir(){
  try{
    if(!productoActual){
      alert("Primero selecciona un producto");
      return;
    }

    if(fotos.length !== 3){
      alert("Debes capturar exactamente 3 fotos");
      return;
    }

    const codigo = String(productoActual.codigoBarra || "").trim();
    const concepto = String(productoActual.concepto || "").trim();

    const baseTs = Date.now();
    const paths = [];

    for(let i = 0; i < 3; i++){
      estado.innerText = `SUBIENDO ${i + 1}/3`;

      const path = `productos_fotos/${codigo}/${baseTs}_${i + 1}.jpg`;
      const storageRef = ref(storage, path);

      await uploadBytes(storageRef, fotos[i], {
        contentType: "image/jpeg"
      });

      paths.push(path);
    }

    await setDoc(doc(db, "productos_fotos", codigo), {
      codigoBarra: codigo,
      concepto,
      fotos: paths,
      status: "COMPLETO",
      actualizadoEn: new Date().toISOString()
    }, { merge: true });

    limpiarFotosActuales();
    estado.innerText = "SIN FOTOS";
    mostrarOk("✅ FOTOS SUBIDAS");
  }catch(err){
    console.error(err);
    alert("Error al subir fotos");
    if(productoActual && fotos.length){
      estado.innerText = `${fotos.length}/3 FOTOS`;
    }
  }
}

/* =========================
   EVENTOS
========================= */
inputBusqueda.addEventListener("input", () => {
  const q = inputBusqueda.value.trim();

  if(!q){
    sugerencias.style.display = "none";
    sugerencias.innerHTML = "";
    return;
  }

  const exacto = buscarProductoPorCodigo(q);
  if(exacto){
    mostrarSugerencias([exacto]);
    return;
  }

  buscarEnVivo();
});

inputBusqueda.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();

    const q = inputBusqueda.value.trim();
    if(!q) return;

    const exacto = buscarProductoPorCodigo(q);
    if(exacto){
      sugerencias.style.display = "none";
      sugerencias.innerHTML = "";
      seleccionar(exacto);
      return;
    }

    const resultados = productos.filter(p => coincideProducto(p, q)).slice(0, 1);
    if(resultados.length){
      sugerencias.style.display = "none";
      sugerencias.innerHTML = "";
      seleccionar(resultados[0]);
    }
  }
});

inputBusqueda.addEventListener("focus", () => {
  if(inputBusqueda.value.trim()){
    buscarEnVivo();
  }
});

document.addEventListener("click", (e) => {
  if(!sugerencias.contains(e.target) && e.target !== inputBusqueda){
    sugerencias.style.display = "none";
  }
});

    errorCarga(err.message || "Falló la preparación de la app");

await init();
