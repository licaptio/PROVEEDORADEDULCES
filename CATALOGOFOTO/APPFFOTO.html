<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVSOFT Fotos V3</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0c6cbd;
}

.wrap{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input, button{
  width:100%;
  padding:14px;
  border-radius:10px;
  margin-top:8px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.btn1{ background:#00416A; color:white; }
.btn2{ background:#16a34a; color:white; }
.btn3{ background:#dc2626; color:white; }
.btn4{ background:#ca8a04; color:white; }

img{
  width:100%;
  border-radius:10px;
  margin-top:6px;
  background:#f3f4f6;
  min-height:80px;
  object-fit:cover;
}

.ok{
  color:#15803d;
  font-weight:bold;
}

.warn{
  color:#b45309;
  font-weight:bold;
}

.error{
  color:#b91c1c;
  font-weight:bold;
}

.hidden{
  display:none !important;
}

/* loader */
#loaderCard{
  position:sticky;
  top:10px;
  z-index:20;
}

#progressWrap{
  width:100%;
  height:18px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-top:8px;
}

#progressBar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00416A,#0c6cbd,#16a34a);
  transition:width .25s ease;
}

#progressText{
  margin-top:8px;
  font-size:14px;
  font-weight:bold;
  color:#111827;
}

#progressSub{
  margin-top:4px;
  font-size:13px;
  color:#4b5563;
}

/* sugerencias */
.sugerencias{
  margin-top:8px;
  border:1px solid #d1d5db;
  border-radius:10px;
  background:#fff;
  max-height:220px;
  overflow-y:auto;
  display:none;
}

.sugerencia-item{
  padding:10px 12px;
  border-bottom:1px solid #eef2f7;
  cursor:pointer;
  font-size:14px;
}

.sugerencia-item:last-child{
  border-bottom:none;
}

.sugerencia-item:hover{
  background:#f3f4f6;
}

/* modal cámara */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.82);
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
}

.modal-content{
  width:100%;
  max-width:520px;
  background:white;
  border-radius:16px;
  padding:12px;
}

video{
  width:100%;
  border-radius:12px;
  background:#111;
  min-height:260px;
}

.mini{
  font-size:13px;
  color:#444;
  margin-top:8px;
}
</style>
</head>
<body>

<div class="wrap">

  <!-- CARGA -->
  <div class="card" id="loaderCard">
    <h3>Preparando app</h3>
    <div id="progressWrap">
      <div id="progressBar"></div>
    </div>
    <div id="progressText">Iniciando app...</div>
    <div id="progressSub">Espera un momento</div>
  </div>

  <!-- BUSQUEDA -->
  <div class="card">
    <h3>Buscar producto</h3>
    <input id="busqueda" placeholder="Código o texto" autocomplete="off">
    <button class="btn1" onclick="abrirEscaner()">Escanear código</button>
    <div id="sugerencias" class="sugerencias"></div>
  </div>

  <!-- PRODUCTO -->
  <div class="card">
    <h3 id="nombre">Sin producto</h3>
    <div id="estado">SIN FOTOS</div>
    <div id="alerta"></div>
    <button id="btnFotos" class="btn2 hidden" onclick="abrirCamaraFotos()">Tomar fotos</button>
  </div>

  <!-- FOTOS -->
  <div class="card">
    <h3>Fotos</h3>
    <img id="f1">
    <img id="f2">
    <img id="f3">
    <button class="btn4" onclick="subir()">Subir</button>
  </div>

</div>

<!-- MODAL CAMARA -->
<div id="modalCamara" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloCamara">Cámara</h3>
    <video id="video" autoplay playsinline></video>
    <div class="mini" id="textoCamara">Usa la cámara solo cuando se necesite</div>
    <button id="btnCapturar" class="btn2" onclick="capturar()">Capturar</button>
    <button class="btn3" onclick="cerrarCamara()">Cerrar</button>
  </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">
import { firebaseConfig } from './config.js';

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

let productos = [];
let productoActual = null;
let fotos = [];
let stream = null;
let modoCamara = null; // "scan" o "foto"

const DB_NAME = "provsoft_fotos_db";
const DB_VERSION = 1;
const STORE_PRODUCTOS = "productos";
const STORE_META = "meta";
const TTL_MS = 1000 * 60 * 60 * 12;

let dbIDB = null;

/* DOM */
const video = document.getElementById("video");
const nombre = document.getElementById("nombre");
const estado = document.getElementById("estado");
const alerta = document.getElementById("alerta");
const btnFotos = document.getElementById("btnFotos");

const inputBusqueda = document.getElementById("busqueda");
const sugerencias = document.getElementById("sugerencias");

const modalCamara = document.getElementById("modalCamara");
const tituloCamara = document.getElementById("tituloCamara");
const textoCamara = document.getElementById("textoCamara");
const btnCapturar = document.getElementById("btnCapturar");

const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const progressSub = document.getElementById("progressSub");
const loaderCard = document.getElementById("loaderCard");

<script type="module">
function setProgress(percent, text, sub=""){
  progressBar.style.width = percent + "%";
  progressText.textContent = text;
  progressSub.textContent = sub;
}

function finalizarCarga(){
  setProgress(100, "App lista", "Catálogo preparado correctamente");
  setTimeout(()=>{
    loaderCard.classList.add("hidden");
  }, 700);
}

function errorCarga(msg){
  progressBar.style.width = "100%";
  progressBar.style.background = "#dc2626";
  progressText.textContent = "Error al preparar la app";
  progressSub.textContent = msg || "Revisa consola";
}

function pausa(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function abrirDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = (e)=>{
      const db = e.target.result;

      if(!db.objectStoreNames.contains(STORE_PRODUCTOS)){
        db.createObjectStore(STORE_PRODUCTOS, { keyPath:"codigoBarra" });
      }

      if(!db.objectStoreNames.contains(STORE_META)){
        db.createObjectStore(STORE_META, { keyPath:"key" });
      }
    };

    req.onsuccess = (e)=>{
      dbIDB = e.target.result;
      resolve(dbIDB);
    };

    req.onerror = (e)=> reject(e);
  });
}

function guardarMeta(key, value){
  return new Promise((resolve, reject)=>{
    const tx = dbIDB.transaction(STORE_META, "readwrite");
    const store = tx.objectStore(STORE_META);
    store.put({ key, value });
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = reject;
  });
}

function leerMeta(key){
  return new Promise((resolve, reject)=>{
    const tx = dbIDB.transaction(STORE_META, "readonly");
    const store = tx.objectStore(STORE_META);
    const req = store.get(key);

    req.onsuccess = ()=> resolve(req.result ? req.result.value : null);
    req.onerror = reject;
  });
}

function guardarProductosDB(lista){
  return new Promise((resolve, reject)=>{
    const tx = dbIDB.transaction(STORE_PRODUCTOS, "readwrite");
    const store = tx.objectStore(STORE_PRODUCTOS);

    for(const p of lista){
      store.put(p);
    }

    tx.oncomplete = ()=> resolve(true);
    tx.onerror = reject;
  });
}

function leerProductosDB(){
  return new Promise((resolve, reject)=>{
    const tx = dbIDB.transaction(STORE_PRODUCTOS, "readonly");
    const store = tx.objectStore(STORE_PRODUCTOS);
    const req = store.getAll();

    req.onsuccess = ()=> resolve(req.result || []);
    req.onerror = reject;
  });
}

async function cacheValido(){
  const ts = await leerMeta("catalogo_timestamp");
  if(!ts) return false;
  return (Date.now() - ts) < TTL_MS;
}

<script type="module">
async function cargarCatalogo(){
  setProgress(5, "Iniciando app...", "Preparando almacenamiento local");

  await abrirDB();

  setProgress(20, "Abriendo base local...", "Revisando catálogo del dispositivo");

  const esValido = await cacheValido();
  const local = await leerProductosDB();

  if(esValido && local.length > 0){
    productos = local;
    setProgress(80, "Catálogo local encontrado", `${productos.length} productos cargados`);
    return;
  }

  setProgress(35, "Descargando catálogo...", "Consultando Firebase Firestore");

  const q = query(
    collection(db, "productos"),
    where("activo", "==", true)
  );

  const snap = await getDocs(q);
  const total = snap.docs.length || 1;
  const lista = [];

  for(let i = 0; i < snap.docs.length; i++){
    const p = snap.docs[i].data();

    if(!p.activo) continue;

    const codigo = String(p.codigoBarra || "").trim();
    const concepto = String(p.concepto || "").trim();

    lista.push({
      codigoBarra: codigo,
      concepto: concepto,
      search: `${codigo} ${concepto}`.toLowerCase()
    });

    if(i % 50 === 0 || i === snap.docs.length - 1){
      const avance = 35 + Math.round((i / total) * 35);
      setProgress(avance, "Descargando catálogo...", `Procesando ${i + 1} de ${total}`);
      await pausa(0);
    }
  }

  await guardarProductosDB(lista);
  await guardarMeta("catalogo_timestamp", Date.now());

  productos = lista;
  setProgress(95, "Catálogo listo", `${productos.length} productos preparados`);
}

function normalizarTexto(t){
  return String(t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function coincideProducto(producto, texto){
  const q = normalizarTexto(texto);
  if(!q) return false;

  const tokens = q.split(/\s+/).filter(Boolean);
  const base = normalizarTexto(`${producto.codigoBarra} ${producto.concepto}`);

  return tokens.every(tok => base.includes(tok));
}

function mostrarSugerencias(lista){
  if(!lista.length){
    sugerencias.style.display = "none";
    sugerencias.innerHTML = "";
    return;
  }

  sugerencias.innerHTML = lista.map(p => `
    <div class="sugerencia-item" data-codigo="${p.codigoBarra}">
      <strong>${p.codigoBarra}</strong> - ${p.concepto}
    </div>
  `).join("");

  sugerencias.style.display = "block";

  document.querySelectorAll(".sugerencia-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const codigo = el.dataset.codigo;
      const prod = productos.find(p => String(p.codigoBarra) === String(codigo));
      if(prod){
        inputBusqueda.value = `${prod.codigoBarra} ${prod.concepto}`;
        sugerencias.style.display = "none";
        sugerencias.innerHTML = "";
        seleccionar(prod);
      }
    });
  });
}

function buscarEnVivo(){
  const q = inputBusqueda.value.trim();

  if(!q){
    sugerencias.style.display = "none";
    sugerencias.innerHTML = "";
    return;
  }

  const resultados = productos
    .filter(p => coincideProducto(p, q))
    .slice(0, 15);

  mostrarSugerencias(resultados);
}

<script type="module">
async function seleccionar(p){
  productoActual = p;
  nombre.innerText = p.concepto || "Sin nombre";
  estado.innerText = fotos.length ? `${fotos.length}/3 FOTOS` : "SIN FOTOS";
  alerta.innerText = "";
  btnFotos.classList.remove("hidden");

  try{
    const docRef = doc(db, "productos_fotos", p.codigoBarra);
    const snap = await getDoc(docRef);

    if(snap.exists()){
      alerta.innerText = "⚠ YA FOTOGRAFIADO";
      alerta.className = "warn";
    }else{
      alerta.innerText = "Producto listo para fotografiar";
      alerta.className = "ok";
    }
  }catch(err){
    console.error(err);
    alerta.innerText = "No se pudo validar si ya tiene fotos";
    alerta.className = "error";
  }
}

window.abrirEscaner = async function(){
  try{
    modoCamara = "scan";
    tituloCamara.textContent = "Escanear código";
    textoCamara.textContent = "Acerca el código al centro y luego captura";
    btnCapturar.textContent = "Capturar código";

    modalCamara.classList.remove("hidden");

    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" },
      audio:false
    });

    video.srcObject = stream;
  }catch(err){
    console.error(err);
    alert("No se pudo abrir la cámara");
    cerrarCamara();
  }
}

window.abrirCamaraFotos = async function(){
  try{
    if(!productoActual) return alert("Primero selecciona un producto");

    modoCamara = "foto";
    tituloCamara.textContent = "Tomar foto";
    textoCamara.textContent = "Captura la foto del producto";
    btnCapturar.textContent = "Capturar foto";

    modalCamara.classList.remove("hidden");

    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"environment" },
      audio:false
    });

    video.srcObject = stream;
  }catch(err){
    console.error(err);
    alert("No se pudo abrir la cámara");
    cerrarCamara();
  }
}

window.cerrarCamara = function(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  video.srcObject = null;
  modalCamara.classList.add("hidden");
  modoCamara = null;
}

<script type="module">
window.capturar = function(){
  if(!video.srcObject) return alert("La cámara no está activa");

  const canvas = document.getElementById("canvas");

  if(!video.videoWidth || !video.videoHeight){
    return alert("La cámara aún no está lista");
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  if(modoCamara === "scan"){
    const codigo = prompt("Pega o escribe el código detectado:");
    if(codigo){
      inputBusqueda.value = codigo.trim();
      buscarEnVivo();

      const exacto = productos.find(p =>
        String(p.codigoBarra).trim().toLowerCase() === codigo.trim().toLowerCase()
      );

      if(exacto){
        seleccionar(exacto);
      }
    }

    cerrarCamara();
    return;
  }

  if(modoCamara === "foto"){
    if(!productoActual) return alert("Primero selecciona un producto");
    if(fotos.length >= 3) return alert("Ya son 3 fotos");

    canvas.toBlob(blob=>{
      if(!blob) return alert("No se pudo capturar la imagen");

      fotos.push(blob);

      const img = document.getElementById("f" + fotos.length);
      img.src = URL.createObjectURL(blob);

      estado.innerText = `${fotos.length}/3 FOTOS`;

      if(fotos.length >= 3){
        cerrarCamara();
      }
    }, "image/jpeg", 0.78);
  }
}

<script type="module">
window.subir = async function(){
  try{
    if(!productoActual) return alert("Primero selecciona un producto");
    if(fotos.length !== 3) return alert("Faltan fotos");

    const codigo = productoActual.codigoBarra;
    const paths = [];

    for(let i = 0; i < 3; i++){
      estado.innerText = `SUBIENDO ${i + 1}/3`;

      const path = `productos_fotos/${codigo}/${Date.now()}_${i}.jpg`;
      const r = ref(storage, path);

      await uploadBytes(r, fotos[i]);
      paths.push(path);
    }

    await setDoc(doc(db, "productos_fotos", codigo), {
      codigoBarra: codigo,
      concepto: productoActual.concepto || "",
      fotos: paths,
      status: "COMPLETO",
      actualizadoEn: new Date().toISOString()
    });

    alert("OK SUBIDO");

    fotos = [];
    document.getElementById("f1").src = "";
    document.getElementById("f2").src = "";
    document.getElementById("f3").src = "";
    estado.innerText = "SIN FOTOS";
    alerta.innerText = "✅ FOTOS SUBIDAS";
    alerta.className = "ok";
  }catch(err){
    console.error(err);
    alert("Error al subir fotos");
  }
}

inputBusqueda.addEventListener("input", buscarEnVivo);

inputBusqueda.addEventListener("focus", ()=>{
  if(inputBusqueda.value.trim()){
    buscarEnVivo();
  }
});

document.addEventListener("click", (e)=>{
  if(!sugerencias.contains(e.target) && e.target !== inputBusqueda){
    sugerencias.style.display = "none";
  }
});

async function init(){
  try{
    setProgress(1, "Iniciando app...", "Cargando módulos");
    await cargarCatalogo();
    finalizarCarga();
  }catch(err){
    console.error(err);
    errorCarga(err.message || "Falló la preparación de la app");
  }
}

await init();
</script>

</body>
</html>
