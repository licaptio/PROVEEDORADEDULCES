<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PROVSOFT Fotos V5</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0c6cbd;
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

input, button{
  width:100%;
  padding:14px;
  border-radius:10px;
  margin-top:8px;
  font-size:16px;
}

button{ border:none; font-weight:bold; }

.btn1{ background:#00416A; color:white; }
.btn2{ background:#16a34a; color:white; }
.btn3{ background:#dc2626; color:white; }
.btn4{ background:#ca8a04; color:white; }
.btn5{ background:#374151; color:white; }

.hidden{ display:none !important; }

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:10px;
}

.modal-content{
  background:white;
  border-radius:14px;
  width:100%;
  max-width:520px;
  padding:12px;
}

video, img{
  width:100%;
  border-radius:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.galeria img{
  margin-top:8px;
}

</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h3>Buscar producto</h3>
<input id="busqueda" placeholder="Código o texto">
<button class="btn1" onclick="abrirEscaner()">Escanear código</button>
</div>

<div class="card">
<h3 id="nombre">Sin producto</h3>
<div id="estado">SIN FOTOS</div>

<div class="row">
<button id="btnFotos" class="btn2 hidden" onclick="abrirCamara()">Tomar fotos</button>
<button id="btnVer" class="btn5 hidden" onclick="abrirGaleria()">Ver fotos</button>
</div>

<button id="btnLimpiar" class="btn3 hidden" onclick="limpiar()">Limpiar fotos</button>

<button class="btn4" onclick="subir()">Subir</button>
</div>

</div>

<!-- MODAL CAMARA -->
<div id="modalCamara" class="modal hidden">
  <div class="modal-content">
    <h3>Cámara</h3>
    <video id="video" autoplay playsinline></video>
    <button class="btn2" onclick="capturar()">Capturar</button>
    <button class="btn3" onclick="cerrarCamara()">Cerrar</button>
  </div>
</div>

<!-- MODAL PREVIEW -->
<div id="modalPreview" class="modal hidden">
  <div class="modal-content">
    <h3>Revisar foto</h3>
    <img id="preview">
    <div class="row">
      <button class="btn2" onclick="aceptar()">Aceptar</button>
      <button class="btn3" onclick="repetir()">Repetir</button>
    </div>
  </div>
</div>

<!-- MODAL GALERIA -->
<div id="modalGaleria" class="modal hidden">
  <div class="modal-content">
    <h3>Fotos capturadas</h3>
    <div id="galeria" class="galeria"></div>
    <button class="btn3" onclick="cerrarGaleria()">Cerrar</button>
  </div>
</div>

<script>
let productoActual = null;
let fotos = [];
let stream = null;
let tempFoto = null;

/* UI */
const estado = document.getElementById("estado");
const btnFotos = document.getElementById("btnFotos");
const btnVer = document.getElementById("btnVer");
const btnLimpiar = document.getElementById("btnLimpiar");

const video = document.getElementById("video");
const preview = document.getElementById("preview");

/* ===== PRODUCTO MOCK ===== */
function seleccionarDummy(){
  productoActual = { codigoBarra:"123", concepto:"PRODUCTO PRUEBA" };
  document.getElementById("nombre").innerText = productoActual.concepto;
  btnFotos.classList.remove("hidden");
}

/* ===== CAMARA ===== */
async function abrirCamara(){
  if(fotos.length>=3){ alert("Máximo 3"); return; }

  document.getElementById("modalCamara").classList.remove("hidden");

  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });

  video.srcObject = stream;
}

function cerrarCamara(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=null;
  document.getElementById("modalCamara").classList.add("hidden");
}

/* ===== CAPTURA ===== */
function capturar(){
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  canvas.toBlob(blob=>{
    tempFoto = blob;
    preview.src = URL.createObjectURL(blob);

    document.getElementById("modalPreview").classList.remove("hidden");
  },"image/jpeg",0.8);
}

/* ===== PREVIEW ===== */
function aceptar(){
  fotos.push(tempFoto);
  tempFoto=null;

  cerrarCamara();
  document.getElementById("modalPreview").classList.add("hidden");

  actualizarUI();
}

function repetir(){
  tempFoto=null;
  document.getElementById("modalPreview").classList.add("hidden");
}

/* ===== UI ===== */
function actualizarUI(){
  estado.innerText = fotos.length
    ? `${fotos.length}/3 FOTOS`
    : "SIN FOTOS";

  if(fotos.length>0){
    btnVer.classList.remove("hidden");
    btnLimpiar.classList.remove("hidden");
  }
}

/* ===== GALERIA ===== */
function abrirGaleria(){
  const cont = document.getElementById("galeria");
  cont.innerHTML = "";

  fotos.forEach(f=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    cont.appendChild(img);
  });

  document.getElementById("modalGaleria").classList.remove("hidden");
}

function cerrarGaleria(){
  document.getElementById("modalGaleria").classList.add("hidden");
}

/* ===== LIMPIAR ===== */
function limpiar(){
  fotos = [];
  actualizarUI();
}

/* ===== SUBIR (placeholder) ===== */
function subir(){
  if(fotos.length!==3){
    alert("Son 3 fotos");
    return;
  }
  alert("Simulación subida OK");
}

/* INIT */
seleccionarDummy();
</script>

</body>
</html>
