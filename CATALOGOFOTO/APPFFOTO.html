<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVSOFT Fotos V2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c6cbd;
}

.wrap{
  max-width:500px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

input, button{
  width:100%;
  padding:14px;
  border-radius:10px;
  margin-top:8px;
  font-size:16px;
}

button{ border:none; font-weight:bold; }

.btn1{ background:#00416A; color:white; }
.btn2{ background:#16a34a; color:white; }
.btn3{ background:#dc2626; color:white; }
.btn4{ background:#ca8a04; color:white; }

video{ width:100%; border-radius:12px; }

img{
  width:100%;
  border-radius:10px;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h3>Buscar producto</h3>
<input id="busqueda" placeholder="Código o texto">
<button class="btn1" onclick="buscar()">Buscar</button>
<button class="btn4" onclick="actualizarCatalogo()">Actualizar catálogo</button>
</div>

<div class="card">
<h3 id="nombre">Sin producto</h3>
<div id="estado">SIN FOTOS</div>
<div id="alerta"></div>
</div>

<div class="card">
<video id="video" autoplay playsinline></video>
<button class="btn1" onclick="iniciarCamara()">Iniciar cámara</button>
<button class="btn2" onclick="capturar()">Tomar foto</button>
<button class="btn3" onclick="detenerCamara()">Detener</button>
</div>

<div class="card">
<h3>Fotos</h3>
<img id="f1">
<img id="f2">
<img id="f3">
<button class="btn4" onclick="subir()">Subir</button>
</div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script type="module">
import { firebaseConfig } from './config.js';

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// ===== VARIABLES =====
let productos = [];
let productoActual = null;
let fotos = [];
let stream = null;

// CACHE CONFIG
const CACHE_KEY = "catalogo_productos";
const CACHE_TIME = "catalogo_timestamp";
const TTL = 1000 * 60 * 60 * 12; // 12 horas

// ===== LOCAL STORAGE CACHE =====
function guardarCache(data){
  localStorage.setItem(CACHE_KEY, JSON.stringify(data));
  localStorage.setItem(CACHE_TIME, Date.now());
}

function leerCache(){
  const data = localStorage.getItem(CACHE_KEY);
  return data ? JSON.parse(data) : null;
}

function cacheValido(){
  const t = localStorage.getItem(CACHE_TIME);
  if(!t) return false;
  return (Date.now() - t) < TTL;
}

async function cargarCatalogo(){
  if(cacheValido()){
    productos = leerCache();
    console.log("CATALOGO DESDE CACHE");
    return;
  }

  console.log("DESCARGANDO CATALOGO...");

  const snap = await getDocs(collection(db,"productos"));

  productos = snap.docs.map(d => {
    const p = d.data();
    return {
      ...p,
      search: (p.concepto + " " + (p.marca||"") + " " + (p.codigoBarra||""))
        .toLowerCase()
    };
  });

  guardarCache(productos);
}

async function actualizarCatalogo(){
  localStorage.removeItem(CACHE_KEY);
  localStorage.removeItem(CACHE_TIME);
  await cargarCatalogo();
  alert("Catálogo actualizado");
}

function buscar(){
  const q = document.getElementById("busqueda").value.toLowerCase();

  // ===== CODIGO DIRECTO =====
  const exacto = productos.find(p => p.codigoBarra == q);

  if(exacto){
    seleccionar(exacto);
    return;
  }

  // ===== BUSQUEDA POR TEXTO =====
  const resultados = productos.filter(p => p.search.includes(q));

  if(resultados.length == 1){
    seleccionar(resultados[0]);
  } else if(resultados.length > 1){
    mostrarLista(resultados);
  } else {
    alert("No encontrado");
  }
}

function mostrarLista(lista){
  let texto = "Selecciona:\n";
  lista.slice(0,10).forEach((p,i)=>{
    texto += `${i+1}. ${p.concepto}\n`;
  });

  const i = prompt(texto);
  if(!i) return;

  seleccionar(lista[i-1]);
}

async function seleccionar(p){
  productoActual = p;
  document.getElementById("nombre").innerText = p.concepto;

  // revisar si ya tiene fotos
  const docRef = doc(db,"productos_fotos",p.codigoBarra);
  const snap = await getDoc(docRef);

  if(snap.exists()){
    document.getElementById("alerta").innerText = "⚠ YA FOTOGRAFIADO";
  } else {
    document.getElementById("alerta").innerText = "";
  }
}

async function iniciarCamara(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" }
  });
  video.srcObject = stream;
}

function detenerCamara(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
}

function capturar(){
  if(fotos.length>=3) return alert("Ya son 3");

  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  canvas.toBlob(blob=>{
    fotos.push(blob);
    document.getElementById("f"+fotos.length).src = URL.createObjectURL(blob);
    document.getElementById("estado").innerText = fotos.length + "/3";
  },"image/jpeg",0.75);
}

async function subir(){
  if(fotos.length!=3) return alert("Faltan fotos");

  const codigo = productoActual.codigoBarra;

  let paths=[];

  for(let i=0;i<3;i++){
    const path = `productos_fotos/${codigo}/${Date.now()}_${i}.jpg`;
    const r = ref(storage,path);

    await uploadBytes(r,fotos[i]);
    paths.push(path);
  }

  await setDoc(doc(db,"productos_fotos",codigo),{
    codigoBarra:codigo,
    fotos:paths,
    status:"COMPLETO"
  });

  alert("OK SUBIDO");
  fotos=[];
}

await cargarCatalogo();
</script>
</body>
</html>
