<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fijaciones Descuentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef1f5;
      margin:0;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      box-shadow:0 4px 12px rgba(0,0,0,.12);
      padding:14px;
      margin:12px 0;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    th, td{
      padding:8px;
      border-bottom:1px solid #e5e7eb;
    }

    th{
      text-align:left;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:12px;
    }

    .kpi{
      background:#f6f7fb;
      border-radius:12px;
      padding:10px;
    }

    .kpi strong{
      display:block;
      font-size:12px;
      color:#555;
    }

    .kpi span{
      font-weight:700;
    }

    #errores{
      display:none;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<h2>Control de Fijaciones</h2>

<div id="errores"></div>
<div id="grid"></div>

<script type="module">
import { firebaseConfig } from './config.js'
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"

const FIJACIONES = [
  {"codigo":"010040","base":65,"desc":"HARI MASA 10/1 KGR"},
  {"codigo":"7501048102501","base":1200,"desc":"ACEITE KARTAMUS 900 ML"},
  {"codigo":"2836","base":20,"desc":"HIGIENICO VOGUE C/80 PZ"},
  {"codigo":"7501011900332","base":75,"desc":"CHILE FARO RODAJAS BOLSA 3K"},
  {"codigo":"5160","base":140,"desc":"HIGIENICO KLEENEX C/80 (T)"},
  {"codigo":"7501020540666","base":6480,"desc":"LECHE NUTRI LECHE 1 LTO"}
];

function normalize(p){
  if(!p) return [];
  if(Array.isArray(p)) return p;
  if(typeof p === "object") return Object.values(p);
  if(typeof p === "string"){
    try { return JSON.parse(p) } catch { return [] }
  }
  return [];
}

function fmtFecha(ts){
  try{
    if(ts?.toDate) return ts.toDate().toLocaleString();
  }catch{}
  return "";
}

function showError(msg){
  const box = document.getElementById("errores");
  box.style.display = "block";
  box.innerHTML += `<div style="background:#fff3cd;padding:10px;border-radius:10px;margin:8px 0;">${msg}</div>`;
}

document.addEventListener("DOMContentLoaded", async () => {

  const grid = document.getElementById("grid");
  grid.innerHTML = "Cargando...";

  let db;

  try{
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  }catch(e){
    showError("Error inicializando Firebase. Revisa config.js");
    return;
  }

  const sources = [
    { almacen:"Almacen_Dulces", col: collection(db,"almacenes","Almacen_Dulces","salidas") },
    { almacen:"Almacen_Liquidos", col: collection(db,"almacenes","Almacen_Liquidos","salidas") }
  ];

  const resultados = new Map();

  await Promise.all(sources.map(async src=>{
    try{
      const snap = await getDocs(src.col);

      snap.forEach(doc=>{
        const data = doc.data();
        const lista = normalize(data.productos);

        lista.forEach(p=>{
          const sku = String(p.codigo || "").trim();
          if(!sku) return;

          const cant = Number(p.cantidad || 0);
          if(!resultados.has(sku)){
            resultados.set(sku,{ total:0, eventos:[] });
          }

          resultados.get(sku).total += cant;
          resultados.get(sku).eventos.push({
            fecha: fmtFecha(data.timestamp),
            almacen: src.almacen,
            cantidad: cant
          });
        });
      });

    }catch(e){
      showError("Error leyendo Firestore en " + src.almacen);
    }
  }));

  grid.innerHTML = "";

  FIJACIONES.forEach(item=>{

    const info = resultados.get(item.codigo) || { total:0, eventos:[] };
    const restante = item.base - info.total;

    const card = document.createElement("div");
    card.className="card";

    let rows="";

    if(info.eventos.length===0){
      rows=`<tr><td colspan="3">Sin salidas</td></tr>`;
    } else {
      info.eventos.forEach(ev=>{
        rows+=`
        <tr>
          <td>${ev.fecha}</td>
          <td>${ev.almacen}</td>
          <td style="text-align:right">${ev.cantidad}</td>
        </tr>`;
      });
    }

    card.innerHTML=`
      <h3>${item.desc}</h3>

      <div class="kpis">
        <div class="kpi"><strong>SKU</strong><span>${item.codigo}</span></div>
        <div class="kpi"><strong>Base</strong><span>${item.base}</span></div>
        <div class="kpi"><strong>Descuentos</strong><span>${info.total}</span></div>
        <div class="kpi"><strong>Restante</strong><span style="color:${restante<0?'#b00020':'#0a6c21'}">${restante}</span></div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Almacén</th>
            <th style="text-align:right">Salida</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    `;

    grid.appendChild(card);
  });

});
</script>

</body>
</html>
