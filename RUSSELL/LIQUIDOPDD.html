<script type="module">
import { firebaseConfig } from './config.js'
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

const FIJACIONES = [
{"codigo":"010040","base":65,"desc":"HARI MASA 10/1 KGR"},
{"codigo":"7501048102501","base":1200,"desc":"ACEITE KARTAMUS 900 ML"},
{"codigo":"2836","base":20,"desc":"HIGIENICO VOGUE C/80 PZ"},
{"codigo":"7501011900332","base":75,"desc":"CHILE FARO RODAJAS BOLSA 3K"},
{"codigo":"5160","base":140,"desc":"HIGIENICO KLEENEX C/80 (T)"},
{"codigo":"7501020540666","base":6480,"desc":"LECHE NUTRI LECHE 1 LTO"}
]

const sources = [
  { almacen:"Almacen_Dulces", col: collection(db, "almacenes", "Almacen_Dulces", "salidas") },
  { almacen:"Almacen_Liquidos", col: collection(db, "almacenes", "Almacen_Liquidos", "salidas") }
]

const grid = document.getElementById("grid")

function normalize(p){
  if(!p) return []
  if(Array.isArray(p)) return p
  if(typeof p === "object") return Object.values(p)
  if(typeof p === "string"){
    try { return JSON.parse(p) } catch { return [] }
  }
  return []
}

async function calcularDescuentos(sku){

  let totalDescuento = 0
  let eventos = []

  for(const src of sources){
    const snap = await getDocs(src.col)

    snap.forEach(docSnap => {
      const data = docSnap.data()
      if(!data.productos) return

      const lista = normalize(data.productos)
      const prod = lista.find(p => String(p.codigo).trim() === String(sku).trim())
      if(!prod) return

      const cant = Number(prod.cantidad || 0)
      totalDescuento += cant

      eventos.push({
        fecha: data.timestamp?.toDate?.()?.toLocaleString() || "",
        almacen: src.almacen,
        cantidad: cant
      })
    })
  }

  return { totalDescuento, eventos }
}

async function render(){

  for(const item of FIJACIONES){

    const { totalDescuento, eventos } = await calcularDescuentos(item.codigo)

    const restante = item.base - totalDescuento

    const card = document.createElement("div")
    card.className = "card"

    let rows = ""

    if(eventos.length === 0){
      rows = `<tr><td colspan="3">Sin salidas</td></tr>`
    } else {
      eventos.forEach(ev=>{
        rows += `
        <tr>
          <td>${ev.fecha}</td>
          <td>${ev.almacen}</td>
          <td>${ev.cantidad}</td>
        </tr>`
      })
    }

    card.innerHTML = `
      <h3>${item.desc}</h3>

      <div class="kpis">
        <div class="kpi">
          <strong>SKU</strong>
          <span>${item.codigo}</span>
        </div>
        <div class="kpi">
          <strong>Base</strong>
          <span>${item.base}</span>
        </div>
        <div class="kpi">
          <strong>Descuentos</strong>
          <span>${totalDescuento}</span>
        </div>
        <div class="kpi">
          <strong>Restante</strong>
          <span>${restante}</span>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Almacén</th>
            <th>Salida</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    `

    grid.appendChild(card)
  }
}

render()
</script>
