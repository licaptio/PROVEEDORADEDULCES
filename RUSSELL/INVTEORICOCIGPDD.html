<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Saldo Actual – Cigarros</title>

<style>
:root{
  --color:#00416A;
  --bg:#f2f4f7;
  --card:#fff;
  --muted:#6b7280;
}
html,body{
  margin:0; padding:0; height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
}
header{
  background:var(--color);
  color:#fff;
  padding:12px 14px;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}
header .left{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}
header .title{
  font-weight:800;
  font-size:16px;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
header .meta{
  font-size:12px;
  opacity:.85;
}
header button{
  background:#fff;
  color:var(--color);
  border:0;
  padding:8px 12px;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
}
header button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

#lista{
  padding:10px;
}

/* Card */
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px 14px;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.nombre{
  font-size:14px;
  font-weight:700;
  line-height:1.15;
  min-width:0;
}
.nombre small{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin-top:4px;
}
.saldo{
  font-size:18px;
  font-weight:900;
  white-space:nowrap;
}
.pos{ color:#0a7a0a; }
.neg{ color:#c01616; }
.cero{ color:#6b7280; }

#estado{
  padding:10px;
  color:var(--muted);
  font-size:13px;
}

/* PC: grid */
@media (min-width: 900px){
  #lista{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap:12px;
  }
  .card{ margin:0; }
}
</style>
</head>

<body>

<header>
  <div class="left">
    <div class="title">Saldo Actual – Cigarros</div>
    <div class="meta" id="meta">Cargando…</div>
  </div>
  <button id="btn">Refrescar</button>
</header>

<div id="estado"></div>
<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs, 
  query, 
  where 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain:"inventariopv-643f1.firebaseapp.com",
  projectId:"inventariopv-643f1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $lista = document.getElementById("lista");
const $estado = document.getElementById("estado");
const $meta = document.getElementById("meta");
const $btn = document.getElementById("btn");

const norm = c => (c ?? "").toString().trim().padStart(12,"0");

function pickDesc(x){
  return x.descripcion ?? x.concepto ?? x.nombre ?? x.producto ?? "-";
}

async function cargar(){
  $btn.disabled = true;
  $estado.textContent = "Cargando...";
  $lista.innerHTML = "";
  const t0 = performance.now();

  try{

    // 🔹 Solo productos necesarios
    const qProductos = query(
      collection(db,"productos"),
      where("activo","==",true),
      where("departamento","==","CIGARROS")
    );

    const [productosSnap, entradasSnap, salidasSnap, baseSnap] = await Promise.all([
      getDocs(qProductos),
      getDocs(collection(db,"almacenes/almacen_cigarro/entradas")),
      getDocs(collection(db,"almacenes/almacen_cigarro/salidas1.0")),
      getDocs(collection(db,"almacenes/almacen_cigarro/inventario_base")),
    ]);

    const productos = new Map();
    const entradas  = new Map();
    const salidas   = new Map();
    const iniciales = new Map();

    productosSnap.forEach(d=>{
      const x = d.data();
      const codigo = norm(x.codigoBarra || x.productoId || x.codigo);
      productos.set(codigo, pickDesc(x));
    });

    entradasSnap.forEach(d=>{
      const items = d.data().items;
      if(!items) return;
      for(const i of items){
        const c = norm(i.productoId || i.codigo);
        entradas.set(c, (entradas.get(c) || 0) + (i.cantidadTotal || 0));
      }
    });

    salidasSnap.forEach(d=>{
      const items = d.data().productos;
      if(!items) return;
      for(const i of items){
        const c = norm(i.codigo);
        salidas.set(c, (salidas.get(c) || 0) + (i.cantidad || 0));
      }
    });

    baseSnap.forEach(d=>{
      iniciales.set(norm(d.id), d.data().existencia || 0);
    });

    render(productos, entradas, salidas, iniciales);

    const ms = Math.round(performance.now() - t0);
    $meta.textContent = `Actualizado · ${productos.size} productos · ${ms}ms`;
    $estado.textContent = "";

  }catch(e){
    console.error(e);
    $estado.textContent = "Error cargando datos";
  }

  $btn.disabled = false;
}

function render(productos, entradas, salidas, iniciales){

  const fragment = document.createDocumentFragment();

  const items = [];

  productos.forEach((desc, c)=>{
    const act =
      (iniciales.get(c) || 0) +
      (entradas.get(c) || 0) -
      (salidas.get(c) || 0);

    items.push({c, desc, act});
  });

  items.sort((a,b)=>a.desc.localeCompare(b.desc,"es"));

  for(const it of items){

    const card = document.createElement("div");
    card.className = "card";

    const nombre = document.createElement("div");
    nombre.className = "nombre";
    nombre.innerHTML = `${it.desc}<small>${it.c}</small>`;

    const saldo = document.createElement("div");
    saldo.className = "saldo";
    saldo.textContent = it.act;

    if(it.act > 0) saldo.classList.add("pos");
    else if(it.act < 0) saldo.classList.add("neg");
    else saldo.classList.add("cero");

    card.appendChild(nombre);
    card.appendChild(saldo);
    fragment.appendChild(card);
  }

  requestAnimationFrame(()=>{
    $lista.innerHTML = "";
    $lista.appendChild(fragment);
  });
}

$btn.addEventListener("click", cargar);
cargar();
</script>

</body>
</html>
