<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Pedidos PDD – Tablet</title>



<style>
body{
  font-family:Segoe UI, Arial;
  background:#eef1f5;
  margin:0;
  padding:16px;
  -webkit-tap-highlight-color:transparent;
}

.container{
  max-width:900px;
  margin:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

h2{
  margin:0;
  font-size:22px;
}

button{
  border:0;
  border-radius:12px;
  padding:10px 16px;
  font-size:14px;
  cursor:pointer;
}

.btnNuevo{
  background:#111;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:18px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  transition:.2s;
  position:relative;
  overflow:hidden;
}

.fecha{
  font-size:13px;
  color:#777;
}

.proveedor{
  font-size:20px;
  font-weight:600;
  margin-top:6px;
}

.badge{
  display:inline-block;
  margin-top:12px;
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  background:#ffe8cc;
  color:#a35a00;
}

.actions{
  margin-top:16px;
  display:flex;
  gap:10px;
}

.btnAbrir{
  background:#007bff;
  color:#fff;
  flex:1;
}

.btnSurtir{
  background:#16a34a;
  color:#fff;
  flex:1;
}

/* DESINTEGRACIÓN */
@keyframes disintegrate {
  0% { opacity:1; transform:scale(1) rotate(0deg);}
  40% { opacity:.7; transform:scale(.95) rotate(2deg);}
  100% { opacity:0; transform:scale(.7) rotate(8deg);}
}

.disintegrate{
  animation:disintegrate .5s forwards;
}

.empty{
  margin-top:20px;
  color:#666;
}
</style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <h2>Pedidos</h2>
    <button class="btnNuevo" onclick="location.href='pedido_nuevo.html'">+ Nuevo</button>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    No hay pedidos pendientes
  </div>

</div>

<script type="module">

import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const SUPABASE_URL = "https://cvpbtjlupswbyxenugpz.supabase.co";
const SUPABASE_ANON_KEY = "TU_ANON_KEY_AQUI";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function cargarPedidos(){

  const { data, error } = await sb
    .from("pedidos_pdd")
    .select("*")
    .order("pedido_fecha", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  const pendientes = data.filter(p => p.estatus !== "SURTIDO");

  if(pendientes.length === 0){
    document.getElementById("empty").style.display = "block";
    return;
  }

  document.getElementById("grid").innerHTML = pendientes.map(p => `
    <div class="card" id="card-${p.id}">
      <div class="fecha">${p.pedido_fecha}</div>
      <div class="proveedor">${p.proveedor_nombre}</div>
      <div class="badge">${p.estatus}</div>

      <div class="actions">
        <button class="btnAbrir" onclick="abrir('${p.id}')">Abrir</button>
        <button class="btnSurtir" onclick="marcarSurtido('${p.id}')">Surtir</button>
      </div>
    </div>
  `).join("");
}

window.abrir = function(id){
  location.href = `pedido_visor.html?id=${id}`;
}

window.marcarSurtido = async function(id){

  const card = document.getElementById("card-"+id);
  card.classList.add("disintegrate");

  setTimeout(async () => {

    const { error } = await sb
      .from("pedidos_pdd")
      .update({ 
        estatus:"SURTIDO",
        updated_at:new Date()
      })
      .eq("id", id);

    if(error){
      console.error(error);
      card.classList.remove("disintegrate");
      return;
    }

    card.remove();

  }, 500);
}

cargarPedidos();

</script>

</body>
</html>
