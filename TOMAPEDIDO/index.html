<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROVSOFT - Pedidos Piso</title>

<style>
  :root{
    --azul:#00416A;
    --azul2:#0c6cbd;
    --fondo:#f0f4f9;
    --card:#ffffff;
    --shadow:0 10px 28px rgba(0,0,0,.10);
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#eef5fb,#f8fbff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .container{
    width:100%;
    max-width:500px;
    padding:20px;
  }

  .card{
    background:var(--card);
    border-radius:20px;
    padding:30px;
    box-shadow:var(--shadow);
    text-align:center;
  }

  h1{
    margin:0 0 10px;
    color:var(--azul);
  }

  .sub{
    color:#6b7280;
    margin-bottom:25px;
    font-size:14px;
  }

  .btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:var(--azul2);
    color:#fff;
    transition:.2s;
  }

  .btn:hover{
    transform:scale(1.03);
  }

  .btn.sec{
    background:#64748b;
  }

  .input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:10px;
    font-size:14px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>PROVSOFT</h1>
    <div class="sub">Módulo Pedidos Piso</div>

    <!-- LISTADO -->
    <button class="btn" onclick="irListado()">
      📋 Ver Lista de Pedidos
    </button>

    <!-- VISOR MANUAL -->
    <input id="folio" class="input" placeholder="Ej: PED-20260404-142720">
    <button class="btn sec" onclick="irVisor()">
      🔎 Abrir Pedido por Folio
    </button>

    <!-- IMPRESIÓN DIRECTA -->
    <button class="btn" onclick="irUltimo()">
      🖨 Ver último pedido
    </button>

  </div>
</div>

<script>
  function irListado(){
    window.location.href = "LISTADO.html";
  }

  function irVisor(){
    const folio = document.getElementById("folio").value.trim();

    if(!folio){
      alert("Ingresa un folio");
      return;
    }

    window.location.href = `VISORIMP.html?folio=${folio}`;
  }

  function irUltimo(){
    // redirige a listado (ya está ordenado desc)
    window.location.href = "LISTADO.html";
  }
</script>

</body>
</html>
