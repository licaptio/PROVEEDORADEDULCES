<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedido Piso - PROVSOFT</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,.1);
  }

  h1 {
    margin: 0;
    color: #00416A;
  }

  .info {
    margin-top: 10px;
    font-size: 14px;
  }

  .tabla {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
  }

  .tabla th {
    background: #00416A;
    color: white;
    padding: 10px;
    text-align: left;
  }

  .tabla td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
  }

  .total {
    text-align: right;
    font-weight: bold;
    margin-top: 15px;
    font-size: 16px;
  }

  .btn {
    margin-top: 20px;
    padding: 10px 15px;
    background: #0c6cbd;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
  }

  @media print {
    .btn {
      display: none;
    }
    body {
      background: white;
    }
    .container {
      box-shadow: none;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1 id="folio">Cargando...</h1>

  <div class="info">
    <div><b>Cliente:</b> <span id="cliente"></span></div>
    <div><b>Fecha:</b> <span id="fecha"></span></div>
    <div><b>Estatus:</b> <span id="estatus"></span></div>
    <div><b>Solicitante:</b> <span id="solicitante"></span></div>
  </div>

  <table class="tabla">
    <thead>
      <tr>
        <th>#</th>
        <th>Producto</th>
        <th>Cant</th>
        <th>Precio</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div class="total" id="totalGeneral"></div>

  <button class="btn" onclick="window.print()">🖨 Imprimir</button>
</div>

<script>
  // 🔥 CONFIG FIREBASE (pon tu config aquí)
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_DOMINIO",
    projectId: "inventariopv-643f1",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🔎 FOLIO DINÁMICO (puedes cambiarlo por URL)
  const folio = "PED-20260404-142720";

  async function cargarPedido() {
    const doc = await db.collection("PEDIDOPISO").doc(folio).get();

    if (!doc.exists) {
      alert("Pedido no encontrado");
      return;
    }

    const data = doc.data();

    document.getElementById("folio").innerText = data.folio;
    document.getElementById("cliente").innerText = data.cliente;
    document.getElementById("estatus").innerText = data.estatus;
    document.getElementById("solicitante").innerText = data.solicitante;

    const fecha = new Date(data.creadoEnLocal);
    document.getElementById("fecha").innerText = fecha.toLocaleString();

    let totalGeneral = 0;
    const tbody = document.getElementById("tabla");

    data.productos.forEach((p, i) => {
      const total = p.cantidad * p.precioPublico;
      totalGeneral += total;

      const row = `
        <tr>
          <td>${i + 1}</td>
          <td>${p.concepto}</td>
          <td>${p.cantidad}</td>
          <td>$${p.precioPublico.toFixed(2)}</td>
          <td>$${total.toFixed(2)}</td>
        </tr>
      `;

      tbody.innerHTML += row;
    });

    document.getElementById("totalGeneral").innerText =
      "TOTAL: $" + totalGeneral.toFixed(2);
  }

  cargarPedido();
</script>

</body>
</html>
