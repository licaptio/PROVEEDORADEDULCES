<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú Toma de Pedido - PROVSOFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --azul: #00416A;
      --azul2: #0c6cbd;
      --fondo: #f4f7fb;
      --card: #ffffff;
      --shadow: 0 10px 25px rgba(0,0,0,.15);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--fondo);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .contenedor {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: var(--azul);
      margin-bottom: 30px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    a {
      text-decoration: none;
      padding: 15px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--azul), var(--azul2));
      color: white;
      font-weight: 600;
      transition: .2s;
    }

    a:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 15px rgba(0,0,0,.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>PROVSOFT<br>TOMA DE PEDIDO</h1>

    <div class="card">
      <a href="LISTADO.html">📋 Listado de Pedidos</a>
      <a href="PEDIDOPISO.html">🛒 Captura Pedido Piso</a>
      <a href="VISORIMP.html">🧾 Visor de Pedido</a>
      <a href="VISORIMP2.html">🖨️ Visor de Impresión</a>
    </div>

    <div class="footer">
      PROVSOFT © 2026
    </div>
  </div>

</body>
</html>
