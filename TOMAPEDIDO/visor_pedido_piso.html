<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor Pedido Piso - PROVSOFT</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qz-tray/qz-tray.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root{
      --azul:#00416A;
      --azul2:#0c6cbd;
      --gris:#e5e7eb;
      --gris2:#f8fafc;
      --texto:#1f2937;
      --shadow:0 10px 28px rgba(0,0,0,.10);
    }

    body{
      font-family: Arial, sans-serif;
      background:#f4f7fb;
      margin:0;
      padding:20px;
      color:var(--texto);
    }

    .wrap{
      max-width:1100px;
      margin:auto;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .btn{
      border:none;
      background:var(--azul2);
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn:hover{
      filter:brightness(1.05);
    }

    .btn.sec{
      background:#64748b;
    }

    .btn.ok{
      background:#166534;
    }

    .card{
      background:#fff;
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:20px;
      overflow:hidden;
    }

    h1{
      margin:0 0 10px 0;
      color:var(--azul);
      font-size:28px;
    }

    .info-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .info{
      background:#f8fbff;
      border:1px solid #e6eef8;
      border-radius:12px;
      padding:12px;
    }

    .info .lab{
      font-size:12px;
      text-transform:uppercase;
      color:#64748b;
      margin-bottom:6px;
      font-weight:700;
    }

    .info .val{
      font-size:15px;
      font-weight:700;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th{
      background:var(--azul);
      color:#fff;
      padding:12px;
      text-align:left;
      font-size:13px;
    }

    td{
      padding:10px 12px;
      border-bottom:1px solid #e5e7eb;
      font-size:14px;
      vertical-align:top;
    }

    .right{
      text-align:right;
    }

    .totales{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
    }

    .mini{
      background:#f8fbff;
      border:1px solid #e6eef8;
      border-radius:12px;
      padding:14px;
    }

    .mini .lab{
      font-size:12px;
      text-transform:uppercase;
      color:#64748b;
      margin-bottom:6px;
      font-weight:700;
    }

    .mini .val{
      font-size:24px;
      font-weight:800;
      color:var(--azul);
    }

    .obs{
      margin-top:18px;
      background:#fffbea;
      border:1px solid #fef3c7;
      border-radius:12px;
      padding:14px;
    }

    .estado-impresora{
      margin-top:12px;
      padding:10px 12px;
      border-radius:10px;
      background:#eef6ff;
      border:1px solid #dbeafe;
      color:#1e3a8a;
      font-size:13px;
      font-weight:700;
    }

    @media print {
      .top,
      .estado-impresora{
        display:none;
      }
      body{
        background:#fff;
        padding:0;
      }
      .card{
        box-shadow:none;
        border-radius:0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <button class="btn sec" onclick="volver()">← Regresar a lista</button>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" onclick="probarConexionQZ()">Probar Epson</button>
        <button class="btn ok" onclick="imprimirTicketEpson()">🖨 Imprimir Epson</button>
      </div>
    </div>

    <div class="card">
      <h1 id="folio">Cargando...</h1>

      <div class="info-grid">
        <div class="info">
          <div class="lab">Cliente</div>
          <div class="val" id="cliente"></div>
        </div>
        <div class="info">
          <div class="lab">Fecha</div>
          <div class="val" id="fecha"></div>
        </div>
        <div class="info">
          <div class="lab">Estatus</div>
          <div class="val" id="estatus"></div>
        </div>
        <div class="info">
          <div class="lab">Solicitante</div>
          <div class="val" id="solicitante"></div>
        </div>
        <div class="info">
          <div class="lab">Tipo</div>
          <div class="val" id="tipo"></div>
        </div>
        <div class="info">
          <div class="lab">Total asignado</div>
          <div class="val" id="totalAsignado"></div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Código</th>
            <th>Concepto</th>
            <th>Marca</th>
            <th>Departamento</th>
            <th class="right">Cant.</th>
            <th class="right">Precio</th>
            <th class="right">Importe</th>
          </tr>
        </thead>
        <tbody id="tablaProductos">
          <tr><td colspan="8">Cargando productos...</td></tr>
        </tbody>
      </table>

      <div class="totales">
        <div class="mini">
          <div class="lab">Partidas</div>
          <div class="val" id="totalPartidas">0</div>
        </div>
        <div class="mini">
          <div class="lab">Piezas</div>
          <div class="val" id="totalPiezas">0</div>
        </div>
        <div class="mini">
          <div class="lab">Subtotal</div>
          <div class="val" id="subtotal">$0.00</div>
        </div>
      </div>

      <div class="obs">
        <strong>Observaciones:</strong>
        <div id="observaciones" style="margin-top:8px;">-</div>
      </div>

      <div class="estado-impresora" id="estadoImpresora">
        Impresora: sin verificar
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      projectId: "inventariopv-643f1"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const folio = params.get("folio");

    let pedidoActual = null;
    let productosActuales = [];
    let subtotalActual = 0;

    // CAMBIA ESTE NOMBRE POR EL NOMBRE EXACTO DE TU IMPRESORA EN WINDOWS
    const NOMBRE_IMPRESORA = "EPSON TM-T20III";

    // 32 o 48 columnas, según tu Epson/configuración
    const ANCHO_TICKET = 48;

    function money(n) {
      return "$" + Number(n || 0).toLocaleString("es-MX", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatearFecha(valor) {
      try {
        if (!valor) return "";
        if (valor.toDate) return valor.toDate().toLocaleString("es-MX");
        return new Date(valor).toLocaleString("es-MX");
      } catch {
        return "";
      }
    }

    function volver() {
      window.location.href = "LISTADO.html";
    }

    function setEstadoImpresora(txt) {
      document.getElementById("estadoImpresora").textContent = "Impresora: " + txt;
    }

    function quitarAcentos(texto) {
      return String(texto || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function limpiarTextoTicket(texto) {
      return quitarAcentos(String(texto || ""))
        .replace(/[^\x20-\x7E\n]/g, "")
        .replace(/\t/g, " ");
    }

    function linea(char = "-") {
      return char.repeat(ANCHO_TICKET);
    }

    function centrar(texto = "") {
      texto = limpiarTextoTicket(texto);
      if (texto.length >= ANCHO_TICKET) return texto.slice(0, ANCHO_TICKET);
      const espacios = Math.floor((ANCHO_TICKET - texto.length) / 2);
      return " ".repeat(Math.max(0, espacios)) + texto;
    }

    function derecha(texto = "") {
      texto = limpiarTextoTicket(texto);
      if (texto.length >= ANCHO_TICKET) return texto.slice(0, ANCHO_TICKET);
      return " ".repeat(ANCHO_TICKET - texto.length) + texto;
    }

    function dosColumnas(izq = "", der = "") {
      izq = limpiarTextoTicket(izq);
      der = limpiarTextoTicket(der);
      const espacio = ANCHO_TICKET - izq.length - der.length;
      if (espacio >= 1) return izq + " ".repeat(espacio) + der;

      const maxIzq = Math.max(1, ANCHO_TICKET - der.length - 1);
      return izq.slice(0, maxIzq) + " " + der;
    }

    function cortarTexto(texto = "", ancho = ANCHO_TICKET) {
      texto = limpiarTextoTicket(texto);
      const palabras = texto.split(/\s+/).filter(Boolean);
      const lineas = [];
      let actual = "";

      for (const palabra of palabras) {
        if (!actual) {
          actual = palabra;
        } else if ((actual + " " + palabra).length <= ancho) {
          actual += " " + palabra;
        } else {
          lineas.push(actual);
          if (palabra.length > ancho) {
            let resto = palabra;
            while (resto.length > ancho) {
              lineas.push(resto.slice(0, ancho));
              resto = resto.slice(ancho);
            }
            actual = resto;
          } else {
            actual = palabra;
          }
        }
      }

      if (actual) lineas.push(actual);
      return lineas.length ? lineas : [""];
    }

    function formatearRenglonProducto(cantidad, descripcion, importe) {
      const colCant = 6;
      const colImp = 10;
      const colDesc = ANCHO_TICKET - colCant - colImp - 2;

      const cantTxt = String(cantidad);
      const impTxt = Number(importe || 0).toFixed(2);

      const descLineas = cortarTexto(descripcion, colDesc);
      let out = "";

      descLineas.forEach((lineaDesc, i) => {
        const c1 = i === 0 ? cantTxt.padStart(colCant, " ") : " ".repeat(colCant);
        const c2 = lineaDesc.padEnd(colDesc, " ");
        const c3 = i === 0 ? impTxt.padStart(colImp, " ") : " ".repeat(colImp);
        out += `${c1} ${c2} ${c3}\n`;
      });

      return out;
    }

    function generarTicketTexto(data) {
      const productos = Array.isArray(data.productos) ? data.productos : [];
      const fecha = data.fecha || "";
      const observaciones = data.observaciones || "-";

      let out = "";

      // Inicializar impresora
      out += "\x1B\x40";

      out += centrar("PROVSOFT") + "\n";
      out += centrar("PEDIDO PISO") + "\n";
      out += linea("=") + "\n";

      out += dosColumnas("FOLIO:", data.folio || "") + "\n";
      out += dosColumnas("FECHA:", fecha) + "\n";
      out += dosColumnas("ESTATUS:", data.estatus || "") + "\n";
      out += linea("-") + "\n";

      const clienteLineas = cortarTexto("CLIENTE: " + (data.cliente || ""), ANCHO_TICKET);
      clienteLineas.forEach(l => out += l + "\n");

      if (data.solicitante) {
        const solLineas = cortarTexto("SOLICITANTE: " + data.solicitante, ANCHO_TICKET);
        solLineas.forEach(l => out += l + "\n");
      }

      if (data.tipo) {
        const tipoLineas = cortarTexto("TIPO: " + data.tipo, ANCHO_TICKET);
        tipoLineas.forEach(l => out += l + "\n");
      }

      out += linea("-") + "\n";
      out += " CANT DESCRIPCION                          IMPORTE\n";
      out += linea("-") + "\n";

      productos.forEach((p) => {
        const cantidad = Number(p.cantidad || 0);
        const precio = Number(p.precioPublico || 0);
        const importe = cantidad * precio;
        const descripcion = `${p.codigoBarra || ""} ${p.concepto || ""}`.trim();

        out += formatearRenglonProducto(cantidad, descripcion, importe);
      });

      out += linea("-") + "\n";
      out += dosColumnas("PARTIDAS:", String(data.totalPartidas || productos.length)) + "\n";
      out += dosColumnas("PIEZAS:", String(data.totalPiezas || 0)) + "\n";
      out += dosColumnas("SUBTOTAL:", Number(data.subtotal || 0).toFixed(2)) + "\n";
      out += linea("-") + "\n";

      out += "OBSERVACIONES:\n";
      cortarTexto(observaciones, ANCHO_TICKET).forEach(l => out += l + "\n");

      out += "\n";
      out += centrar("FIN DEL PEDIDO") + "\n";
      out += "\n\n\n";

      // Corte parcial ESC/POS
      out += "\x1D\x56\x00";

      return out;
    }

    async function conectarQZ() {
      if (qz.websocket.isActive()) return true;
      await qz.websocket.connect();
      return true;
    }

    async function desconectarQZ() {
      try {
        if (qz.websocket.isActive()) {
          await qz.websocket.disconnect();
        }
      } catch (e) {
        console.warn("No se pudo cerrar QZ:", e);
      }
    }

    async function probarConexionQZ() {
      try {
        setEstadoImpresora("conectando...");
        await conectarQZ();

        const impresoras = await qz.printers.find();
        console.log("Impresoras detectadas:", impresoras);

        setEstadoImpresora(`QZ conectado. Objetivo: ${NOMBRE_IMPRESORA}`);
        alert("QZ Tray conectado correctamente.\nRevisa consola para ver impresoras detectadas.");
      } catch (e) {
        console.error(e);
        setEstadoImpresora("error de conexion");
        alert("No se pudo conectar con QZ Tray.\n\nVerifica:\n1) QZ Tray instalado\n2) QZ Tray abierto\n3) Permisos del navegador");
      }
    }

    async function imprimirTicketEpson() {
      if (!pedidoActual) {
        alert("El pedido aun no termina de cargar");
        return;
      }

      try {
        setEstadoImpresora("preparando impresion...");
        await conectarQZ();

        const config = qz.configs.create(NOMBRE_IMPRESORA, {
          encoding: 'Cp1252',
          altPrinting: false
        });

        const ticketTexto = generarTicketTexto({
          folio: pedidoActual.folio || folio,
          cliente: pedidoActual.cliente || "",
          fecha: formatearFecha(pedidoActual.creadoEn || pedidoActual.creadoEnLocal),
          estatus: pedidoActual.estatus || "",
          solicitante: pedidoActual.solicitante || "",
          tipo: pedidoActual.tipo || "",
          totalAsignado: Number(pedidoActual.totalAsignado || 0),
          totalPartidas: Number(pedidoActual.totalPartidas || productosActuales.length),
          totalPiezas: Number(pedidoActual.totalPiezas || 0),
          subtotal: subtotalActual,
          observaciones: pedidoActual.observaciones || "-",
          productos: productosActuales
        });

        const data = [
          {
            type: 'raw',
            format: 'plain',
            data: ticketTexto
          }
        ];

        await qz.print(config, data);
        setEstadoImpresora("impresion enviada a " + NOMBRE_IMPRESORA);
      } catch (e) {
        console.error(e);
        setEstadoImpresora("fallo al imprimir");
        alert(
          "Error al imprimir en Epson.\n\n" +
          "Verifica:\n" +
          "- Nombre exacto de impresora\n" +
          "- QZ Tray abierto\n" +
          "- Impresora encendida\n" +
          "- Permiso concedido a QZ Tray"
        );
      }
    }

    async function cargarPedido() {
      if (!folio) {
        alert("No se recibió el folio");
        return;
      }

      try {
        const doc = await db.collection("PEDIDOPISO").doc(folio).get();

        if (!doc.exists) {
          alert("Pedido no encontrado");
          return;
        }

        const data = doc.data();
        pedidoActual = data;

        document.getElementById("folio").textContent = data.folio || folio;
        document.getElementById("cliente").textContent = data.cliente || "";
        document.getElementById("fecha").textContent = formatearFecha(data.creadoEn || data.creadoEnLocal);
        document.getElementById("estatus").textContent = data.estatus || "";
        document.getElementById("solicitante").textContent = data.solicitante || "";
        document.getElementById("tipo").textContent = data.tipo || "";
        document.getElementById("totalAsignado").textContent = Number(data.totalAsignado || 0);
        document.getElementById("observaciones").textContent = data.observaciones || "-";

        const productos = Array.isArray(data.productos) ? data.productos : [];
        productosActuales = productos;

        const tbody = document.getElementById("tablaProductos");

        if (!productos.length) {
          tbody.innerHTML = `<tr><td colspan="8">Sin productos</td></tr>`;
          document.getElementById("totalPartidas").textContent = 0;
          document.getElementById("totalPiezas").textContent = 0;
          document.getElementById("subtotal").textContent = money(0);
          subtotalActual = 0;
          return;
        }

        let subtotal = 0;

        tbody.innerHTML = productos.map((p, i) => {
          const cantidad = Number(p.cantidad || 0);
          const precio = Number(p.precioPublico || 0);
          const importe = cantidad * precio;
          subtotal += importe;

          return `
            <tr>
              <td>${i + 1}</td>
              <td>${p.codigoBarra || ""}</td>
              <td>${p.concepto || ""}</td>
              <td>${p.marca || ""}</td>
              <td>${p.departamento || ""}</td>
              <td class="right">${cantidad}</td>
              <td class="right">${money(precio)}</td>
              <td class="right">${money(importe)}</td>
            </tr>
          `;
        }).join("");

        subtotalActual = subtotal;

        document.getElementById("totalPartidas").textContent = Number(data.totalPartidas || productos.length);
        document.getElementById("totalPiezas").textContent = Number(data.totalPiezas || 0);
        document.getElementById("subtotal").textContent = money(subtotal);

        setEstadoImpresora("lista para Epson");
      } catch (error) {
        console.error(error);
        alert("Error al cargar el pedido");
      }
    }

    window.addEventListener("beforeunload", async () => {
      await desconectarQZ();
    });

    cargarPedido();
  </script>
</body>
</html>
