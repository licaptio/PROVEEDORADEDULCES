<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVSOFT | MENÚ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f6fa;
}

/* HEADER */

header{
  background:#00416A;
  color:white;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}

/* CONTENEDOR */

#menuIndice{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* TARJETAS */

.menu-card{
  background:white;
  border-radius:14px;
  padding:22px;
  text-decoration:none;
  color:#003366;
  box-shadow:0 4px 10px rgba(0,0,0,.10);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  transition:.2s;
}

.menu-card:hover{
  transform:translateY(-4px);
  background:#eef6ff;
}

.menu-icono{
  font-size:42px;
  margin-bottom:12px;
}

.menu-texto{
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

/* CELULAR */

@media(max-width:600px){

  #menuIndice{
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
  }

  .menu-card{
    padding:18px 10px;
  }

  .menu-icono{
    font-size:34px;
  }

  .menu-texto{
    font-size:15px;
  }

}

</style>
</head>
<body>

<header>
  PROVSOFT | MENÚ GENERAL
</header>

<div id="menuIndice"></div>

<script>

// ===============================
// MENÚ SIMPLE
// ===============================

const MENU = [

  ["🏠","Inicio","index.html"],
  ["📄","Facturas","DONMORRISDEUDA.html"],
  ["🧾","Detalle CFDI","detalle_completo.html"],
  ["📤","Carga XML","carga_xml.html"],
  ["🔍","Auditoría SAT","auditoria_sat.html"],
  ["💳","Complementos","complementos_pago.html"],
  ["🚚","Transferencias","transferencias.html"],
  ["📦","Inventario","inventario.html"],
  ["⚠️","Mermas","mermas.html"],
  ["🔄","Intercambios","intercambios.html"]

];

// ===============================
// RENDER
// ===============================

function renderMenu(){

  const cont = document.getElementById("menuIndice");

  cont.innerHTML = MENU.map(m => `

    <a class="menu-card" href="${m[2]}">

      <div class="menu-icono">
        ${m[0]}
      </div>

      <div class="menu-texto">
        ${m[1]}
      </div>

    </a>

  `).join("");

}

document.addEventListener("DOMContentLoaded", renderMenu);

</script>

</body>
</html>
