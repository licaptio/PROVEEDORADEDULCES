<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Facturas en Observación - PROVSOFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

<div id="loader" class="loader">
  <div class="loader-card">
    <img src="./assets/logo.png" class="loader-logo" alt="PROVSOFT">
    <h1>PROVSOFT</h1>
    <p>Control de facturas en observación</p>
    <div class="loader-bar">
      <span></span>
    </div>
    <small>Cargando información...</small>
  </div>
</div>

<div id="app" class="app oculto">

  <aside class="sidebar">
    <div class="brand">
      <img src="./assets/logo.png" alt="Logo">
      <div>
        <strong>PROVSOFT</strong>
        <span>Facturas observadas</span>
      </div>
    </div>

    <nav>
      <button data-view="inicio" class="nav-btn activo">Inicio</button>
      <button data-view="buscar" class="nav-btn">Buscar UUID</button>
      <button data-view="observadas" class="nav-btn">Observadas</button>
      <button data-view="reporte" class="nav-btn">Reporte</button>
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">
      <div>
        <h1 id="tituloVista">Control de Facturas en Observación</h1>
        <p id="subtituloVista">Módulo de seguimiento y trazabilidad</p>
      </div>
      <div class="top-actions">
        <span id="contadorObservadas" class="pill">0 observadas</span>
      </div>
    </header>

    <section id="vistaInicio" class="vista"></section>
    <section id="vistaBuscar" class="vista oculto"></section>
    <section id="vistaEditor" class="vista oculto"></section>
    <section id="vistaObservadas" class="vista oculto"></section>
    <section id="vistaReporte" class="vista oculto"></section>

  </main>
</div>

<div id="modal" class="modal oculto">
  <div class="modal-card">
    <button id="cerrarModal" class="modal-close">×</button>
    <div id="modalContenido"></div>
  </div>
</div>

<div id="toast" class="toast oculto"></div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
