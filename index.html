<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PROVEEDORA | Accesos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --rojo:#c4161c;
  --verde:#0a7d3b;
  --bg:#f3f5f7;
  --shadow:0 8px 20px rgba(0,0,0,.12);
}

*{
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  padding:24px;
}

h1{
  margin:0;
  color:var(--rojo);
  font-size:26px;
  font-weight:700;
}

.sub{
  margin:6px 0 24px;
  color:#555;
  font-size:14px;
}

/* GRID */
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

/* TARJETA MINIMAL */
.card{
  background:#fff;
  border-radius:14px;
  padding:22px;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.25s;
  border-left:5px solid var(--rojo);
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 14px 28px rgba(0,0,0,.18);
  border-left-color:var(--verde);
}

/* TEXTO */
.title{
  font-size:16px;
  font-weight:700;
  color:#111;
}
</style>
</head>

<body>

<h1>PROVEEDORA</h1>
<div class="sub">Dulces · Desechables · Abarrotes · Materias primas</div>

<div class="dashboard">

  <div class="card" onclick="location.href='IYEPDD2026/index.html'">
    <div class="title">Ingresos PDD 2026</div>
  </div>

  <div class="card" onclick="location.href='https://licaptio.github.io/MENUADMONPROTEC25/DEUDAV2.0/index.html'">
    <div class="title">EGRESOS PDD 2026</div>
  </div>
  
  <div class="card" onclick="location.href='https://licaptio.github.io/MENUADMONPROTEC25/INV3/menusdetarios.html'">
    <div class="title">INVENTARIOS PDD</div>
  </div>

  <div class="card" onclick="location.href='https://licaptio.github.io/PROVEEDORADEDULCES/LISTPREPDD/VISORPDDLIST.html'">
    <div class="title">LISTAS COSTOS PDD</div>
  </div>

  <div class="card" onclick="location.href='https://licaptio.github.io/PROVEEDORADEDULCES/LISTPREPDD/EMPLEADOSpdd.html'">
    <div class="title">LISTAS EMPLEADOS PDD</div>
  </div>



</div>
</body>
</html>
