<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Allende 1</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
}

table{
  width:100%;
  border-collapse: collapse;
  background:white;
  color:black;
  font-size:12px;
}

th, td{
  padding:8px;
  border:1px solid #ddd;
}

th{
  background:#1e293b;
  color:white;
  position:sticky;
  top:0;
}

tr:nth-child(even){
  background:#f3f4f6;
}

.container{
  max-height:80vh;
  overflow:auto;
  border-radius:10px;
}

input{
  padding:10px;
  width:300px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

/* columnas numéricas alineadas */
td:nth-last-child(1),
td:nth-last-child(2){
  text-align:right;
  font-weight:bold;
  color:#16a34a;
}
</style>

</head>

<body>

<h1>📦 Inventario ALLENDE 1</h1>

<input type="text" id="buscador" placeholder="Buscar..." />

<div class="container">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
  authDomain: "inventariopv-643f1.firebaseapp.com",
  projectId: "inventariopv-643f1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tbody = document.getElementById("tbody");
const thead = document.getElementById("thead");
const buscador = document.getElementById("buscador");

let datosGlobal = [];

// 🔥 columnas ordenadas
const columnasOrdenadas = [
  "codigo",
  "descripcion",
  "cantidad",
  "usuario",
  "hora",
  "fecha",
  "costo_unitario",
  "costo_total"
];

// 🔥 CARGAR DATOS
async function cargarDatos(){

  const inventarioSnap = await getDocs(collection(db, "TIENDAS", "ALLENDE 1", "inventario"));
  const productosSnap = await getDocs(collection(db, "productos"));

  const mapaProductos = {};

  productosSnap.forEach(doc => {
    const p = doc.data();
    if(p.codigoBarra){
      mapaProductos[p.codigoBarra] = p;
    }
  });

  let datos = [];

  inventarioSnap.forEach(doc => {

    const inv = doc.data();
    const codigo = doc.id;

    const producto = mapaProductos[codigo];

    const costoUnitario = producto?.costoSinImpuesto || 0;
    const costoTotal = (inv.cantidad || 0) * costoUnitario;

    datos.push({
      codigo,
      ...inv,
      costo_unitario: costoUnitario,
      costo_total: costoTotal
    });

  });

  // 🔥 ORDEN
  datos.sort((a, b) => {

    const uA = a.usuario || "";
    const uB = b.usuario || "";

    if (uA < uB) return -1;
    if (uA > uB) return 1;

    return (a.hora || "").localeCompare(b.hora || "");
  });

  datosGlobal = datos;

  renderTabla(datos);

  const total = datos.reduce((acc, item) => acc + (item.costo_total || 0), 0);
  mostrarTotal(total);
}


// 🔥 TOTAL
function mostrarTotal(total){

  let div = document.getElementById("totalGeneral");

  if(!div){
    div = document.createElement("div");
    div.id = "totalGeneral";
    div.style.position = "fixed";
    div.style.bottom = "0";
    div.style.left = "0";
    div.style.width = "100%";
    div.style.background = "#111827";
    div.style.padding = "15px";
    div.style.textAlign = "center";
    div.style.fontSize = "20px";
    div.style.fontWeight = "bold";
    div.style.color = "#22c55e";
    div.style.boxShadow = "0 -2px 10px rgba(0,0,0,.3)";
    document.body.appendChild(div);
  }

  div.innerHTML = `💰 Total inventario: $ ${total.toLocaleString('es-MX', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })}`;
}


// 🔥 TABLA
function renderTabla(datos){

  tbody.innerHTML = "";
  thead.innerHTML = "";

  if(datos.length === 0) return;

  const columnas = columnasOrdenadas.filter(c => datos[0][c] !== undefined);

  let headerRow = "<tr>";
  columnas.forEach(col => headerRow += `<th>${col}</th>`);
  headerRow += "</tr>";

  thead.innerHTML = headerRow;

  datos.forEach(row => {

    let fila = "<tr>";

    columnas.forEach(col => {

      // 🔴 SIN COSTO
      if(col === "costo_unitario" && row[col] === 0){
        fila += `<td style="color:red; font-weight:bold;">SIN COSTO</td>`;
      }

      // 💰 FORMATO DINERO
      else if(col === "costo_total" || col === "costo_unitario"){
        fila += `<td>$ ${Number(row[col] || 0).toLocaleString('es-MX', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        })}</td>`;
      }

      // 📅 FECHA SEGURA
      else if(col === "fecha" && row[col]){
        const f = new Date(row[col]);
        fila += `<td>${isNaN(f) ? row[col] : f.toLocaleDateString()}</td>`;
      }

      else{
        fila += `<td>${row[col] ?? ""}</td>`;
      }

    });

    fila += "</tr>";
    tbody.innerHTML += fila;
  });
}


// 🔍 BUSCADOR
buscador.addEventListener("input", () => {

  const texto = buscador.value.toLowerCase();

  const filtrados = datosGlobal.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(texto)
  );

  renderTabla(filtrados);
});


// 🚀 INICIAR
cargarDatos();

</script>

</body>
</html>
